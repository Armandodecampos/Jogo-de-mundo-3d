                        pickedObjectBody = null;
                        pickedObjectMesh = null;

                        // Ao soltar o objeto, zera a velocidade do jogador para evitar arrasto residual
                        playerBody.velocity.set(0,0,0);
                        playerBody.angularVelocity.set(0,0,0);
                        playerBody.allowSleep = true; // Permite que o jogador volte a dormir se estiver parado
                        return; // Sai da função para evitar pegar outro objeto imediatamente
                    }

                    // Reinicia a destruição se o pointer lock for perdido
                    stopDestruction();

                    document.body.style.cursor = 'default'; // Mostra o cursor
                    if (renderer && renderer.domElement) {
                        renderer.domElement.style.cursor = 'default'; // Mostra o cursor do canvas
                    }
                    crosshairElement.style.setProperty('--crosshair-color', 'white');
                    if (ghostBlockMesh) {
                        ghostBlockMesh.visible = false; // Oculta o ghost block
                    }

                    // Se o bloqueio do ponteiro foi perdido e NÃO foi por causa da mochila ou tecla ESC
                    if (!pointerLockExitForBackpack && !isEscExit) {
                        showOptionsScreen(); // Isso irá definir gamePaused como true e mostrar o menu
                    }
                    // O cinto de inventário deve ser escondido APENAS se não for por causa da mochila ou tecla ESC
                    if (inventoryBeltElement && !pointerLockExitForBackpack && !isEscExit) {
                        inventoryBeltElement.style.visibility = 'hidden';
                        inventoryBeltElement.style.opacity = '0';
                    }

                    // Lida com o estado de agachamento se o bloqueio do ponteiro for perdido
                    if (isCrouching) {
                        isCrouching = false;
                        playerBody.removeShape(crouchPlayerShape);
                        playerBody.addShape(originalPlayerShape);
                        playerBody.position.y += (playerRadius - crouchRadius);
                        cameraEyeLevelOffset = playerRadius;
                        playerBody.velocity.y = 0;
                        playerBody.wakeUp();
                    }
                }
                // Sempre reseta a flag após o processamento do pointerlockchange
                pointerLockExitForBackpack = false;
                isEscExit = false;
            });

            // NOVO: Listener de mousedown consolidado
            renderer.domElement.addEventListener('mousedown', (event) => {
                if (!isWorldReady || gamePaused || !document.pointerLockElement) return;

                // NOVO: Impede ações de clique se o modal do contêiner estiver aberto
                if (!chestModal.classList.contains('hidden')) return;

                if (event.button === 0) { // Botão esquerdo
                    const primaryActionType = getActionType(beltItems[selectedSlotIndex]);
                    if (primaryActionType === 'place') {
                        placeBlock(beltItems[selectedSlotIndex], selectedSlotIndex);
                    } else {
                        isAttemptingToDestroy = true; // NOVO: Define a intenção
                        startDestruction();
                    }
                } else if (event.button === 2) { // Botão direito
                    const secondaryActionType = getActionType(beltItems[1]);
                    if (secondaryActionType === 'place') {
                        placeBlock(beltItems[1], 1);
                    }
                }
            });

            // NOVO: Listener de mouseup consolidado
            renderer.domElement.addEventListener('mouseup', (event) => {
                if (!isWorldReady || !document.pointerLockElement || gamePaused) return;
                isAttemptingToDestroy = false; // NOVO: Limpa a intenção

                stopDestruction(); // Para sempre a destruição em qualquer mouseup

                const primaryActionType = getActionType(beltItems[selectedSlotIndex]);
                const secondaryActionType = getActionType(beltItems[1]);

                if (event.button === 0) { // Botão esquerdo do mouse para cima
                    if (primaryActionType === 'grab') {
                        collectObject();
                    }
                }
            });


            // Listeners para o botão da mochila
            document.getElementById('backpackButton').addEventListener('click', openBackpack);
            document.getElementById('closeBackpackButton').addEventListener('click', closeBackpack);

        }
            // --- Funções Auxiliares para Ações do Jogador ---

            function getActionType(item) {
                if (item === null) return 'grab';
                // Ferramentas de destruição e modificação de terreno
                // O martelo foi removido temporariamente das ferramentas de destruição
                if (item.name === axeItemName || item.name === pickaxeItemName || item.name === shovelItemName || item.name === branchItemName || item.name === dirtItemName || item.name === sandItemName) return 'destroy';
                // Itens de colocação
                if (item.name === cobItemName || item.name === floorItemName || item.name === treeSaplingItemName || item.name === appleSeedItemName || item.name === pineSeedItemName || item.name === coconutItemName || item.name === woodenPlankItemName || item.name === treeTrunkItemName || item.name === boxItemName || item.name === raftItemName || item.name === stoneBlockItemName || item.name === woodenBlockItemName || item.name === stoneFloorItemName || item.name === stoneItemName || item.name === campfireItemName || item.name === torchItemName) return 'place';
                return null; // Retorna nulo se o item não tiver um tipo de ação conhecido
            }

            function startDestruction() {
                clearSmokeEffects(); // Reseta a fumaça ao iniciar uma nova ação
                destructionComplete = false;
                raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
                // Usa raycastTargets para evitar colidir com partículas ou o bloco fantasma
                const intersects = raycaster.intersectObjects(raycastTargets, true);
                let target = null;

                const heldItem = beltItems[selectedSlotIndex];
                const heldItemName = heldItem?.name;
                const heldItemQuantity = heldItem?.quantity || 0;

                // NOVO: Verifica se o item é uma ferramenta permitida para destruição/cavagem ou se é Terra para construção
                const isAllowedTool = heldItem === null ||
                                     heldItemName === axeItemName ||
                                     heldItemName === pickaxeItemName ||
                                     heldItemName === shovelItemName ||
                                     heldItemName === branchItemName ||
                                     heldItemName === dirtItemName ||
                                     heldItemName === sandItemName;

                if (!isAllowedTool || isClimbing) return;

                // Se estiver com terra/areia equipada, precisa ter quantidade maior que zero
                if ((heldItemName === dirtItemName || heldItemName === sandItemName) && heldItemQuantity <= 0) return;

                // Impede a destruição com o martelo (já coberto pelo isAllowedTool, mas mantido por clareza)
                if (heldItemName === hammerItemName) {
                    return;
                }

                let potentialGround = null;
                let potentialObject = null;
                let potentialCapim = null;

                for (let i = 0; i < intersects.length; i++) {
                    if (intersects[i].distance > destroyDistance) continue;
                    let obj = intersects[i].object;
                    const hitPoint = intersects[i].point;

                    // Verifica se é o terreno
                    const isIslandMesh = islandMeshes.some(m => m.mesh === obj);
                    if (isIslandMesh) {
                        // Verifica se há capim perto para priorizar
                        let nearCapim = null;
                        for (const cluster of capimClusters) {
                             if (calculateWrappedDistance(cluster.position, hitPoint) < 1.2) {
                                 nearCapim = cluster;
                                 break;
                             }
                        }
                        if (nearCapim && !potentialCapim) {
                            potentialCapim = { body: null, mesh: null, isCapim: true, cluster: nearCapim };
                        }
                        if (!potentialGround) {
                            potentialGround = { body: null, mesh: obj, isDigging: true, intersect: intersects[i] };
                        }
                    } else {
                        // Verifica se é um objeto destrutível (árvore, contêiner, etc)
                        let mainObject = null, intersectedBody = null;
                        let current = obj;
                        while (current) {
                            if (current.userData && current.userData.physicsBody) {
                                mainObject = current;
                                intersectedBody = current.userData.physicsBody;
                                break;
                            }
                            current = current.parent;
                        }
                        if (mainObject && intersectedBody && intersectedBody.userData && intersectedBody.userData.isDestructible && !potentialObject) {
                            potentialObject = { body: intersectedBody, mesh: mainObject, hitPoint: hitPoint.clone() };
                        }
                    }
                }

                // Priorização baseada na ferramenta
                if (heldItemName === shovelItemName) {
                    // Prioriza capim se estiver mirando nele, para facilitar a limpeza antes de cavar
                    target = potentialCapim || potentialGround || potentialObject;
                } else if (heldItemName === axeItemName || heldItemName === pickaxeItemName) {
                    target = potentialObject || potentialCapim || potentialGround;
                } else if (heldItemName === dirtItemName || heldItemName === sandItemName) {
                    target = potentialGround || potentialObject || potentialCapim;
                } else {
                    // Mão ou outros: prioriza capim, depois objetos, depois terreno
                    target = potentialCapim || potentialObject || potentialGround;
                }

                if (target) {
                    isDestroying = true;
                    if (target.isDigging) {
                        destroyTargetPosition = target.intersect.point.clone();
                    } else if (target.isMountain) {
                        destroyTargetPosition = target.position.clone();
                    } else if (target.isCapim) {
                        destroyTargetPosition = target.cluster.position.clone();
                    } else if (target.body) {
                        destroyTargetPosition = target.hitPoint;
                    }
                    window.destroyTargetPosition = destroyTargetPosition;
                    destroyProgress = 0;
                    destroyTargetBody = target.body;
                    destroyTargetMesh = target.mesh;
                    destroyTargetPatchObject = target.patchObject || null;
                    destroyTargetMountainInfo = target.isMountain ? { position: target.position } : null;
                    destroyTargetDigInfo = null;
                    destroyTargetCapimInfo = target.isCapim ? { cluster: target.cluster } : null;

                    // Determina o tipo de material e a durabilidade base
                    let baseDurability;
                    let materialType; // 'wood', 'stone', 'earth', 'other'

                    if (target.isDigging) {
                        const intersect = target.intersect;
                        const hitPoint = intersect.point;
                        const isBuilding = (heldItemName === dirtItemName || heldItemName === sandItemName);

                        // Alinha o ponto de impacto para busca precisa (agora com suporte a sub-grid)
                        const step = worldSize / (hfGridSize - 1);
                        const mx = (hitPoint.x + worldSize / 2) / step;
                        const mz = (worldSize / 2 - hitPoint.z) / step;
                        // Para busca de mounds existentes, ainda usamos uma pequena tolerância
                        const vx = (mx / (hfGridSize - 1) - 0.5) * worldSize;
                        const vz = (0.5 - mz / (hfGridSize - 1)) * worldSize;
                        const snappedHitPoint = new THREE.Vector3(vx, hitPoint.y, vz);

                        let targetMound = null;
                        // Procuramos em todos os mounds ativos, inclusive os que estão em processo de cura
                        const moundsToSearch = mounds.filter(m => !m.flattened);

                        if (isProtected(hitPoint.x + visualOffsetX, hitPoint.z + visualOffsetZ)) {
                            isDestroying = false;
                            progressContainer.style.display = 'none';
                            return;
                        }

                        let existingMoundAtPos = null;
                        for (const mound of moundsToSearch) {
                            // Calcula a distância horizontal para o ponto de impacto preciso
                            const dx = mound.position.x - snappedHitPoint.x;
                            const dz = mound.position.z - snappedHitPoint.z;
                            const distSq = dx * dx + dz * dz;

                            // Se estiver muito perto do centro de um mound existente, reusa ele
                            if (distSq < 0.25) { // 0.5m de tolerância
                                existingMoundAtPos = mound;
                                if (isBuilding) {
                                    // Se estiver construindo:
                                    // Monte positivo cresce (incrementa stage)
                                    // Buraco negativo diminui (decrementa stage)
                                    if ((mound.maxHeightChange > 0 && mound.growthStage < moundGrowthStages.length) ||
                                        (mound.maxHeightChange < 0 && mound.growthStage > 0)) {
                                        targetMound = mound;
                                        break;
                                    }
                                } else {
                                    // Se estiver cavando:
                                    // Monte positivo diminui (decrementa stage)
                                    // Buraco negativo aumenta profundidade (incrementa stage)
                                    if ((mound.maxHeightChange > 0 && mound.growthStage > 0) ||
                                        (mound.maxHeightChange < 0 && mound.growthStage < moundGrowthStages.length)) {
                                        targetMound = mound;
                                        break;
                                    }
                                }
                            }
                        }

                        if (targetMound) {
                            currentMound = targetMound;
                            // Sincroniza o itemType se estamos construindo
                            if (isBuilding) {
                                currentMound.itemType = heldItemName;
                            }
                            // Se o mound estava em processo de cura (fechamento), traz ele de volta
                            const closingIndex = closingMounds.indexOf(targetMound);
                            if (closingIndex !== -1) {
                                closingMounds.splice(closingIndex, 1);
                                if (!visualMounds.includes(targetMound)) {
                                    visualMounds.push(targetMound);
                                }
                                targetMound.closingStartTime = undefined;
                                // Sincroniza o estágio de crescimento baseado na altura atual para retomar a ação
                                const scale = Math.abs(targetMound.height / (targetMound.maxHeightChange || -1.0));
                                let newStage = 0;
                                for (let s = 0; s < moundGrowthStages.length; s++) {
                                    if (scale >= moundGrowthStages[s]) newStage = s + 1;
                                }
                                targetMound.growthStage = newStage;
                            }
                        } else if (!existingMoundAtPos) {
                            currentMound = createMound(intersect, isBuilding, isBuilding ? heldItemName : null);
                        } else {
                            // Encontrou um mound mas não é válido para a ação atual
                            isDestroying = false;
                            progressContainer.style.display = 'none';
                            return;
                        }

                        if (currentMound) {
                            destroyTargetDigInfo = { mound: currentMound, isBuilding: isBuilding };
                            const surfaceHeight = getSurfaceHeight(hitPoint.x, hitPoint.z);
                            // Pedra começa ~5 unidades abaixo da superfície natural
                            // O usuário quer que acompanhe a curvatura. getSurfaceHeight(x, z) já inclui a curvatura base e montanhas.
                            const isStoneLayer = hitPoint.y < getSurfaceHeight(hitPoint.x, hitPoint.z) - 4.5;
                            currentMound.isStoneLayer = isStoneLayer;
                            materialType = isStoneLayer ? 'stone' : ((currentMound.itemType === sandItemName || (heldItemName === sandItemName && isBuilding)) ? 'sand' : 'earth');
                            // Aumentado para garantir que a barra de progresso seja visível e sentida
                            baseDurability = isBuilding ? 0.3 : (isStoneLayer ? 3.0 : 1.5);
                        } else {
                            isDestroying = false;
                            return;
                        }
                    } else if (target.isMountain) {
                        baseDurability = 2.0;
                        materialType = 'stone';
                    } else if (target.body && target.body.userData) {
                        baseDurability = target.body.userData.durability || 1.0;
                        const targetType = target.body.userData.type;
                        const isTree = !!target.body.userData.growthStage;
                        const isWooden = [woodenPlankItemName, treeTrunkItemName, boxItemName, woodenBlockItemName].includes(targetType);
                        const isStone = [stoneBlockItemName, stoneFloorItemName, stoneItemName].includes(targetType);
                        const isEarth = [cobItemName, floorItemName].includes(targetType);

                        if (isTree || isWooden) {
                            materialType = 'wood';
                            // NOVO: Restrição estrita de machado para árvores
                            if (isTree && heldItemName !== axeItemName) {
                                isDestroying = false;
                                progressContainer.style.display = 'none';
                                return;
                            }
                        } else if (isStone) {
                            materialType = 'stone';
                        } else if (isEarth) {
                            materialType = 'earth';
                        } else {
                            materialType = 'other';
                        }
                    } else if (target.isCapim) {
                        baseDurability = 0.2;
                        materialType = 'other';
                    } else {
                        isDestroying = false;
                        return;
                    }

                    // Calcula o multiplicador
                    let multiplier;
                    const strongMultiplier = 1.0; // Multiplicador para a ferramenta correta
                    const branchMultiplier = 4.0; // Bem lento
                    const weakMultiplier = 10.0;  // Muito mais lento (Mão) para incentivar o uso de ferramentas

                    const isBuildingAction = (heldItemName === dirtItemName || heldItemName === sandItemName);

                    // Define a ferramenta correta para cada material
                    const isCorrectTool = isBuildingAction ||
                        (heldItemName === axeItemName && materialType === 'wood') ||
                        (heldItemName === pickaxeItemName && materialType === 'stone') ||
                        (heldItemName === shovelItemName && materialType === 'earth');

                    if (isCorrectTool) {
                        if (isBuildingAction) {
                            multiplier = 1.0;
                        } else if ((heldItemName === shovelItemName && materialType === 'earth') ||
                            (heldItemName === pickaxeItemName && materialType === 'stone')) {
                            multiplier = 0.3; // Mais rápido com a ferramenta correta
                        } else {
                            multiplier = strongMultiplier;
                        }
                    } else if (heldItemName === branchItemName && (materialType === 'stone' || materialType === 'earth')) {
                        multiplier = branchMultiplier;
                    } else {
                        multiplier = weakMultiplier; // Aplica penalidade se a ferramenta não for a correta
                    }

                    targetDestroyTime = baseDurability * multiplier;

                    // Exibe a barra de progresso
                    progressContainer.style.display = 'block';
                    progressBar.style.width = '0%';
                    // Define a cor da barra de progresso com base no material
                    if (materialType === 'stone') {
                        progressBar.style.backgroundColor = '#888888';
                        destroyTargetColor = 0x888888;
                    } else if (materialType === 'wood') {
                        progressBar.style.backgroundColor = '#8B4513';
                        destroyTargetColor = 0x8B4513;
                    } else if (materialType === 'earth') {
                        progressBar.style.backgroundColor = '#A0522D';
                        destroyTargetColor = 0xA0522D;
                    } else if (materialType === 'sand') {
                        progressBar.style.backgroundColor = '#c2b280';
                        destroyTargetColor = 0xc2b280;
                    } else if (target.isCapim) {
                        progressBar.style.backgroundColor = '#4d7a31';
                        destroyTargetColor = 0x4d7a31;
                    } else {
                        progressBar.style.backgroundColor = '#4CAF50';
                        destroyTargetColor = 0x4CAF50;
                    }
                }
            }

            function stopDestruction() {
                clearSmokeEffects(); // Reseta a fumaça ao parar a ação
                if (currentMound) {
                    currentMound.lastDugAt = world.time; // Atualiza o tempo de inatividade ao parar
                }
                isDestroying = false;
                destroyProgress = 0;
                progressContainer.style.display = 'none';
                progressBar.style.backgroundColor = '#4CAF50'; // Redefine para o padrão
                currentMound = null;
                destroyTargetBody = null;
                destroyTargetMesh = null;
                destroyTargetPatchObject = null;
                destroyTargetMountainInfo = null;
                destroyTargetDigInfo = null; // Limpa a informação de escavação
                destroyTargetCapimInfo = null;
                destructionComplete = false;
                destroyTargetPosition = null;
            }

            function interact() {
                if (!isWorldReady || gamePaused || !document.pointerLockElement) return false;

                raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
                const intersects = raycaster.intersectObjects(raycastTargets, true);
                for (const intersect of intersects) {
                    if (intersect.distance > pickUpDistance) continue;

                    const obj = intersect.object;
                    if (obj.userData.isApple && obj.visible) {
                        const body = obj.userData.treeBody;
                        const appleIndex = obj.userData.appleIndex;
                        if (body && body.userData.apples && body.userData.apples[appleIndex]) {
                            body.userData.apples[appleIndex].picked = true;
                            body.userData.apples[appleIndex].lastPickedTime = world.time;
                            obj.visible = false;
                            addItemToInventory(backpackItems, { name: appleItemName, quantity: 1 });
                            updateBackpackDisplay();
                            return true;
                        }
                    }
                    if (obj.userData.isCoconut && obj.visible) {
                        const body = obj.userData.treeBody;
                        const coconutIndex = obj.userData.coconutIndex;
                        if (body && body.userData.coconuts && body.userData.coconuts[coconutIndex]) {
                            body.userData.coconuts[coconutIndex].picked = true;
                            body.userData.coconuts[coconutIndex].lastPickedTime = world.time;
                            obj.visible = false;
                            addItemToInventory(backpackItems, { name: coconutItemName, quantity: 1 });
                            updateBackpackDisplay();
                            return true;
                        }
                    }
                    let body = null;
                    let current = obj;
                    while (current) {
                        if (current.userData && current.userData.physicsBody) {
                            body = current.userData.physicsBody;
                            break;
                        }
                        current = current.parent;
                    }

                    if (body && body.userData) {
                        if (body.userData.isChest) {
                            openChest(body);
                            return true;
                        }
                        if (body.userData.isRaft && !isDrivingRaft) {
                            isDrivingRaft = true;
                            currentRaftBody = body;
                            // Desativa colisão e dinâmica do jogador para não empurrar a jangada para baixo
                            playerBody.type = CANNON.Body.KINEMATIC;
                            playerBody.collisionResponse = false;
                            playerBody.collisionFilterGroup = 0;
                            playerBody.collisionFilterMask = 0;
                            return true;
                        }
                    }
                }
                return false;
            }

            function collectObject() {
                raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
                const intersects = raycaster.intersectObjects(raycastTargets, true);
                for (const intersect of intersects) {
                    if (intersect.distance > pickUpDistance) continue;

                    let clickedBody = null;
                    let current = intersect.object;
                    while (current) {
                        if (current.userData && current.userData.physicsBody) {
                            clickedBody = current.userData.physicsBody;
                            break;
                        }
                        current = current.parent;
                    }

                    if (!clickedBody || !clickedBody.userData) continue;

                    if (!clickedBody.userData.isCollectible && !clickedBody.userData.isRaft) continue;
                    if (clickedBody.userData.type === campfireItemName || clickedBody.userData.type === torchItemName) continue;

                    // NOVO: Se for um contêiner (contêiner/caixote), só permite guardar se estiver vazio
                    if (clickedBody.userData.isChest) {
                        const inventory = clickedBody.userData.inventory;
                        if (inventory && inventory.some(item => item !== null)) {
                            // O contêiner não está vazio, não podemos guardá-lo
                            showNotification("Esvazie o caixote antes de guardá-lo!");
                            continue;
                        }
                    }

                    const itemType = clickedBody.userData.type;
                    const itemQuantity = clickedBody.userData.quantity || 1; // Padrão para 1 se não especificado

                    const collectibleIndex = collectibleBoxes.findIndex(box => box.body === clickedBody);
                    if (collectibleIndex > -1) {
                        const collectibleToRemove = collectibleBoxes[collectibleIndex];

                        world.removeBody(collectibleToRemove.body);
                        scene.remove(collectibleToRemove.mesh);
                        collectibleBoxes.splice(collectibleIndex, 1);
                        raycastTargetsNeedUpdate = true;

                        addItemToInventory(backpackItems, { name: itemType, quantity: itemQuantity });
                        updateBackpackDisplay();

                        break;
                    } else if (clickedBody.userData.isRaft) {
                        const raftIndex = raftBodies.indexOf(clickedBody);
                        if (raftIndex > -1) {
                            const constructionIndex = placedConstructionBodies.indexOf(clickedBody);
                            if (constructionIndex > -1) {
                                scene.remove(placedConstructionMeshes[constructionIndex]);
                                placedConstructionBodies.splice(constructionIndex, 1);
                                placedConstructionMeshes.splice(constructionIndex, 1);
                            }
                            world.removeBody(clickedBody);
                            raftBodies.splice(raftIndex, 1);
                            raycastTargetsNeedUpdate = true;

                            addItemToInventory(backpackItems, { name: raftItemName, quantity: 1 });
                            updateBackpackDisplay();
                            break;
                        }
                    }
                }
            }

            function grabObject() {
                raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
                const intersects = raycaster.intersectObjects(raycastTargets, true); // Search recursively
                const allPickableBodies = collectibleBoxes.map(b => b.body);

                for (let i = 0; i < intersects.length; i++) {
                    let body = null;
                    let current = intersects[i].object;
                    while (current) {
                        if (current.userData && current.userData.physicsBody) {
                            body = current.userData.physicsBody;
                            break;
                        }
                        current = current.parent;
                    }

                    if (body && allPickableBodies.includes(body) && body.userData.type !== campfireItemName) {
                        if (intersects[i].distance <= pickUpDistance) {
                            pickedObjectBody = body;
                            pickedObjectMesh = intersects[i].object;
                            distanceToPickedObject = intersects[i].distance; // Store initial distance

                            // Make the object kinematic and disable collisions
                            pickedObjectBody.type = CANNON.Body.KINEMATIC;
                            pickedObjectBody.collisionResponse = false;
                            pickedObjectBody.collisionFilterGroup = 0;
                            pickedObjectBody.collisionFilterMask = 0;

                            // Remove any existing constraints if they exist
                            if (grabberConstraint) {
                                world.removeConstraint(grabberConstraint);
                                grabberConstraint = null;
                            }
                            break; // Object grabbed, exit loop
                        }
                    }
                }
            }

            function dropObject() {
                if (!pickedObjectBody) return;

                // Restore the object to its original dynamic state
                pickedObjectBody.type = CANNON.Body.DYNAMIC;
                pickedObjectBody.collisionResponse = true;
                pickedObjectBody.collisionFilterGroup = 1;
                pickedObjectBody.collisionFilterMask = 1;
                pickedObjectBody.wakeUp();

                // Give it a gentle push away from the player
                const throwDirection = new THREE.Vector3();
                camera.getWorldDirection(throwDirection);
                pickedObjectBody.velocity.copy(throwDirection.multiplyScalar(2)); // Apply a small impulse

                pickedObjectBody = null;
                pickedObjectMesh = null;
            }

            function placeBlock(item, slotIndex) {
                // If no item, do nothing.
                if (!item || item.quantity <= 0) return;

                currentBlockType = item.name;

                // Final check for protected area before placing

        // Função para lidar com o redimensionamento da janela
        let cachedTotalWeight = 0;
        let weightNeedsUpdate = true;
        function calculateTotalWeight() {
            if (!weightNeedsUpdate) return cachedTotalWeight;
            let totalWeight = 0;
            // Calcular peso no cinto
            for (const item of beltItems) {
                if (item) {
                    const weightPerItem = itemWeights[item.name] || 0;

        // Função para aplicar o efeito de envolvimento a um corpo de física (não retorna delta)
        function wrapObject(body, size) {
            if (body.position.x > size / 2) {
                body.position.x -= size;
            } else if (body.position.x < -size / 2) {
                body.position.x += size;
            }

            if (body.position.z > size / 2) {
                body.position.z -= size;
            } else if (body.position.z < -size / 2) {
                body.position.z += size;
            }
            if (body.updateAABB) body.updateAABB();
        }

        // Função para atualizar as posições de todas as malhas visuais para um dado corpo de cubo/bloco

        // NOVO: Função para calcular a distância em um mundo que se envolve (toroidal)
        function calculateWrappedDistance(pos1, pos2) {
            const dx = Math.abs(pos1.x - pos2.x);
            const dy = Math.abs(pos1.y - pos2.y); // O eixo Y não se envolve
            const dz = Math.abs(pos1.z - pos2.z);

            const wrappedDx = Math.min(dx, worldSize - dx);
            const wrappedDz = Math.min(dz, worldSize - dz);

            return Math.sqrt(wrappedDx * wrappedDx + dy * dy + wrappedDz * wrappedDz);
        }

        function isProtected(x, z) {
            // Toroidal wrap coordinates to [-worldSize/2, worldSize/2]
            const halfSize = worldSize / 2;
            let tx = ((x + halfSize) % worldSize + worldSize) % worldSize - halfSize;
            let tz = ((z + halfSize) % worldSize + worldSize) % worldSize - halfSize;
            // Protected area: a small square at one "corner" (approx 280, 280 for original worldSize 600)
            // Keep the constant distance from the world boundary
            return (tx > (halfSize - 30) && tz > (halfSize - 30));
        }
        window.isProtected = isProtected;

            setTimeout(() => {
                respawnPlayer();
            }, 10000);
        }

        function respawnPlayer() {
            playerHealth = playerMaxHealth;
            playerBreath = playerMaxBreath;

            // Reset position to island center
            if (playerBody) {
                playerBody.position.set(0, 10, 0);
                playerBody.velocity.set(0, 0, 0);
            }

            if (faintedOverlay) faintedOverlay.style.display = 'none';
            isFainted = false;
        }

        // Loop principal de animação do jogo
        let lastTime = performance.now();
        function animate() {
            requestAnimationFrame(animate);

            const now = performance.now();
            const delta = Math.min((now - lastTime) / 1000, 0.1);
            lastTime = now;

            // Update camera position and matrices for accurate culling
            if (playerBody) {
                camera.position.copy(playerBody.position);
                camera.position.y += (typeof cameraEyeLevelOffset !== 'undefined' ? cameraEyeLevelOffset : playerRadius);
                camera.updateMatrixWorld();
            }

            // Update FPS counter and performance monitoring
            fpsFrames++;
            if (now > fpsLastTime + 1000) {
                const fps = Math.round((fpsFrames * 1000) / (now - fpsLastTime));
                if (showFPS) document.getElementById('fpsCounter').textContent = `FPS: ${fps}`;

                // Monitor performance
                if (fps < 28) {
                    highFPSStart = null;
                    if (lowFPSStart === null) lowFPSStart = now;
                    else if (now - lowFPSStart > 500) {
                        if (!lowPerformance) console.log("Entering low performance mode (FPS: " + fps + ")");
                        lowPerformance = true;
                    }
                } else if (fps > 35) {
                    lowFPSStart = null;
                    if (highFPSStart === null) highFPSStart = now;
                    else if (now - highFPSStart > 1500) {
                        if (lowPerformance) console.log("Exiting low performance mode (FPS: " + fps + ")");
                        lowPerformance = false;
                    }
                } else {
                    lowFPSStart = null;
                    highFPSStart = null;
                }

                fpsFrames = 0;
                fpsLastTime = now;
            }
            // Sincroniza Birds e Clouds com worldSize real para despawn
            const despawnDist = worldSize * 0.8;

            // Reset slope flags before physics step
            window.onSteepSlope = onSteepSlope = false;
            window.onWalkableGround = false;

            if (!gamePaused) {
                // Determine true performance state for rain visibility
                const fps = Math.round((fpsFrames * 1000) / (now - fpsLastTime)) || 30; // Fallback to 30

                // Só esconde a chuva se o FPS estiver muito baixo por vários quadros seguidos
                if (fps < 15) {
                    veryLowFPSCounter++;
                } else {
                    veryLowFPSCounter = 0;
                }
                const isVeryLowPerformance = veryLowFPSCounter > 10;

                if (!isVeryLowPerformance) {
                    updateWeather(delta);
                    updateClouds(delta, despawnDist);

                    // Atualiza o mapa de oclusão periodicamente se estiver chovendo
                    if (localRainIntensity > 0.05) {
                        // Se performance boa: cada 5 frames. Se performance baixa: cada 60 frames.
                        const interval = lowPerformance ? 60 : 5;
                        if (frameCount % interval === 0) {
                            updateOcclusionHeightmap();
                        }
                    }

                    updateRain(delta);
                } else {
                    // Only hide if performance is critically low (< 15 FPS)
                    if (rainParticles) rainParticles.visible = false;
                    if (rainGainNode) rainGainNode.gain.setTargetAtTime(0, gameAudioContext.currentTime, 0.05);
                    lastRainCameraPos.copy(camera.position);
                }
            } else {
                // Se pausado, silencia a chuva e esconde as partículas
                if (rainParticles) rainParticles.visible = false;
                if (rainGainNode) {
                    rainGainNode.gain.setTargetAtTime(0, gameAudioContext.currentTime, 0.05);
                }
                lastRainCameraPos.copy(camera.position);
            }

            // Atualiza volume dos sons ambientais da ilha e da praia
            if (islandGainNode && beachGainNode) {
                if (gamePaused) {
                    islandGainNode.gain.setTargetAtTime(0, gameAudioContext.currentTime, 0.05);
                    beachGainNode.gain.setTargetAtTime(0, gameAudioContext.currentTime, 0.05);
                } else {
                    const playerPos = playerBody.position;
                    const centerPos = new THREE.Vector3(0, playerPos.y, 0);
                    const dist = calculateWrappedDistance(playerPos, centerPos);

                    // Volume da praia: 0 em capimRadius (100) até 1 em beachRadius (200) e além
                    let beachVolBase = Math.max(0, Math.min(1, (dist - capimRadius) / (beachRadius - capimRadius)));

                    // Aplica oscilação forte (30% a 100%) para dar impressão de onda e reduz o volume máximo
                    const beachVol = beachVolBase * 0.3 * (0.65 + 0.35 * Math.sin(world.time * 0.5));

                    // Volume base da ilha: 1 no centro até 0 em beachRadius (200)
                    let islandVolBase = Math.max(0, Math.min(1, 1 - (dist - capimRadius) / (beachRadius - capimRadius)));
                    if (dist < capimRadius) islandVolBase = 1.0;

                    // Aplica oscilação ao som da ilha
                    const islandVol = islandVolBase * 0.70 * (0.8 + 0.2 * Math.sin(world.time * 0.5));

                    islandGainNode.gain.setTargetAtTime(islandVol, gameAudioContext.currentTime, 0.1);
                    beachGainNode.gain.setTargetAtTime(beachVol, gameAudioContext.currentTime, 0.1);
                }
            }

            if (typeof raycastTargetsNeedUpdate !== 'undefined' && raycastTargetsNeedUpdate) {
                updateRaycastTargets();
                raycastTargetsNeedUpdate = false;
            }

            if (terrainNeedsUpdate) {
                // Process batched terrain updates
                const uniqueMounds = [...new Set(terrainAffectedMounds)];
                // Call once for all mounds. If only one mound, pass it for visual optimization.
                updateIslandGeometry(uniqueMounds.length === 1 ? uniqueMounds[0] : null);

                terrainNeedsUpdate = false;
                terrainAffectedMounds = [];
                updateWaterConnectivity();
                updateWaterVisuals();
            }

            // Atualiza exibição de peso (mesmo se pausado, para refletir mudanças no inventário)
            const totalWeight = calculateTotalWeight();
            if (weightDisplayElement) {
                weightDisplayElement.textContent = `Peso: ${totalWeight.toFixed(1)} kg / ${maxWeight} kg`;
                // Mostra o peso apenas se o cinto estiver visível
                if (inventoryBeltElement && inventoryBeltElement.style.visibility === 'visible') {
                    weightDisplayElement.classList.remove('hidden');
                } else {
                    weightDisplayElement.classList.add('hidden');
                }

                // Muda a cor do texto se estiver pesado
                if (totalWeight >= maxWeight) {
                    weightDisplayElement.style.color = '#ff4444';
                } else if (totalWeight >= maxWeight * 0.8) {
                    weightDisplayElement.style.color = '#ffaa00';
                } else {
                    weightDisplayElement.style.color = 'white';
                }
            }

            if (gamePaused || isFainted) {
                // Se o jogo estiver pausado ou desmaiado, apenas renderiza a cena, não atualiza a física ou o movimento do jogador
                renderer.render(scene, camera);
                return;
            }

            updateMeteors(delta);

            // Animate Campfires
            if (typeof activeCampfires !== 'undefined') {
                activeCampfires.forEach(cf => {
                    const fg = cf.userData.fireGroup;
                    if (fg) {
                        // Keep fire upright regardless of torch tilt
                        if (cf.userData.type === torchItemName) {
                            const parentQuat = new THREE.Quaternion();
                            fg.parent.getWorldQuaternion(parentQuat);
                            fg.quaternion.copy(parentQuat).invert();
                        }

                        const fireOffset = cf.userData.fireOffset || 0;
                        fg.children.forEach((fire, i) => {
                            if (fire instanceof THREE.Mesh && fire.userData.baseScale) {
                                const base = fire.userData.baseScale;
                                const speed = fire.userData.animSpeed || 1.0;
                                const layerOffset = fire.userData.animOffset || 0;
                                const totalOffset = fireOffset + layerOffset;

                                // Oscilação vertical suave (licking flames reduzido)
                                const lick = 1.0 + Math.sin(now * 0.006 * speed + totalOffset) * 0.12;
                                // Oscilação horizontal bem sutil
                                const swayX = Math.sin(now * 0.002 * speed + totalOffset) * 0.03;
                                const swayZ = Math.cos(now * 0.002 * speed + totalOffset) * 0.03;
                                // Cintilação mínima
                                const scale = 1.0 + Math.sin(now * 0.004 * speed + totalOffset) * 0.02;

                                fire.scale.set(base.x * scale, base.y * lick, base.z * scale);
                                fire.rotation.set(swayX, now * 0.0005 + totalOffset, swayZ);
                            }
                        });
                    }
                    if (cf.userData.fireLight) {
                        const baseIntensity = cf.userData.type === torchItemName ? 1.5 : 2.5;
                        const fireOffset = cf.userData.fireOffset || 0;
                        cf.userData.fireLight.intensity = (baseIntensity - 0.1) + Math.sin(now * 0.002 + fireOffset) * 0.1;
                    }
                });
            }

            // Lógica de destruição progressiva
            // NOVO: Adiciona a verificação `isAttemptingToDestroy` e a lógica de reinício repetida.
            if (isAttemptingToDestroy) {
                if (!isDestroying) {
                    startDestruction(); // Tenta reiniciar a destruição se a intenção estiver lá, mas a ação não.
                }
            }

            // NOVO: A lógica só continua se a destruição estiver em andamento E não estiver completa.
            if (isDestroying && !destructionComplete) {
                if (destroyTargetPosition) {
                    // Use calculateWrappedDistance for accurate distance checking in the wrapped world
                    // A verificação de distância agora apenas interrompe a ação, mas não a intenção.
                    if (calculateWrappedDistance(playerBody.position, destroyTargetPosition) > destroyDistance) {
                        isDestroying = false; // Interrompe a ação atual
                        progressContainer.style.display = 'none'; // Esconde a barra de progresso
                        // Não chame stopDestruction() completo para manter a intenção
                        return; // Pule o resto da lógica de destruição para este quadro
                    }
                }
                // Se estiver na mira, continua o progresso
                destroyProgress += delta;

                // Efeitos de partículas unificados
                if (destroyTargetDigInfo && Math.random() < 0.5) {
                    createSmokeEffect(destroyTargetDigInfo.mound.position, destroyTargetColor);
                } else if (destroyTargetMountainInfo && Math.random() < 0.3) {
                    createSmokeEffect(destroyTargetMountainInfo.position, destroyTargetColor);
                }


                if (destroyProgress >= targetDestroyTime) {
                     if (destroyTargetDigInfo) {
                        const mound = destroyTargetDigInfo.mound;
                        const isBuilding = destroyTargetDigInfo.isBuilding;

                        if (isBuilding) {
                            // Lógica de adicionar terra
                            mound.lastDugAt = world.time; // Reseta o timer de cura ao interagir
                            if (mound.maxHeightChange < 0) {
                                // Preenchendo um buraco
                                mound.growthStage--;
                                if (mound.growthStage <= 0) {
                                    mound.height = 0;
                                    terrainNeedsUpdate = true; terrainAffectedMounds.push(mound);
                                    mound.flattened = true;
                                    if (mound.mesh) scene.remove(mound.mesh);
                                    const vIndex = visualMounds.indexOf(mound);
                                    if (vIndex !== -1) visualMounds.splice(vIndex, 1);
                                    const mIndex = mounds.indexOf(mound);
                                    if (mIndex !== -1) mounds.splice(mIndex, 1);

                                    destructionComplete = true;
                                    isDestroying = false;
                                    progressContainer.style.display = 'none';
                                    currentMound = null;
                                } else {
                                    const maxHeight = (mound.maxHeightChange !== undefined ? mound.maxHeightChange : -1.0);
                                    mound.height = maxHeight * mound.growthStage / moundGrowthStages.length;
                                    if (mound.mesh) {
                                        const baseScale = moundGrowthStages[mound.growthStage - 1];
                                        const finalScale = mound.isPrecise ? baseScale * 0.8 : baseScale;
                                        mound.mesh.scale.set(finalScale, finalScale, finalScale);
                                    }
                                    terrainNeedsUpdate = true; terrainAffectedMounds.push(mound);
                                    destroyProgress = 0;
                                }
                            } else {
                                // Criando um monte (positivo)
                                mound.growthStage++;
                                if (mound.growthStage >= moundGrowthStages.length) {
                                    mound.height = (mound.maxHeightChange !== undefined ? mound.maxHeightChange : 1.0);
                                    destructionComplete = true;
                                    isDestroying = false;
                                    progressContainer.style.display = 'none';
                                    currentMound = null;

                                    // NOVO: Remove capim próximo quando o monte finaliza
                                    const worldStep = worldSize / hfGridSize;
                                    const removalRadius = (mound.radius + 0.5) * worldStep;
                                    removeCapimNear(mound.position, removalRadius);
                                } else {
                                    mound.height = 1.0 * mound.growthStage / moundGrowthStages.length;
                                    destroyProgress = 0;
                                }

                                if (mound.mesh) {
                                    const baseScale = moundGrowthStages[mound.growthStage - 1];
                                    mound.mesh.scale.set(baseScale, baseScale, baseScale);
                                }

                                terrainNeedsUpdate = true; terrainAffectedMounds.push(mound);
                            }

                            // Consome o item Terra ou Areia
                            const heldItem = beltItems[selectedSlotIndex];
                            if (heldItem && (heldItem.name === dirtItemName || heldItem.name === sandItemName)) {
                                heldItem.quantity--;
                                if (heldItem.quantity <= 0) {
                                    beltItems[selectedSlotIndex] = null;
                                }
                            }
                            updateBeltDisplay();
                            updateBackpackDisplay();
                            sounds.playPlace();
                            createSmokeEffect(mound.position, destroyTargetColor);
                        } else {
                            // Lógica de cavar
                            mound.lastDugAt = world.time; // Reseta o timer de cura ao interagir
                            if (mound.maxHeightChange > 0) {
                                // Retirando terra de um monte positivo
                                mound.growthStage--;
                                if (mound.growthStage <= 0) {
                                    mound.height = 0;
                                    terrainNeedsUpdate = true; terrainAffectedMounds.push(mound);
                                    mound.flattened = true;
                                    if (mound.mesh) scene.remove(mound.mesh);
                                    const vIndex = visualMounds.indexOf(mound);
                                    if (vIndex !== -1) visualMounds.splice(vIndex, 1);
                                    const mIndex = mounds.indexOf(mound);
                                    if (mIndex !== -1) mounds.splice(mIndex, 1);

                                    destructionComplete = true;
                                    isDestroying = false;
                                    progressContainer.style.display = 'none';
                                    currentMound = null;
                                } else {
                                    const maxHeight = 1.0;
                                    mound.height = maxHeight * mound.growthStage / moundGrowthStages.length;
                                    if (mound.mesh) {
                                        const baseScale = moundGrowthStages[mound.growthStage - 1];
                                        mound.mesh.scale.set(baseScale, baseScale, baseScale);
                                    }
                                    terrainNeedsUpdate = true; terrainAffectedMounds.push(mound);
                                    destroyProgress = 0;
                                }
                                // Gain correct resource when building/mining a hill
                                const distFromCenter = Math.sqrt(mound.position.x ** 2 + mound.position.z ** 2);
                                let itemToGive;
                                let quantityToGive = 1;
                                if (mound.isStoneLayer) {
                                    itemToGive = stoneItemName;
                                    quantityToGive = 1;
                                } else if (mound.itemType) {
                                    itemToGive = mound.itemType;
                                } else if (distFromCenter > capimRadius) {
                                    itemToGive = sandItemName;
                                } else {
                                    itemToGive = dirtItemName;
                                }
                                addItemToInventory(backpackItems, { name: itemToGive, quantity: quantityToGive });
                                updateBackpackDisplay();
                            } else {
                                // Lógica original de cavar buraco
                                createDustCloud(mound.position, destroyTargetColor);
                                mound.growthStage++;

                                // Gain 1 terra/sand or 10 stones for each stage of digging
                                const distFromCenter = Math.sqrt(mound.position.x ** 2 + mound.position.z ** 2);
                                let itemToGive;
                                let quantityToGive = 1;
                                if (mound.isStoneLayer) {
                                    itemToGive = stoneItemName;
                                    quantityToGive = 1;
                                } else if (mound.itemType) {
                                    itemToGive = mound.itemType;
                                } else if (distFromCenter > capimRadius) {
                                    itemToGive = sandItemName;
                                } else {
                                    itemToGive = dirtItemName;
                                }
                                addItemToInventory(backpackItems, { name: itemToGive, quantity: quantityToGive });
                                updateBackpackDisplay();

                                if (mound.growthStage >= moundGrowthStages.length) {
                                    mound.height = (mound.maxHeightChange !== undefined ? mound.maxHeightChange : -1.0);
                                    if (mound.mesh) {
                                        const finalScale = mound.isPrecise ? 0.8 : 1.0;
                                        mound.mesh.scale.set(finalScale, finalScale, finalScale);
                                    }

                                    // NOVO: Remove capim próximo quando o buraco finaliza
                                    const worldStep = worldSize / hfGridSize;
                                    const removalRadius = (mound.radius + 0.5) * worldStep;
                                    removeCapimNear(mound.position, removalRadius);

                                    destructionComplete = true;
                                    isDestroying = false;
                                    progressContainer.style.display = 'none';
                                    mound.lastDugAt = world.time;
                                    currentMound = null;
                                } else {
                                    const baseScale = moundGrowthStages[mound.growthStage - 1];
                                    if (mound.mesh) {
                                        const finalScale = mound.isPrecise ? baseScale * 0.8 : baseScale;
                                        mound.mesh.scale.set(finalScale, finalScale, finalScale);
                                    }
                                    destroyProgress = 0; // Reinicia para o próximo estágio
                                    const maxHeight = (mound.maxHeightChange !== undefined ? mound.maxHeightChange : -1.0);
                                    mound.height = maxHeight * mound.growthStage / moundGrowthStages.length;
                                }
                            }
                        }

                        terrainNeedsUpdate = true; terrainAffectedMounds.push(mound);
                    } else if (destroyTargetMountainInfo) {
                        createDustCloud(destroyTargetMountainInfo.position, destroyTargetColor);
                        addItemToInventory(backpackItems, { name: stoneItemName, quantity: 1 });
                        updateBackpackDisplay();
                        destroyProgress = 0; // Reset mining progress to allow for continuous mining
                    }
                    // Lógica para Capim (Instanced)
                    else if (destroyTargetCapimInfo) {
                        const cluster = destroyTargetCapimInfo.cluster;
                        const clusterIndex = capimClusters.indexOf(cluster);
                        if (clusterIndex !== -1) {
                            // Esconde as instâncias no InstancedMesh
                            const zeroMatrix = new THREE.Matrix4().makeScale(0, 0, 0);
                            for (let k = 0; k < bladesPerCluster; k++) {
                                const instanceIdx = cluster.poolIndex * bladesPerCluster + k;
                                capimInstancedMeshes[0].setMatrixAt(instanceIdx, zeroMatrix);
                            }
                            capimInstancedMeshes[0].instanceMatrix.needsUpdate = true;

                            // Retorna o índice para o pool
                            capimFreeIndices.push(cluster.poolIndex);

                            capimClusters.splice(clusterIndex, 1);
                            addItemToInventory(backpackItems, { name: capimItemName, quantity: 1 });
                            updateBackpackDisplay();
                            createSmokeEffect(cluster.position, destroyTargetColor);
                        }
                        destructionComplete = true;
                        isDestroying = false;
                        progressContainer.style.display = 'none';
                    }
                    // Lógica para outros objetos destrutíveis (depósitos, blocos)
                    else {
                        let position;
                        if (destroyTargetBody) {
                            position = destroyTargetBody.position.clone();
                            const bodyIndex = placedConstructionBodies.indexOf(destroyTargetBody);
                            const collectibleIndex = collectibleBoxes.findIndex(box => box.body === destroyTargetBody);
                            let itemsToDrop = [];
                            let dropPosition = position.clone();
                            let isTreeObject = false;

                            if (bodyIndex !== -1) {
                                isTreeObject = !!destroyTargetBody.userData.growthStage;
                                const treeType = destroyTargetBody.userData.treeType || 'normal';
                                const isChest = !!destroyTargetBody.userData.isChest;
                                const isRaft = !!destroyTargetBody.userData.isRaft;

                                // Se for uma árvore, ajusta a posição de drop para o nível do chão
                                if (isTreeObject && destroyTargetBody.userData.dimensions) {
                                    dropPosition.y -= destroyTargetBody.userData.dimensions.height / 2 - 0.5;
                                }

                                if (isRaft) {
                                    const raftIdx = raftBodies.indexOf(destroyTargetBody);
                                    if (raftIdx !== -1) raftBodies.splice(raftIdx, 1);
                                    if (currentRaftBody === destroyTargetBody) {
                                        isDrivingRaft = false;
                                        currentRaftBody = null;
                                        // Restaura colisão e dinâmica do jogador
                                        playerBody.type = CANNON.Body.DYNAMIC;
                                        playerBody.collisionResponse = true;
                                        playerBody.collisionFilterGroup = 1;
                                        playerBody.collisionFilterMask = 1;
                                        playerBody.wakeUp();
                                    }
                                }

                                // Salva os itens que devem ser dropados ANTES de remover o corpo
                                if (isChest) {
                                    const chestInventory = destroyTargetBody.userData.inventory;
                                    chestInventory.forEach(item => { if (item) itemsToDrop.push(item); });
                                }

                                if (isTreeObject) {
                                    addItemToInventory(backpackItems, { name: branchItemName, quantity: 3 });
                                    if (treeType === 'apple') {
                                        addItemToInventory(backpackItems, { name: appleSeedItemName, quantity: 1 });
                                        if (destroyTargetBody.userData.apples) {
                                            destroyTargetBody.userData.apples.forEach(appleData => {
                                                if (!appleData.picked) addItemToInventory(backpackItems, { name: appleItemName, quantity: 1 });
                                            });
                                        }
                                        const appleTreeIndex = appleTrees.indexOf(destroyTargetBody);
                                        if (appleTreeIndex !== -1) appleTrees.splice(appleTreeIndex, 1);
                                    } else if (treeType === 'coconut') {
                                        addItemToInventory(backpackItems, { name: coconutItemName, quantity: 1 }); // Semente/Fruto
                                        if (destroyTargetBody.userData.coconuts) {
                                            destroyTargetBody.userData.coconuts.forEach(cocoData => {
                                                if (!cocoData.picked) addItemToInventory(backpackItems, { name: coconutItemName, quantity: 1 });
                                            });
                                        }
                                        const cocoTreeIndex = window.coconutTrees.indexOf(destroyTargetBody);
                                        if (cocoTreeIndex !== -1) window.coconutTrees.splice(cocoTreeIndex, 1);
                                    } else if (treeType === 'normal') {
                                        addItemToInventory(backpackItems, { name: pineSeedItemName, quantity: 1 });
                                    }
                                } else if (destroyTargetBody.userData.type === stoneItemName || destroyTargetBody.userData.type === stoneBlockItemName || destroyTargetBody.userData.type === stoneFloorItemName) {
                                    addItemToInventory(backpackItems, { name: stoneItemName, quantity: 1 });
                                } else if (destroyTargetBody.userData.type === campfireItemName) {
                                    addItemToInventory(backpackItems, { name: branchItemName, quantity: 2 });
                                } else if (destroyTargetBody.userData.type === torchItemName) {
                                    addItemToInventory(backpackItems, { name: branchItemName, quantity: 1 });
                                    if (typeof activeCampfires !== 'undefined') {
                                        const cfIdx = activeCampfires.indexOf(destroyTargetBody);
                                        if (cfIdx !== -1) activeCampfires.splice(cfIdx, 1);
                                    }
                                } else {
                                    // Retorna o item original para outros tipos de construção (cob, piso, madeira, etc)
                                    const type = destroyTargetBody.userData.type;
                                    if (type) {
                                        addItemToInventory(backpackItems, { name: type, quantity: 1 });
                                    }
                                }

                                // Remove o corpo e a malha PRIMEIRO para evitar colisões indesejadas com os itens dropados
                                world.removeBody(destroyTargetBody);
                                scene.remove(placedConstructionMeshes[bodyIndex]);
                                placedConstructionBodies.splice(bodyIndex, 1);
                                placedConstructionMeshes.splice(bodyIndex, 1);
                                raycastTargetsNeedUpdate = true;

                                // Agora dropa os itens (apenas se for contêiner)
                                itemsToDrop.forEach(item => {
                                    createDroppableItem(dropPosition, item);
                                });

                                if (isTreeObject) {
                                    setTimeout(respawnTree, 100);
                                }
                            } else if (collectibleIndex !== -1) {
                                const itemType = destroyTargetBody.userData.type;
                                const itemQuantity = destroyTargetBody.userData.quantity || 1;
                                addItemToInventory(backpackItems, { name: itemType, quantity: itemQuantity });

                                world.removeBody(destroyTargetBody);
                                scene.remove(collectibleBoxes[collectibleIndex].mesh);
                                collectibleBoxes.splice(collectibleIndex, 1);
                                raycastTargetsNeedUpdate = true;
                            }
                            updateBackpackDisplay();
                            if (position) createSmokeEffect(position, destroyTargetColor);
                        }
                        destructionComplete = true;
                        isDestroying = false;
                        progressContainer.style.display = 'none';
                    }
                } else {
                    // Atualiza a barra de progresso
                    const progressPercentage = Math.min((destroyProgress / targetDestroyTime) * 100, 100);
                    progressBar.style.width = `${progressPercentage}%`;
                }
            } else if (isDestroying && destructionComplete) {
                // Se a destruição foi concluída, chama stopDestruction para limpar
                stopDestruction();
            }


            // Define currentPlayerRadius no início da função animate
            const currentPlayerRadius = isCrouching ? crouchRadius : playerRadius;

            // --- CÁLCULO DE ENTRADAS (INPUTS) ANTES DO STEP DE FÍSICA ---

            // Sincroniza a rotação horizontal do corpo do jogador com a rotação da câmera ANTES de calcular movimento
            playerBody.quaternion.setFromEuler(0, camera.rotation.y, 0);

            // Lógica de movimento do jogador com base nas teclas pressionadas
            let currentMoveSpeed = walkSpeed;

            // Aplica penalidade de peso
            const weightFactor = Math.max(0, 1 - (totalWeight / maxWeight));
            currentMoveSpeed *= weightFactor;

            if (keysPressed['shift']) {
                currentMoveSpeed *= runSpeedMultiplier;
            }
            if (isCrouching) {
                currentMoveSpeed *= crouchSpeedMultiplier;
            }

            const forward = new THREE.Vector3();
            const right = new THREE.Vector3();
            const movementVector = new THREE.Vector3(0, 0, 0);

            camera.getWorldDirection(forward);
            forward.y = 0;
            forward.normalize();
            right.crossVectors(forward, new THREE.Vector3(0, 1, 0)).normalize();

            // Lógica de pulo proporcional
            if (isJumpBoosting) {
                if (keysPressed[' '] && jumpBoostTimer < 0.4 && !isFlying && !isClimbing && !isDrivingRaft) {
                    // Aplica uma força ascendente constante durante o período de boost
                    // 3500 é um valor que supera a gravidade (-30 * mass 80 = -2400) e fornece aceleração
                    playerBody.applyForce(new CANNON.Vec3(0, 3500, 0));
                    jumpBoostTimer += delta;
                } else {
                    isJumpBoosting = false;
                }
            }

            if (isFlying) {
                const flySpeed = 50;
                let flyVector = new THREE.Vector3(0, 0, 0);
                if (keysPressed['w']) flyVector.add(forward);
                if (keysPressed['s']) flyVector.sub(forward);
                if (keysPressed['a']) flyVector.sub(right);
                if (keysPressed['d']) flyVector.add(right);
                if (keysPressed[' ']) flyVector.y += 1;
                if (keysPressed['shift']) flyVector.y -= 1;

                playerBody.position.x += flyVector.x * flySpeed * delta;
                playerBody.position.y += flyVector.y * flySpeed * delta;
                playerBody.position.z += flyVector.z * flySpeed * delta;
                playerBody.velocity.set(0, 0, 0);
            } else if (isClimbing && climbingTreeBody) {
                // Se a árvore sumir (destruída)
                if (!placedConstructionBodies.includes(climbingTreeBody)) {
                    isClimbing = false;
                    climbingTreeBody = null;
                } else {
                    // Mantém o jogador preso à árvore horizontalmente (usando offset para ficar fora do tronco)
                    playerBody.position.x = climbingTreeBody.position.x + climbingOffset.x;
                    playerBody.position.z = climbingTreeBody.position.z + climbingOffset.z;

                    // Movimento vertical com W e S
                    let verticalMove = 0;
                    const treeHeight = climbingTreeBody.userData.dimensions ? climbingTreeBody.userData.dimensions.height : 5;
                    const treeBaseY = climbingTreeBody.position.y - treeHeight / 2;
                    const treeTopY = climbingTreeBody.position.y + treeHeight / 2;
                    const playerH = isCrouching ? crouchBodyHeight : playerBodyHeight;

                    if (keysPressed['w']) {
                        // Limita a subida ao topo da árvore
                        if (playerBody.position.y < treeTopY) {
                            verticalMove = walkSpeed * 1.5;
                        }
                    }
                    if (keysPressed['s']) {
                        // Limita a descida ao chão
                        if (playerBody.position.y > treeBaseY + playerH / 2) {
                            verticalMove = -walkSpeed * 1.5;
                        } else {
                            // Solta automaticamente se chegar ao chão
                            isClimbing = false;
                            climbingTreeBody = null;
                        }
                    }

                    playerBody.velocity.set(0, verticalMove, 0);

                    // Impede queda por gravidade se estiver subindo ou parado
                    if (verticalMove >= 0) {
                        playerBody.applyForce(new CANNON.Vec3(0, Math.abs(world.gravity.y) * playerBody.mass, 0));
                    }

                    // Soltar se pular
                    if (keysPressed[' ']) {
                        isClimbing = false;
                        climbingTreeBody = null;
                        playerBody.applyImpulse(new CANNON.Vec3(0, 400 * 3, 0));
                    }
                }
            } else if (isDrivingRaft && currentRaftBody) {
                // Movimento da jangada
                const raftInWater = currentRaftBody.position.y < waterLevel + 2.0 && hasWaterAt(currentRaftBody.position.x, currentRaftBody.position.z);

                const speedMultiplier = raftInWater ? 1.0 : 0.0; // Bloqueia movimento na terra
                const maxLinearSpeed = 37.5 * speedMultiplier;
                const maxAngularSpeed = 1.5 * speedMultiplier;

                let linearInput = 0;
                if (keysPressed['w']) linearInput += 1;
                if (keysPressed['s']) linearInput -= 1;

                let angularInput = 0;
                if (keysPressed['a']) angularInput += 1;
                if (keysPressed['d']) angularInput -= 1;

                // Forward vector from raft's quaternion (Z+ is forward)
                const forwardRaft = new CANNON.Vec3(0, 0, 1);
                currentRaftBody.quaternion.vmult(forwardRaft, forwardRaft);

                const targetVelocityX = forwardRaft.x * linearInput * maxLinearSpeed;
                const targetVelocityZ = forwardRaft.z * linearInput * maxLinearSpeed;
                const targetAngularVelocityY = angularInput * maxAngularSpeed;

                // Suavização do movimento (lerp) para maior fluidez (independente de frame-rate)
                const lerpFactor = 1.0 - Math.pow(1.0 - 0.02, delta * 60);
                currentRaftBody.velocity.x += (targetVelocityX - currentRaftBody.velocity.x) * lerpFactor;
                currentRaftBody.velocity.z += (targetVelocityZ - currentRaftBody.velocity.z) * lerpFactor;
                currentRaftBody.angularVelocity.y += (targetAngularVelocityY - currentRaftBody.angularVelocity.y) * lerpFactor;

                // Manual angular damping for smoother rotation stop
                if (angularInput === 0) {
                    currentRaftBody.angularVelocity.y *= Math.pow(0.95, delta * 60);
                }

                if (linearInput !== 0 || angularInput !== 0) {
                    currentRaftBody.allowSleep = false;
                    currentRaftBody.wakeUp();
                }
            } else if (keysPressed['w'] || keysPressed['s'] || keysPressed['a'] || keysPressed['d'] || keysPressed[' ']) {
                // Restore zero friction for movement
                if (playerGroundContactMaterial) playerGroundContactMaterial.friction = 0;
                if (playerConstructionContactMaterial) playerConstructionContactMaterial.friction = 0;

                // If any movement or jump key is pressed, we handle movement/jumping
                // and avoid the stabilization (stop) logic in the 'else' block.
                if (keysPressed['w']) movementVector.add(forward);
                if (keysPressed['s']) movementVector.sub(forward);
                if (keysPressed['a']) movementVector.sub(right);
                if (keysPressed['d']) movementVector.add(right);

                if (movementVector.lengthSq() > 0) {
                    const normalizedMovementVector = movementVector.clone().normalize();
                    // Direct velocity assignment for horizontal movement ensures a "fast" and responsive feel.
                    playerBody.velocity.x = normalizedMovementVector.x * currentMoveSpeed;
                    playerBody.velocity.z = normalizedMovementVector.z * currentMoveSpeed;
                }
