                playerBody.allowSleep = false;
            } else {
                // If no movement keys are pressed, apply a small damping or full stop
                // to prevent sliding on moderate slopes when friction is 0.
                let onWalkableGround = false;
                if (!isFlying && !isClimbing && !isDrivingRaft) {
                    for (let i = 0; i < world.contacts.length; i++) {
                        const c = world.contacts[i];
                        if (c.bi === playerBody || c.bj === playerBody) {
                            const surfaceNormalY = (c.bi === playerBody) ? -c.ni.y : c.ni.y;
                            if (surfaceNormalY < 0.5) { // 60 degrees threshold (cos 60 = 0.5)
                                onSteepSlope = true;
                            } else {
                                onWalkableGround = true;
                            }
                        }
                    }
                }
                window.onSteepSlope = onSteepSlope;
                window.onWalkableGround = onWalkableGround;

                if (onWalkableGround) {
                    // Full stop on walkable ground to prevent zero-friction sliding and gravity drift
                    playerBody.velocity.x = 0;
                    playerBody.velocity.z = 0;
                    if (Math.abs(playerBody.velocity.y) < 0.1) {
                        playerBody.velocity.y = 0;
                    }
                    // Apply high friction while idle to prevent micro-sliding on slopes
                    if (playerGroundContactMaterial) playerGroundContactMaterial.friction = 10.0;
                    if (playerConstructionContactMaterial) playerConstructionContactMaterial.friction = 10.0;
                    // Apply counter-gravity force to perfectly stabilize on slopes
                    const antiGravity = new CANNON.Vec3(0, -world.gravity.y * playerBody.mass, 0);
                    playerBody.applyForce(antiGravity);
                } else if (!onSteepSlope) {
                    // Normal damping in the air or non-steep surfaces
                    playerBody.velocity.x *= 0.9;
                    playerBody.velocity.z *= 0.9;
                }

                if (pickedObjectBody === null && Math.abs(playerBody.velocity.y) < 0.1) {
                    playerBody.allowSleep = true;
                } else {
                    playerBody.allowSleep = false;
                }
            }

            // --- SINCRONIZAÇÃO E WRAPPING ANTES DO STEP DE FÍSICA ---
            // Aplica o envolvimento ao corpo de física do jogador
            wrapObject(playerBody, worldSize);

            // Aplica o envolvimento aos corpos de física dos cubos e blocos
            const allPickableBodies = collectibleBoxes.map(b => b.body);
            const allStaticBodies = [...placedConstructionBodies];
            [...allPickableBodies, ...allStaticBodies].forEach(body => {
                if (body !== pickedObjectBody) { // Apenas se não estiver sendo segurado
                    wrapObject(body, worldSize);
                }
            });

            // Sincroniza a posição de todos os 9 corpos de física da ilha com o tile atual do jogador
            const currentTileX = Math.round(playerBody.position.x / worldSize) * worldSize;
            const currentTileZ = Math.round(playerBody.position.z / worldSize) * worldSize;
            islandMeshes.forEach(tile => {
                tile.body.position.set(currentTileX + tile.offsetX - worldSize / 2, 0, currentTileZ + tile.offsetZ + worldSize / 2);
                tile.body.updateAABB();
            });

            // Atualiza o mundo da física e o tempo simulado
            world.step(1 / 60, delta, 10);

            // Re-apply zero velocity after physics step if player is supposed to be static
            // to prevent tiny movements accumulated during the step on slopes.
            if (!gamePaused && !isFlying && !isClimbing && !isDrivingRaft) {
                const noMovementKeys = !(keysPressed['w'] || keysPressed['s'] || keysPressed['a'] || keysPressed['d'] || keysPressed[' ']);
                if (noMovementKeys && window.onWalkableGround) {
                    playerBody.velocity.x = 0;
                    playerBody.velocity.z = 0;
                    if (Math.abs(playerBody.velocity.y) < 0.1) playerBody.velocity.y = 0;
                }
            }

            // Sincroniza o jogador com a jangada APÓS o step da física para evitar jitter visual
            if (isDrivingRaft && currentRaftBody) {
                playerBody.position.set(
                    currentRaftBody.position.x,
                    currentRaftBody.position.y + 0.8,
                    currentRaftBody.position.z
                );
                playerBody.velocity.set(0, 0, 0);
            }

            // Lógica para os cubos e blocos: sempre dinâmicos e com massa original, a menos que sejam segurados
            // Apenas os cubos são pickable agora

            allPickableBodies.forEach(body => {
                // Ignora o objeto que está sendo segurado
                if (body === pickedObjectBody) {
                    return;
                }
                // Cubos devem ser dinâmicos quando não estão sendo pegos
                body.mass = body.userData.originalMass;
                body.type = CANNON.Body.DYNAMIC;
                body.allowSleep = true; // Permite que cubos "durmam" para otimização
                body.wakeUp(); // Garante que esteja ativo se houver movimento
                body.collisionResponse = true; // Garante que a resposta de colisão esteja sempre ativada
            });

            allStaticBodies.forEach(body => {
                // Blocos (apenas os colocados) devem ser estáticos, exceto jangadas
                if (body.userData.isRaft) {
                    return; // Jangadas permanecem dinâmicas
                }
                body.mass = 0;
                body.type = CANNON.Body.STATIC;
                body.allowSleep = false; // Mantém ativo para colisão, mas não se move por física
                body.collisionResponse = true; // Garante que a resposta de colisão esteja sempre ativada
            });

            // Calcula o offset da "origem visual" para toda a grade de tiles
            // ANTES de envolver as posições. Isso é crucial para o efeito de mundo contínuo.
            const playerX = playerBody.position.x;
            const playerZ = playerBody.position.z;
            // visualOffsetX e visualOffsetZ removidos para evitar saltos duplos no envolvimento do mundo
            visualOffsetX = 0;
            visualOffsetZ = 0;


            // Nature population maintenance
            frameCount++;
            if (frameCount % 60 === 0) {
                // NOVO: Respawn de maçãs nas macieiras adultas
                appleTrees.forEach(body => {
                    if (body.userData.apples) {
                        body.userData.apples.forEach((appleData, index) => {
                            if (appleData.picked && world.time - appleData.lastPickedTime > 30) {
                                appleData.picked = false;
                                const mesh = placedConstructionMeshes[placedConstructionBodies.indexOf(body)];
                                if (mesh && mesh.children) {
                                    const appleMesh = mesh.children.find(child => child.userData.isApple && child.userData.appleIndex === index);
                                    if (appleMesh) appleMesh.visible = true;
                                }
                            }
                        });
                    }
                });
                // NOVO: Respawn de cocos nos coqueiros adultos
                window.coconutTrees.forEach(body => {
                    if (body.userData.coconuts) {
                        body.userData.coconuts.forEach((cocoData, index) => {
                            if (cocoData.picked && world.time - cocoData.lastPickedTime > 30) {
                                cocoData.picked = false;
                                const mesh = placedConstructionMeshes[placedConstructionBodies.indexOf(body)];
                                if (mesh && mesh.children) {
                                    const cocoMesh = mesh.children.find(child => child.userData.isCoconut && child.userData.coconutIndex === index);
                                    if (cocoMesh) cocoMesh.visible = true;
                                }
                            }
                        });
                    }
                });
                respawnTree();
            }

            // Nature growth: gradually spawn capim clusters
            if (world.time - lastCapimGrowthTime >= 10) {
                lastCapimGrowthTime = world.time;
                if (capimClusters.length < targetCapimCount) {
                    respawnCapim(1);
                }
            }

            // Verificação de pedras e queda de meteoro: 1 vez ao dia em horário aleatório
            const totalElapsedDays = Math.floor(world.time / dayDuration);
            if (totalElapsedDays > currentDayForMeteor) {
                currentDayForMeteor = totalElapsedDays;
                // Agenda uma checagem aleatória para este novo dia (entre 0 e 100% da duração do dia)
                nextMeteorCheckTime = (totalElapsedDays * dayDuration) + (Math.random() * dayDuration);
            }

            if (nextMeteorCheckTime !== -1 && world.time >= nextMeteorCheckTime) {
                nextMeteorCheckTime = -1; // Reseta para não checar mais de uma vez no mesmo dia
                const currentStoneCount = collectibleBoxes.filter(box => box.body.userData && box.body.userData.type === stoneItemName).length;
                if (currentStoneCount < 100) {
                    spawnMeteor();
                }
            }

            // Atualiza as posições das malhas do terreno com base na posição envolvida do jogador
            // Update onSteepSlope flag based on current contacts
            if (!isFlying && !isClimbing && !isDrivingRaft) {
                for (let i = 0; i < world.contacts.length; i++) {
                    const c = world.contacts[i];
                    if (c.bi === playerBody || c.bj === playerBody) {
                        const surfaceNormalY = (c.bi === playerBody) ? -c.ni.y : c.ni.y;
                        if (surfaceNormalY < 0.5) { // 60 degrees threshold
                            window.onSteepSlope = onSteepSlope = true;
                            break;
                        }
                    }
                }
            }

            // Sincronização dos corpos de física movida para antes do world.step
            projScreenMatrix.multiplyMatrices(camera.projectionMatrix, camera.matrixWorldInverse);
            frustum.setFromProjectionMatrix(projScreenMatrix);

            const renderDistSq = renderDistance * renderDistance;
            const halfWorldSize = worldSize / 2;

            islandMeshes.forEach(tile => {
                tile.mesh.position.x = tile.offsetX - visualOffsetX;
                tile.mesh.position.y = 0;
                tile.mesh.position.z = tile.offsetZ - visualOffsetZ;
                tile.mesh.updateMatrixWorld();

                const dist = camera.position.distanceTo(tile.mesh.position);
                // Culling estrito para o terreno (um pouco maior que renderDistance para evitar buracos nas bordas)
                // Também verifica se está no frustum (usando bounding box do tile)
                tile.mesh.visible = (dist <= renderDistance + worldSize) && (tile.mesh.geometry ? frustum.intersectsObject(tile.mesh) : true);
            });

            waterMeshes.forEach(tile => {
                tile.mesh.position.x = tile.offsetX - visualOffsetX;
                tile.mesh.position.z = tile.offsetZ - visualOffsetZ;
                tile.mesh.updateMatrixWorld();

                const dist = camera.position.distanceTo(tile.mesh.position);
                tile.mesh.visible = (dist <= renderDistance + worldSize) && (tile.mesh.geometry ? frustum.intersectsObject(tile.mesh) : true);
            });

            seabedMeshes.forEach(tile => {
                tile.mesh.position.x = tile.offsetX - visualOffsetX;
                tile.mesh.position.z = tile.offsetZ - visualOffsetZ;
                tile.mesh.updateMatrixWorld();

                const dist = camera.position.distanceTo(tile.mesh.position);
                tile.mesh.visible = (dist <= renderDistance + worldSize) && (tile.mesh.geometry ? frustum.intersectsObject(tile.mesh) : true);
            });

            // Otimização: Wrapping de instância única para todos os objetos e culling estrito
            collectibleBoxes.forEach(box => {
                const body = box.body;
                const mesh = box.mesh;
                const dx = body.position.x - playerBody.position.x;
                const dz = body.position.z - playerBody.position.z;

                let wrappedX = body.position.x;
                let wrappedZ = body.position.z;
                if (Math.abs(dx) > halfWorldSize) wrappedX += (dx > 0 ? -worldSize : worldSize);
                if (Math.abs(dz) > halfWorldSize) wrappedZ += (dz > 0 ? -worldSize : worldSize);

                const fDx = wrappedX - playerBody.position.x;
                const fDz = wrappedZ - playerBody.position.z;
                const fDy = body.position.y - playerBody.position.y;
                const distSq = fDx*fDx + fDy*fDy + fDz*fDz;

                if (distSq > renderDistSq) {
                    mesh.visible = false;
                } else {
                    mesh.position.set(wrappedX - visualOffsetX, body.position.y, wrappedZ - visualOffsetZ);
                    mesh.quaternion.copy(body.quaternion);
                    mesh.updateMatrixWorld();
                    // Adiciona frustum culling manual
                    mesh.visible = mesh.geometry ? frustum.intersectsObject(mesh) : true;
                }
            });

            placedConstructionBodies.forEach((body, index) => {
                const mesh = placedConstructionMeshes[index];
                const dx = body.position.x - playerBody.position.x;
                const dz = body.position.z - playerBody.position.z;

                let wrappedX = body.position.x;
                let wrappedZ = body.position.z;
                if (Math.abs(dx) > halfWorldSize) wrappedX += (dx > 0 ? -worldSize : worldSize);
                if (Math.abs(dz) > halfWorldSize) wrappedZ += (dz > 0 ? -worldSize : worldSize);

                const fDx = wrappedX - playerBody.position.x;
                const fDz = wrappedZ - playerBody.position.z;
                const fDy = body.position.y - playerBody.position.y;
                const distSq = fDx*fDx + fDy*fDy + fDz*fDz;

                if (distSq > renderDistSq) {
                    mesh.visible = false;
                } else {
                    mesh.position.set(wrappedX - visualOffsetX, body.position.y, wrappedZ - visualOffsetZ);
                    mesh.quaternion.copy(body.quaternion);
                    mesh.updateMatrixWorld();
                    // Adiciona frustum culling manual
                    mesh.visible = mesh.geometry ? frustum.intersectsObject(mesh) : true;
                }
            });


            visualMounds.forEach(mound => {
                const dx = mound.position.x - playerBody.position.x;
                const dz = mound.position.z - playerBody.position.z;

                let wrappedX = mound.position.x;
                let wrappedZ = mound.position.z;
                if (Math.abs(dx) > halfWorldSize) wrappedX += (dx > 0 ? -worldSize : worldSize);
                if (Math.abs(dz) > halfWorldSize) wrappedZ += (dz > 0 ? -worldSize : worldSize);

                const fDx = wrappedX - playerBody.position.x;
                const fDz = wrappedZ - playerBody.position.z;
                const fDy = mound.position.y - playerBody.position.y;
                const distSq = fDx*fDx + fDy*fDy + fDz*fDz;

                if (distSq > renderDistSq) {
                    mound.mesh.visible = false;
                } else {
                    mound.mesh.position.set(wrappedX - visualOffsetX, mound.position.y, wrappedZ - visualOffsetZ);
                    mound.mesh.quaternion.copy(mound.quaternion);
                    mound.mesh.updateMatrixWorld();
                    // Adiciona frustum culling manual
                    mound.mesh.visible = mound.mesh.geometry ? frustum.intersectsObject(mound.mesh) : true;
                }
            });

            // NOVO: Culling para Capim Instanciada
            capimInstancedMeshes.forEach(mesh => {
                // Como são 9 tiles, verificamos a distância do centro do tile visual
                const dist = camera.position.distanceTo(mesh.position);
                mesh.visible = (dist <= renderDistance + worldSize) && (mesh.geometry ? frustum.intersectsObject(mesh) : true);
            });

            // NOVO: Lógica para fechar buracos inativos (curar terreno após 10 segundos)
            for (let i = visualMounds.length - 1; i >= 0; i--) {
                const mound = visualMounds[i];
                // Cura apenas buracos reais abaixo do nível natural (isHole) após 30 segundos de inatividade
                if (mound !== currentMound && mound.isHole && world.time - mound.lastDugAt > 30) {
                    mound.closingStartTime = undefined;
                    closingMounds.push(mound);
                    visualMounds.splice(i, 1);
                }
            }

            for (let i = closingMounds.length - 1; i >= 0; i--) {
                const mound = closingMounds[i];

                // Inicializa o temporizador e a altura inicial de cura
                if (mound.closingStartTime === undefined) {
                    mound.closingStartTime = world.time;
                    mound.startHeight = mound.height;
                }

                const duration = 5.0; // 5 segundos para curar suavemente
                const elapsed = world.time - mound.closingStartTime;
                const progress = Math.min(1.0, elapsed / duration);

                const oldHeight = mound.height;
                mound.height = mound.startHeight * (1 - progress);
                const currentGroundLevel = islandSurfaceHeight + mound.height;

                // NOVO: Empurra objetos para cima se o buraco estiver fechando (apenas se o terreno subir)
                const pushRadius = 2.0;
                const moundWorldPos = { x: mound.position.x, y: mound.position.y, z: mound.position.z };

                // Empurra o jogador
                const playerDist = calculateWrappedDistance(playerBody.position, moundWorldPos);
                if (playerDist < pushRadius) {
                    const bottomY = playerBody.position.y - (isCrouching ? crouchRadius : playerRadius);
                    if (bottomY < currentGroundLevel) {
                        playerBody.position.y = currentGroundLevel + (isCrouching ? crouchRadius : playerRadius);
                    }
                }
                // Empurra caixotes
                collectibleBoxes.forEach(box => {
                    const boxDist = calculateWrappedDistance(box.body.position, moundWorldPos);
                    if (boxDist < pushRadius) {
                        const boxHeight = (box.body.userData.dimensions ? box.body.userData.dimensions.height : 1.0);
                        const bottomY = box.body.position.y - boxHeight / 2;
                        if (bottomY < currentGroundLevel) {
                            box.body.position.y = currentGroundLevel + boxHeight / 2;
                        }
                    }
                });
                // Empurra construções (como contêiners e blocos)
                placedConstructionBodies.forEach(body => {
                    const bodyDist = calculateWrappedDistance(body.position, moundWorldPos);
                    if (bodyDist < pushRadius) {
                        const bodyHeight = (body.userData.dimensions ? body.userData.dimensions.height : (body.userData.isChest ? 1.0 : 0.4));
                        const bottomY = body.position.y - bodyHeight / 2;
                        if (bottomY < currentGroundLevel) {
                            body.position.y = currentGroundLevel + bodyHeight / 2;
                        }
                    }
                });

                // Atualiza a escala visual suavemente
                const currentScale = Math.abs(mound.height / (mound.maxHeightChange || -1.0));
                if (mound.mesh) {
                    const finalScale = mound.isPrecise ? currentScale * 0.8 : currentScale;
                    // Mantém um tamanho mínimo para não desaparecer antes da hora e evitar erros de escala zero
                    const s = Math.max(0.001, finalScale);
                    mound.mesh.scale.set(s, s, s);
                }

                // Sincronização de física em tempo real
                terrainNeedsUpdate = true;
                terrainAffectedMounds.push(mound);

                if (progress >= 1.0) {
                    // Remove o mound completamente ao fim da cura
                    scene.remove(mound.mesh);
                    const mIndex = mounds.indexOf(mound);
                    if (mIndex !== -1) mounds.splice(mIndex, 1);
                    closingMounds.splice(i, 1);
                }
            }

            // Atualiza visibilidade e animação da tocha segurada
            const heldItem = beltItems[selectedSlotIndex];
            if (heldItem && heldItem.name === torchItemName && !gamePaused) {
                heldTorchGroup.visible = true;
                // Flickering da tocha segurada
                const flicker = Math.sin(now * 0.01) * 0.1 + (Math.random() * 0.05);
                heldTorchLight.intensity = 1.2 + flicker;

                // Keep held fire upright regardless of torch/camera tilt
                const parentQuat = new THREE.Quaternion();
                heldFireGroup.parent.getWorldQuaternion(parentQuat);
                heldFireGroup.quaternion.copy(parentQuat).invert();

                // Animação das chamas da tocha segurada (movimento reduzido e suave)
                heldFireGroup.children.forEach((fire, i) => {
                    if (fire instanceof THREE.Mesh && fire.userData.baseScale) {
                        const base = fire.userData.baseScale;
                        const speed = fire.userData.animSpeed || 1.0;
                        const offset = fire.userData.animOffset || 0;

                        // Oscilação vertical suave
                        const lick = 1.0 + Math.sin(now * 0.007 * speed + offset) * 0.1;
                        // Oscilação horizontal mínima
                        const swayX = Math.sin(now * 0.002 * speed + offset) * 0.04;
                        const swayZ = Math.cos(now * 0.002 * speed + offset) * 0.04;
                        // Cintilação de escala sutil
                        const scale = 1.0 + Math.sin(now * 0.005 * speed + offset) * 0.02;

                        fire.scale.set(base.x * scale, base.y * lick, base.z * scale);
                        fire.rotation.set(swayX, now * 0.001 + offset, swayZ);
                    }
                });
            } else {
                heldTorchGroup.visible = false;
            }

            // Se um objeto estiver sendo segurado, atualiza sua posição para ficar na frente da câmera
            if (pickedObjectBody) {
                const targetPosition = new THREE.Vector3();
                camera.getWorldDirection(targetPosition);
                targetPosition.multiplyScalar(distanceToPickedObject); // Usa a distância inicial armazenada
                targetPosition.add(camera.position);

                // Define a posição do corpo cinemático diretamente
                pickedObjectBody.position.copy(targetPosition);
                // Zera as velocidades para evitar qualquer movimento residual indesejado
                pickedObjectBody.velocity.set(0, 0, 0);
                pickedObjectBody.angularVelocity.set(0, 0, 0);
            }

            // Determine the primary tool for visual feedback and ghost block logic
            const primaryTool = beltItems[selectedSlotIndex]; // Usa o slot selecionado
            // Declaração única das variáveis
            let isPrimaryToolPlacing = false;
            let isPrimaryToolDestroying = false;
            let isPrimaryToolGrabbing = false;

            const actionType = getActionType(primaryTool);
            if (actionType === 'grab') {
                isPrimaryToolGrabbing = true;
            } else if (actionType === 'destroy') {
                isPrimaryToolDestroying = true;
                // NOVO: Se for uma ferramenta que cava terra ou o próprio item Terra, preparamos o ghost de terra
                if (primaryTool === null || primaryTool.name === shovelItemName || primaryTool.name === pickaxeItemName || primaryTool.name === axeItemName || primaryTool.name === dirtItemName) {
                    currentBlockType = dirtItemName;
                }
            } else if (actionType === 'place') {
                isPrimaryToolPlacing = true;
                currentBlockType = primaryTool.name; // Define o tipo de bloco para o ghost mesh
            }


            // PERFORM MAIN RAYCAST ONCE PER FRAME for crosshair and interaction checks
            let mainIntersects = [];
            let interactionHintText = "";
            if (document.pointerLockElement === renderer.domElement && !gamePaused) {
                if (pickedObjectBody) {
                    interactionHintText = "(F) Soltar";
                } else {
                    raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
                    // Use a pré-calculada raycastTargets para evitar percorrer milhares de objetos (como partículas e capim instanciada sem hitbox)
                    mainIntersects = raycaster.intersectObjects(raycastTargets, true);

                    for (const intersect of mainIntersects) {
                        if (intersect.distance > pickUpDistance) continue;

                        const obj = intersect.object;
                        if ((obj.userData.isApple || obj.userData.isCoconut) && obj.visible) {
                            interactionHintText = "(E) Colher";
                            break;
                        }

                        let body = null;
                        let current = obj;
                        while (current) {
                            if (current.userData && current.userData.physicsBody) {
                                body = current.userData.physicsBody;
                                break;
                            }
                            current = current.parent;
                        }

                        if (body && body.userData) {
                            if (body.userData.isChest) {
                                interactionHintText = "(E) Abrir / (F) Agarrar / (G) Guardar";
                                break;
                            }
                            if (body.userData.isRaft) {
                                interactionHintText = "(E) Navegar / (F) Agarrar / (G) Guardar";
                                break;
                            }
                            if (body.userData.isCollectible) {
                                interactionHintText = "(F) Agarrar / (G) Guardar";
                                break;
                            }
                            // Adiciona dicas contextuais para ferramentas
                            if (body.userData.isDestructible) {
                                if (body.userData.growthStage) {
                                    interactionHintText = "(Botão Esq.) Cortar Árvore\n(P) Escalar";
                                } else if (body.userData.type === stoneBlockItemName || body.userData.type === stoneFloorItemName) {
                                    interactionHintText = "(Botão Esq.) Minerar Pedra";
                                } else {
                                    interactionHintText = "(Botão Esq.) Destruir";
                                }
                                break;
                            }
                        }

                        // Verificação de terreno (Cavar / Colher Capim)
                        const isIslandMesh = islandMeshes.some(m => m.mesh === obj);
                        if (isIslandMesh) {
                            // Verifica se há capim perto
                            let nearCapim = false;
                            for (const cluster of capimClusters) {
                                if (calculateWrappedDistance(cluster.position, intersect.point) < 1.2) {
                                    nearCapim = true;
                                    break;
                                }
                            }
                            const heldItem = beltItems[selectedSlotIndex];
                            const isHoldingSeed = heldItem && (
                                heldItem.name === pineSeedItemName ||
                                heldItem.name === appleSeedItemName ||
                                heldItem.name === coconutItemName ||
                                heldItem.name === coconutSeedItemName
                            );

                            if (isHoldingSeed && ghostBlockMesh.visible && ghostBlockMesh.material.color.getHex() === 0x00ff00) {
                                interactionHintText = "(L) Plantar";
                            } else if (nearCapim) {
                                interactionHintText = "(Botão Esq.) Colher Capim";
                            } else {
                                const hitPoint = intersect.point;
                                const distFromCenter = Math.sqrt(hitPoint.x ** 2 + hitPoint.z ** 2);
                                let material = "Terra";
                                if (hitPoint.y < getSurfaceHeight(hitPoint.x, hitPoint.z) - 5.0) {
                                    material = "Pedra";
                                } else if (distFromCenter > capimRadius) {
                                    material = "Areia";
                                }
                                interactionHintText = `(Botão Esq.) Cavar ${material}`;
                            }
                            break;
                        }
                    }
                }
            }

            if (interactionHintElement) {
                if (interactionHintText && useInteractionHints) {
                    interactionHintElement.textContent = interactionHintText;
                    interactionHintElement.style.display = 'block';
                } else {
                    interactionHintElement.style.display = 'none';
                }
            }

            // NOVO: Lógica do Modo Inspetor
            if (useInspector && !gamePaused) {
                let inspectorText = "Céu (sky)";
                const lookDir = new THREE.Vector3();
                camera.getWorldDirection(lookDir);

                // 1. Verificar Objetos e Terreno (Prioridade Máxima: Raycast)
                const inspectorIntersects = raycaster.intersectObjects(raycastTargets, true);
                if (inspectorIntersects.length > 0) {
                    const intersect = inspectorIntersects[0];
                    const obj = intersect.object;

                    // Verificar se é água
                    if (obj.userData.isWater) {
                        inspectorText = "Água (water)";
                    } else {
                        let body = null;
                        let current = obj;
                        while (current) {
                            if (current.userData && current.userData.physicsBody) {
                                body = current.userData.physicsBody;
                                break;
                            }
                            current = current.parent;
                        }

                        if (body && body.userData) {
                            const type = body.userData.type || "Objeto";
                            const displayName = itemDisplayNames[type] || type;
                            inspectorText = `${displayName.split('\n')[0]} (${type})`;
                            if (body.userData.growthStage) inspectorText = `Árvore (${body.userData.growthStage})`;
                        } else if ((obj.userData.isApple || obj.userData.isCoconut)) {
                            const type = obj.userData.isApple ? "maca" : "coco";
                            inspectorText = `${obj.userData.isApple ? "Maçã" : "Coco"} (${type})`;
                        } else {
                            // Verificar Terreno/Bioma
                            const isIslandMesh = islandMeshes.some(m => m.mesh === obj);
                            if (isIslandMesh) {
                                const hitPoint = intersect.point;
                                const distFromCenter = Math.sqrt(hitPoint.x ** 2 + hitPoint.z ** 2);
                                const naturalY = getSurfaceHeight(hitPoint.x, hitPoint.z);

                                if (hitPoint.y < naturalY - 4.5) {
                                    inspectorText = "Pedra (stone_layer)";
                                } else if (distFromCenter > capimRadius + 30) {
                                    inspectorText = "Areia (sand)";
                                } else if (distFromCenter > capimRadius) {
                                    inspectorText = "Transição Terra/Areia (transition)";
                                } else {
                                    inspectorText = "Terra/Gramado (dirt_grass)";
                                }
                            } else {
                                inspectorText = `Objeto Desconhecido (${obj.name || "unknown"})`;
                            }
                        }
                    }
                } else {
                    // 2. Verificar Nuvens (Raycast secundário)
                    const cloudMeshes = clouds.map(c => c.mesh);
                    const cloudIntersects = raycaster.intersectObjects(cloudMeshes, true);
                    if (cloudIntersects.length > 0) {
                        inspectorText = "Nuvem (cloud)";
                    } else {
                        // 3. Verificar Sol e Lua (Baseado em ângulo, apenas se nada físico na frente)
                        const sunDir = new THREE.Vector3().subVectors(sunMesh.position, camera.position).normalize();
                        const moonDir = new THREE.Vector3().subVectors(moonMesh.position, camera.position).normalize();
                        const sunAngle = lookDir.angleTo(sunDir);
                        const moonAngle = lookDir.angleTo(moonDir);

                        if (sunAngle < 0.05) inspectorText = "Sol (sun)";
                        else if (moonAngle < 0.05) inspectorText = "Lua (moon)";
                    }
                }
                inspectorDisplay.textContent = `Mirando em: ${inspectorText}`;
            }

            // Lógica do ghost block para colocação e snapping
            if (ghostBlockMesh) {
                // NOVO: Mostra o ghost para construção OU para destruição de terra/areia (cavagem)
                // O "fantasma verde" da terra foi removido a pedido do usuário
                const isShowingTerraGhost = (isPrimaryToolDestroying && (currentBlockType === dirtItemName || currentBlockType === sandItemName));
                const isTerra = currentBlockType === dirtItemName || currentBlockType === sandItemName;
                if ((isPrimaryToolPlacing || isShowingTerraGhost) && !gamePaused && document.pointerLockElement === renderer.domElement) {
                    ghostBlockMesh.visible = true; // Garante que o ghost block esteja visível

                    const intersects = mainIntersects;

                    let canPlace = false; // Declarar canPlace aqui
                    let placementPosition = new THREE.Vector3();
                    let tempPlacementQuaternion = new THREE.Quaternion(); // Usar um quaternion temporário

                    // A rotação manual agora é apenas em torno do eixo Y
                    const manualRotationQuaternion = new THREE.Quaternion().setFromEuler(
                        new THREE.Euler(0, ghostBlockRotationY, 0, 'YXZ')
                    );

                    // Define as dimensões do bloco atual para o ghost mesh
                    let currentGhostWidth, currentGhostHeight, currentGhostDepth;

                    // Otimização: Só atualiza a geometria e filhos se o tipo de bloco mudou
                    if (lastGhostType !== currentBlockType) {
                        lastGhostType = currentBlockType;
                        ghostBlockMesh.scale.set(1, 1, 1); // Reset scale

                        // Limpa filhos anteriores do ghostBlockMesh (importante para modelos complexos como a jangada)
                        while(ghostBlockMesh.children.length > 0){
                            ghostBlockMesh.remove(ghostBlockMesh.children[0]);
                        }

                        if (ghostBlockMesh.geometry) ghostBlockMesh.geometry.dispose();
                        if (currentBlockType === raftItemName) {
                            ghostBlockMesh.geometry = new THREE.BoxGeometry(0, 0, 0); // Geometria vazia para a base do ghost
                            // Adiciona o visual complexo como filho
                            const raftVisual = createRaftVisual(ghostBlockMaterial, ghostBlockMaterial, true);
                            ghostBlockMesh.add(raftVisual);
                        } else if (currentBlockType === 'cob') {
                            ghostBlockMesh.geometry = new THREE.BoxGeometry(cobWidth, cobHeight, cobDepth);
                        } else if (currentBlockType === 'piso') {
                            ghostBlockMesh.geometry = new THREE.BoxGeometry(floorWidth, floorHeight, floorDepth);
                        } else if (currentBlockType === 'tábuas') {
                            ghostBlockMesh.geometry = new THREE.BoxGeometry(woodenPlankWidth, woodenPlankHeight, woodenPlankDepth);
                        } else if (currentBlockType === stoneBlockItemName) {
                            ghostBlockMesh.geometry = new THREE.BoxGeometry(stoneBlockWidth, stoneBlockHeight, stoneBlockDepth);
                        } else if (currentBlockType === woodenBlockItemName) {
                            ghostBlockMesh.geometry = new THREE.BoxGeometry(woodenBlockWidth, woodenBlockHeight, woodenBlockDepth);
                        } else if (currentBlockType === stoneFloorItemName) {
                            ghostBlockMesh.geometry = new THREE.BoxGeometry(stoneFloorWidth, stoneFloorHeight, stoneFloorDepth);
                        } else if (currentBlockType === appleSeedItemName || currentBlockType === pineSeedItemName || currentBlockType === coconutItemName || currentBlockType === 'muda_arvore') {
                            const seedBaseData = treeStages['semente'];
                            ghostBlockMesh.geometry = new THREE.ConeGeometry(seedBaseData.visual.mound.radius, seedBaseData.visual.mound.height, 8);
                        } else if (currentBlockType === 'tronco_arvore') {
                            ghostBlockMesh.geometry = new THREE.CylinderGeometry(trunkRadius, trunkRadius, trunkHeight, trunkSegments);
                        } else if (currentBlockType === boxItemName) {
                            ghostBlockMesh.geometry = new THREE.BoxGeometry(1, 1, 1);
                        } else if (currentBlockType === stoneItemName) {
                            ghostBlockMesh.geometry = new THREE.DodecahedronGeometry(0.25, 0);
                            ghostBlockMesh.scale.set(1.2, 0.6, 1.4);
                        } else if (currentBlockType === campfireItemName) {
                            ghostBlockMesh.geometry = new THREE.BoxGeometry(0, 0, 0);
                            const campfireGroup = new THREE.Group();
                            const logMat = ghostBlockMaterial;
                            for (let i = 0; i < 6; i++) {
                                const log = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.6, 8), logMat);
                                log.rotation.z = Math.PI / 2;
                                log.rotation.y = (i / 6) * Math.PI * 2;
                                log.position.y = -0.15;
                                campfireGroup.add(log);
                            }
                            const fireMat = new THREE.MeshStandardMaterial({
                                color: 0xff4500,
                                transparent: true,
                                opacity: 0.4,
                                emissive: 0xff4500,
                                emissiveIntensity: 1.5
                            });
                            for (let i = 0; i < 4; i++) {
                                const fire = new THREE.Mesh(new THREE.ConeGeometry(0.15, 0.4, 8), fireMat);
                                fire.position.set((Math.random()-0.5)*0.2, -0.05, (Math.random()-0.5)*0.2);
                                fire.rotation.y = Math.random() * Math.PI;
                                campfireGroup.add(fire);
                            }
                            ghostBlockMesh.add(campfireGroup);
                        } else if (currentBlockType === torchItemName) {
                            ghostBlockMesh.geometry = new THREE.BoxGeometry(0, 0, 0);
                            const torchGroup = new THREE.Group();
                            const stick = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.8, 8), ghostBlockMaterial);
                            stick.position.y = 0.4;
                            torchGroup.add(stick);
                            const fireMat = new THREE.MeshStandardMaterial({
                                color: 0xff4500,
                                transparent: true,
                                opacity: 0.4,
                                emissive: 0xff4500,
                                emissiveIntensity: 1.5
                            });
                            for (let i = 0; i < 3; i++) {
                                const fire = new THREE.Mesh(new THREE.ConeGeometry(0.16, 0.5, 8), fireMat);
                                fire.position.set((Math.random() - 0.5) * 0.1, 0.9, (Math.random() - 0.5) * 0.1); // Gap acima do topo (0.8)
                                fire.rotation.y = Math.random() * Math.PI;
                                torchGroup.add(fire);
                            }
                            ghostBlockMesh.add(torchGroup);
                        }
                    }

                    // Determina a altura para o cálculo de posicionamento (não muda cada frame, mas precisamos dela)
                    if (currentBlockType === raftItemName) currentGhostHeight = 0.4;
                    else if (currentBlockType === 'cob') currentGhostHeight = cobHeight;
                    else if (currentBlockType === 'piso') currentGhostHeight = floorHeight;
                    else if (currentBlockType === 'tábuas') currentGhostHeight = woodenPlankHeight;
                    else if (currentBlockType === stoneBlockItemName) currentGhostHeight = stoneBlockHeight;
                    else if (currentBlockType === woodenBlockItemName) currentGhostHeight = woodenBlockHeight;
                    else if (currentBlockType === stoneFloorItemName) currentGhostHeight = stoneFloorHeight;
                    else if (currentBlockType === appleSeedItemName || currentBlockType === pineSeedItemName || currentBlockType === coconutItemName || currentBlockType === 'muda_arvore') currentGhostHeight = treeStages['semente'].visual.mound.height;
                    else if (currentBlockType === 'tronco_arvore') currentGhostHeight = trunkHeight;
                    else if (currentBlockType === boxItemName) currentGhostHeight = 1;
                    else if (currentBlockType === stoneItemName) currentGhostHeight = 0.5;
                    else if (currentBlockType === campfireItemName) currentGhostHeight = 0.5;
                    else if (currentBlockType === torchItemName) currentGhostHeight = 0.8;
                    // Update ghost block geometry
                    // ghostBlockMesh.geometry = new THREE.BoxGeometry(currentGhostWidth, currentGhostHeight, currentGhostDepth); // Removido para lidar individualmente


                    // Lista de todos os corpos que podem ser base para colocação
                    const islandBodies = islandMeshes.map(m => m.body);
                    const allPlaceableSurfaces = [...islandBodies, ...placedConstructionBodies];

                    let targetHit = false;
                    for (let i = 0; i < intersects.length; i++) {
                        const intersectedObject = intersects[i].object;
                        const intersectedBody = intersectedObject.userData.physicsBody;
                        const isWater = intersectedObject.userData.isWater;
                        const isRaft = (currentBlockType === raftItemName);

                        if (isWater && !isRaft) {
                            continue; // Pula a água, exceto para a jangada
                        }

                        if ((intersectedBody && allPlaceableSurfaces.includes(intersectedBody)) || (isWater && isRaft)) {
                            // Verifica a distância máxima para colocação
                            if (intersects[i].distance <= pickUpDistance + 1) { // Um pouco mais longe que pegar
                                targetHit = true;
                                const hitPoint = intersects[i].point;



                                let hitNormal;
                                if (intersectedObject.userData.isWater) {
                                    hitNormal = new THREE.Vector3(0, 1, 0); // Sempre para cima na água
                                } else {
                                    hitNormal = intersects[i].face.normal.clone().transformDirection(intersectedObject.matrixWorld).normalize();
                                }

                                // Calcula a posição do centro do bloco acima da superfície
                                let basePosition = new THREE.Vector3().copy(hitPoint);
                                if (currentBlockType !== torchItemName) {
                                    basePosition.add(hitNormal.multiplyScalar(currentGhostHeight / 2));
                                }

                                // NOVO: Alinhamento da grade
                                if (currentBlockType === torchItemName) {
                                    // Sem snapping para a tocha
                                    placementPosition.copy(basePosition);
                                } else if (currentBlockType === dirtItemName || currentBlockType === sandItemName) {
                                    // Snapping para a grade do terreno (vértices)
                                    const step = worldSize / (hfGridSize - 1);
                                    const mx = Math.round((basePosition.x + visualOffsetX + worldSize / 2) / step);
                                    const mz = Math.round((worldSize / 2 - (basePosition.z + visualOffsetZ)) / step);

                                    const vx = (mx / (hfGridSize - 1) - 0.5) * worldSize;
                                    const vz = (0.5 - mz / (hfGridSize - 1)) * worldSize;

                                    placementPosition.x = vx - visualOffsetX;
                                    placementPosition.z = vz - visualOffsetZ;
                                } else {
                                    // Calcula a posição "desenrolada" (absoluta)
                                    const unwrappedX = basePosition.x + visualOffsetX;
                                    const unwrappedZ = basePosition.z + visualOffsetZ;
                                    // Alinha na grade de construção
                                    const snappedUnwrappedX = Math.round(unwrappedX / cobSize) * cobSize;
                                    const snappedUnwrappedZ = Math.round(unwrappedZ / cobSize) * cobSize;
                                    // Converte de volta para as coordenadas do mundo visível
                                    placementPosition.x = snappedUnwrappedX - visualOffsetX;
                                    placementPosition.z = snappedUnwrappedZ - visualOffsetZ;
                                }

                                // NOVO: Alinha a posição Y na grade, considerando a altura da superfície da ilha como a base.
                                // Isso garante que os blocos se encaixem verticalmente.
                                // CORREÇÃO: As sementes não devem se encaixar na grade vertical, elas devem ser colocadas no chão.
                                if (currentBlockType === 'muda_arvore' || currentBlockType === appleSeedItemName || currentBlockType === pineSeedItemName || currentBlockType === coconutItemName || currentBlockType === dirtItemName || currentBlockType === sandItemName || currentBlockType === raftItemName || currentBlockType === torchItemName) {
                                    placementPosition.y = basePosition.y;
                                } else if (currentBlockType === boxItemName) {
                                    placementPosition.y = basePosition.y;
                                } else {
                                    const n_y = Math.round((basePosition.y - islandSurfaceHeight) / currentGhostHeight - 0.5);
                                    placementPosition.y = islandSurfaceHeight + (n_y + 0.5) * currentGhostHeight;
                                }


                                // A rotação agora é apenas a rotação manual, garantindo que o bloco fique sempre na vertical
                                if (currentBlockType === torchItemName && hitNormal.y < 0.5) {
                                    // Leaning orientation for torch on vertical surfaces
                                    const up = new THREE.Vector3(0, 1, 0);
                                    const leanVec = new THREE.Vector3().addVectors(up, hitNormal).normalize();
                                    tempPlacementQuaternion.setFromUnitVectors(up, leanVec);
                                } else {
                                    tempPlacementQuaternion.copy(manualRotationQuaternion);
                                }

                                // Verifica se a posição do ghost block não colide com o jogador
                                const playerPos = new THREE.Vector3().copy(playerBody.position);
                                playerPos.y += currentPlayerRadius; // Centro da esfera do jogador

                                const distanceToPlayer = placementPosition.distanceTo(playerPos);
                                const minPlayerDistance = currentPlayerRadius + (currentGhostHeight / 2) + 0.1; // Raio do jogador + metade da altura do bloco + buffer

                                if (distanceToPlayer > minPlayerDistance) {
                                    canPlace = true;

                                    // NOVO: Verifica se a posição está em área protegida
                                    if (isProtected(placementPosition.x + visualOffsetX, placementPosition.z + visualOffsetZ)) {
                                        canPlace = false;
                                    }

                                    // Se for uma muda de árvore, verifica a distância das outras árvores
                                    if (currentBlockType === 'muda_arvore' || currentBlockType === appleSeedItemName || currentBlockType === pineSeedItemName || currentBlockType === coconutItemName) {
                                        for (const existingBody of placedConstructionBodies) {
                                            // Verifica se o corpo existente é uma árvore em qualquer estágio de crescimento
                                            // (muda, media ou arvore_adulta)
                                            if (existingBody.userData.type === 'muda_arvore' || existingBody.userData.growthStage) {
                                                const existingTreePos = new THREE.Vector3().copy(existingBody.position);
                                                const distanceToExistingTree = placementPosition.distanceTo(existingTreePos);
                                                // AQUI: A regra para não colocar mudas perto de árvores grandes
                                                if (distanceToExistingTree < minTreePlacementDistance) {
                                                    canPlace = false;
                                                    break;
                                                }
                                            }
                                        }
                                    }
                                    if (canPlace) {
                                        break; // Encontrou uma posição válida, sai do loop
                                    }
                                }
                            }
                        }
                    }

                    if (canPlace) {
                        ghostBlockMesh.position.copy(placementPosition);
                        ghostBlockMesh.quaternion.copy(tempPlacementQuaternion);
                        ghostBlockMesh.visible = true;
                        if (isShowingTerraGhost) {
                            ghostBlockMesh.material.color.setHex(currentBlockType === sandItemName ? 0xc2b280 : 0x5C4033);
                        } else {
                            ghostBlockMesh.material.color.setHex(0x00ff00); // Verde para indicar que pode ser colocado
                        }
                    } else if (targetHit) {
                        ghostBlockMesh.visible = true; // Mantém visível para mostrar a cor vermelha
                        ghostBlockMesh.material.color.setHex(0xff0000); // Vermelho para inválido
                        ghostBlockMesh.position.copy(placementPosition); // Mantém a posição para que o usuário saiba onde está tentando colocar
                        ghostBlockMesh.quaternion.copy(tempPlacementQuaternion); // Mantém a rotação
                    } else {
                        ghostBlockMesh.visible = false;
                    }
                } else {
                    ghostBlockMesh.visible = false; // Garante que o ghost block esteja oculto se não estiver no modo de colocação
                }
            }


            // NOVO: Lógica de Flutuação das Jangadas
            raftBodies.forEach(raft => {
                const raftInWater = raft.position.y < waterLevel + 2.0 && hasWaterAt(raft.position.x, raft.position.z);
                if (raftInWater) {
                    const K_SPRING_RAFT = 15000; // Rigidez aumentada para estabilidade
                    const C_DAMPING_RAFT = 1000; // Amortecimento aumentado para reduzir oscilações
                    const gravityMagnitude = Math.abs(world.gravity.y);

                    let totalMass = raft.mass;
                    if (isDrivingRaft && raft === currentRaftBody) {
                        totalMass += playerBody.mass; // Adiciona o peso do jogador
                    }

                    const antiGravityForce = totalMass * gravityMagnitude;

                    // Sincroniza a flutuação com as ondas do shader
                    const uTimeNow = performance.now() / 1000;
                    const waveHeight = Math.sin(raft.position.x * 0.05 + uTimeNow * 2.0) * 0.15 + Math.cos(raft.position.z * 0.05 + uTimeNow * 1.5) * 0.15;
                    const raftHeight = raft.userData.dimensions ? raft.userData.dimensions.height : 0.4;
                    const targetY = waterLevel + waveHeight + (raftHeight / 2);

                    const displacement = raft.position.y - targetY;
                    const springForce = -K_SPRING_RAFT * displacement;
                    const verticalVelocity = raft.velocity.y;
                    const dampingForce = -C_DAMPING_RAFT * verticalVelocity;
                    const totalBuoyancyForce = antiGravityForce + springForce + dampingForce;
                    raft.applyForce(new CANNON.Vec3(0, totalBuoyancyForce, 0));

                    // Arrasto da água para a jangada (independente de frame-rate)
                    const waterDrag = Math.pow(0.98, delta * 60);
                    raft.velocity.x *= waterDrag;
                    raft.velocity.z *= waterDrag;
                }
            });

            const playerBottomY = playerBody.position.y - (isCrouching ? crouchRadius : playerRadius);
            const isInWater = playerBottomY < waterLevel && hasWaterAt(playerBody.position.x, playerBody.position.z);

            // Lógica de agachamento e mergulho
            if (keysPressed['c']) {
                if (!isCrouching && !isInWater) { // Agachar em terra
                    isCrouching = true;
                    playerBody.removeShape(originalPlayerShape);
                    playerBody.addShape(crouchPlayerShape);
                    playerBody.position.y -= (playerRadius - crouchRadius);
                    cameraEyeLevelOffset = crouchRadius;
                    playerBody.velocity.y = 0;
                    playerBody.wakeUp();
                }
                // A lógica de mergulho (aplicar velocidade para baixo) é tratada na seção de física da água
            } else if (isCrouching) { // Levantar em terra
                isCrouching = false;
                playerBody.removeShape(crouchPlayerShape);
                playerBody.addShape(originalPlayerShape);
                playerBody.position.y += (playerRadius - crouchRadius);
                cameraEyeLevelOffset = playerRadius;
                playerBody.velocity.y = 0;
                playerBody.wakeUp();
            }

            // A posição da câmera já foi atualizada no início do loop para garantir culling preciso

            // Lógica do efeito subaquático
            if (camera.position.y < waterLevel && hasWaterAt(camera.position.x, camera.position.z)) {
                scene.background = underwaterColor;
                scene.fog = underwaterFog;
                ambientLight.color.setHex(0x004080); // Cor azulada para a luz ambiente
            } else {
                scene.background = skyColor;
                scene.fog = skyFog;
                ambientLight.color.setHex(0xffffff); // Cor branca padrão
            }

            // --- Ciclo Dia/Noite Relativo ---
            // O jogador pode caminhar para acelerar ou prolongar o dia/noite (longitude)
            // O eixo X representa a longitude no mundo toroidal/esférico
            const longitudeOffset = (playerBody.position.x / worldSize) * 2 * Math.PI;
            const theta = ((world.time / dayDuration) * 2 * Math.PI) - longitudeOffset;
            // dayProgress normalizado entre 0 e 1 para cores e relógio
            const dayProgress = ((theta / (2 * Math.PI)) % 1 + 1) % 1;

            // Orbita do Sol e da Lua
            const orbitRadius = 500;
            // Latitude (Z) afeta a inclinação da órbita para simular o movimento esférico
            const latitudeTilt = Math.sin((playerBody.position.z / worldSize) * 2 * Math.PI) * (Math.PI / 3.5);

            const sunX = orbitRadius * Math.sin(theta);
            const sunY = orbitRadius * Math.cos(theta) * Math.cos(latitudeTilt);
            const sunZ = orbitRadius * Math.cos(theta) * Math.sin(latitudeTilt);

            const moonX = orbitRadius * Math.sin(theta + Math.PI);
            const moonY = orbitRadius * Math.cos(theta + Math.PI) * Math.cos(latitudeTilt);
            const moonZ = orbitRadius * Math.cos(theta + Math.PI) * Math.sin(latitudeTilt);

            sunMesh.position.set(camera.position.x + sunX, camera.position.y + sunY, camera.position.z + sunZ);
            moonMesh.position.set(camera.position.x + moonX, camera.position.y + moonY, camera.position.z + moonZ);

            // Intensidades baseadas na altitude real (Y) relativa ao jogador
            const sunAltitude = sunY / orbitRadius;
            const moonAltitude = moonY / orbitRadius;

            // Sincroniza estrelas com a posição da câmera e órbita
            if (starField) {
                starField.position.copy(camera.position);
                // Rotaciona o campo de estrelas de forma diferente do sol/lua (mais devagar e com um drift extra)
                // Usamos a ordem ZXY para aplicar primeiro a rotação do dia (-theta * 0.9 para parecer mais longe)
                // e depois a inclinação (latitude)
                const starDrift = world.time * 0.005; // Pequeno drift independente
                starField.rotation.set(latitudeTilt, starDrift, -theta * 0.95, 'ZXY');

                // Opacidade baseada na altitude do sol e da lua e chuva
                // Quando o sol está abaixo do horizonte (sunAltitude < 0), as estrelas começam a aparecer
                let starOpacity = Math.max(0, -sunAltitude * 1.5 - 0.2); // Aparece suavemente conforme o sol se põe

                // Diminui visibilidade das estrelas com a chuva (nuvens cobrem)
                if (rainIntensity > 0) {
                    starOpacity *= (1.0 - rainIntensity * 0.9);
                }

                const finalOpacity = Math.min(1.0, starOpacity);
                // Aplica a opacidade a todas as camadas de estrelas e nebulosas dentro do grupo
                starField.children.forEach(child => {
                    if (child.material) {
                        child.material.opacity = finalOpacity;
                    }
                });
            }

            // Atualiza luzes celestiais
            directionalLight.position.copy(sunMesh.position);
            directionalLight.target.position.copy(camera.position);
            directionalLight.target.updateMatrixWorld();

            moonLight.position.copy(moonMesh.position);
            moonLight.target.position.copy(camera.position);
            moonLight.target.updateMatrixWorld();

            directionalLight.intensity = Math.max(0, sunAltitude * 0.8 + 0.2);
            moonLight.intensity = Math.max(0, moonAltitude * 0.3);

            // NOVO: Atualiza o sistema de pássaros (frequência reduzida pela metade)
            if (!gamePaused) {
                if (sunAltitude > 0 && rainIntensity <= 0.05) {
                    // Spawn de grupos de pássaros
                    if (world.time - lastBirdSpawnCheck > 3) {
                        lastBirdSpawnCheck = world.time;
                        // Frequência aumentada: 40% de chance a cada 3 segundos
                        if (Math.random() < 0.4) {
                            spawnBirdGroup();
                        }
                    }

                    // Sons ambientais de pássaros (5-15 segundos de intervalo)
                    if (world.time > nextBirdSoundTime) {
                        playAmbientBirdSound();
                        nextBirdSoundTime = world.time + 5 + Math.random() * 10;
                    }
                }

                for (let i = birds.length - 1; i >= 0; i--) {
                    const bird = birds[i];
                    // Move o pássaro
                    bird.mesh.position.add(bird.velocity.clone().multiplyScalar(delta));

                    // Aponta o pássaro para a direção da velocidade
                    const lookAtPos = bird.mesh.position.clone().add(bird.velocity);
                    bird.mesh.lookAt(lookAtPos);

                    // Anima as asas
                    const flapAngle = Math.sin(world.time * bird.flapSpeed + bird.flapOffset) * 0.8;
                    bird.mesh.userData.leftWing.rotation.z = flapAngle;
                    bird.mesh.userData.rightWing.rotation.z = -flapAngle;

                    // Despawn se estiver muito longe
                    if (bird.mesh.position.distanceTo(camera.position) > despawnDist) {
                        scene.remove(bird.mesh);
                        birds.splice(i, 1);
                    }
                }
            }

            // Intensidade local é global agora
            localRainIntensity = rainIntensity;

            // Transição de cores do céu e neblina (Granular e suave)
            const skyColors = [
                { p: 0.0,  c: 0x87CEEB, i: 1.0 }, // Meio-dia
                { p: 0.2,  c: 0x87CEEB, i: 0.85 }, // Tarde
                { p: 0.25, c: 0xd96c4d, i: 0.55 }, // Pôr do sol
                { p: 0.35, c: 0x1a1a33, i: 0.2 }, // Início da noite
                { p: 0.5,  c: 0x08081a, i: 0.1 }, // Meia-noite
                { p: 0.65, c: 0x1a1a33, i: 0.2 }, // Fim da noite
                { p: 0.75, c: 0xd98a4d, i: 0.55 }, // Amanhecer
                { p: 0.8,  c: 0x87CEEB, i: 0.85 }, // Manhã
                { p: 1.0,  c: 0x87CEEB, i: 1.0 }  // Meio-dia
            ];

            let targetSkyColor = new THREE.Color();
            let targetAmbientIntensity = 0.6;

            for (let i = 0; i < skyColors.length - 1; i++) {
                if (dayProgress >= skyColors[i].p && dayProgress <= skyColors[i+1].p) {
                    const t = (dayProgress - skyColors[i].p) / (skyColors[i+1].p - skyColors[i].p);
                    const c1 = new THREE.Color(skyColors[i].c);
                    const c2 = new THREE.Color(skyColors[i+1].c);
                    targetSkyColor.copy(c1).lerp(c2, t);
                    targetAmbientIntensity = skyColors[i].i + (skyColors[i+1].i - skyColors[i].i) * t;
                    break;
                }
            }

            // Ajusta a cor do céu e luz ambiente para chuva (fica mais escuro - até 85% de redução)
            if (rainIntensity > 0) {
                const rainDarkness = 1.0 - (rainIntensity * 0.85);
                targetSkyColor.multiplyScalar(rainDarkness);
                targetAmbientIntensity *= (1.0 - (rainIntensity * 0.8));
                directionalLight.intensity *= (1.0 - (rainIntensity * 0.85));
                moonLight.intensity *= (1.0 - (rainIntensity * 0.85));
            }

            skyColor.copy(targetSkyColor);
            if (skyFog) skyFog.color.copy(skyColor);
            ambientLight.intensity = targetAmbientIntensity;

            // Atualiza Relógio Analógico
            if (hourHandElement && minuteHandElement) {
                // No nosso relógio, um dia (300s) = 24 horas (duas voltas completas do ponteiro de horas)
                const hourAngle = (dayProgress * 2) * 360;
                // O ponteiro de minutos dá 24 voltas por dia
                const minuteAngle = (dayProgress * 24) * 360;

                hourHandElement.style.transform = `rotate(${hourAngle}deg)`;
                minuteHandElement.style.transform = `rotate(${minuteAngle}deg)`;
            }

            // Lógica de física da água e mergulho
            if (isInWater && !isWaterJumping) {
                const targetY = waterLevel; // Flutua pela metade (centro no nível da água)

                // Lógica de Mergulho e Subida:
                if (keysPressed['c']) {
                    playerBody.velocity.y = -walkSpeed; // Mergulha com a velocidade de caminhada
                } else if (keysPressed[' '] && playerBody.position.y < targetY) {
                    playerBody.velocity.y = walkSpeed; // Sobe para a superfície com a velocidade de caminhada
                } else {
                    // --- Lógica de Flutuação Estável (quando não está a mergulhar, a subir ou a saltar da água) ---
                    const K_SPRING = 250;
                    const C_DAMPING = 35;
                    const gravityMagnitude = Math.abs(world.gravity.y);
                    const antiGravityForce = playerBody.mass * gravityMagnitude;
                    const displacement = playerBody.position.y - targetY;
                    const springForce = -K_SPRING * displacement;
                    const verticalVelocity = playerBody.velocity.y;
                    const dampingForce = -C_DAMPING * verticalVelocity;
                    const totalBuoyancyForce = antiGravityForce + springForce + dampingForce;
                    playerBody.applyForce(new CANNON.Vec3(0, totalBuoyancyForce, 0));
                }

                // Aplica arrasto/resistência da água
                playerBody.velocity.x *= 0.90;
                playerBody.velocity.z *= 0.90;
                currentMoveSpeed *= 0.5;
            }


            // NOVO: Sair do modo de direção da jangada
            if (isDrivingRaft && keysPressed['escape']) {
                isDrivingRaft = false;
                currentRaftBody = null;
                // Restaura colisão e dinâmica do jogador
                playerBody.type = CANNON.Body.DYNAMIC;
                playerBody.collisionResponse = true;
                playerBody.collisionFilterGroup = 1;
                playerBody.collisionFilterMask = 1;
                playerBody.wakeUp();
            }


            // Lógica de subida de degraus (ajustada para permitir subir obstáculos de até 25% da altura do jogador)
            const stepClimbHeight = playerBodyHeight * 0.25;
            const rayLength = playerHalfWidth + 0.1;

            // Usa a direção do movimento (teclas) se disponível, senão usa a velocidade atual
            const playerHorizontalForwardCannon = new CANNON.Vec3(0, 0, 0);
            if (movementVector.lengthSq() > 0) {
                playerHorizontalForwardCannon.set(movementVector.x, 0, movementVector.z);
                playerHorizontalForwardCannon.normalize();
            } else {
                playerHorizontalForwardCannon.set(playerBody.velocity.x, 0, playerBody.velocity.z);
                if (playerHorizontalForwardCannon.length() > 0) {
                    playerHorizontalForwardCannon.normalize();
                }
            }

            const rayOriginLow = new CANNON.Vec3(
                playerBody.position.x + playerHorizontalForwardCannon.x * rayLength,
                playerBody.position.y - currentPlayerRadius + stepClimbHeight,
                playerBody.position.z + playerHorizontalForwardCannon.z * rayLength
            );
            const rayTargetLow = new CANNON.Vec3(
                rayOriginLow.x,
                playerBody.position.y - currentPlayerRadius,
                rayOriginLow.z
            );

            let hitLow = false;
            const rayResultStep = new CANNON.RaycastResult();
            // Verifica colisão com qualquer corpo sólido que não seja o jogador
            world.raycastClosest(rayOriginLow, rayTargetLow, {}, rayResultStep);
            if (rayResultStep.hasHit && rayResultStep.body !== playerBody && rayResultStep.body.collisionResponse) {
                hitLow = true;
            }

            let hitWall = false;
            // Usa um raio vertical à frente do jogador para detectar se o caminho acima do degrau está livre.
            // O raio vai do topo da cabeça do jogador até logo acima da altura máxima do degrau (stepClimbHeight).
            const rayOriginHigh = new CANNON.Vec3(
                rayOriginLow.x,
                playerBody.position.y + currentPlayerRadius,
                rayOriginLow.z
            );
            const rayTargetHigh = new CANNON.Vec3(
                rayOriginLow.x,
                playerBody.position.y - currentPlayerRadius + stepClimbHeight + 0.05,
                rayOriginLow.z
            );

            const rayResultWall = new CANNON.RaycastResult();
            world.raycastClosest(rayOriginHigh, rayTargetHigh, {}, rayResultWall);
            if (rayResultWall.hasHit && rayResultWall.body !== playerBody && rayResultWall.body.collisionResponse) {
                hitWall = true;
            }

            if (hitLow && !hitWall && movementVector.lengthSq() > 0) {
                // Verifica o nível do chão diretamente sob o jogador para evitar pular em terreno plano
                // caso o corpo afunde ligeiramente devido à física.
                const rayGroundOrigin = new CANNON.Vec3(playerBody.position.x, playerBody.position.y, playerBody.position.z);
                const rayGroundTarget = new CANNON.Vec3(playerBody.position.x, playerBody.position.y - currentPlayerRadius - 0.5, playerBody.position.z);
                const rayResultGround = new CANNON.RaycastResult();
                world.raycastClosest(rayGroundOrigin, rayGroundTarget, {}, rayResultGround);

                const playerBottomY = playerBody.position.y - currentPlayerRadius;
                const groundUnderFeetY = rayResultGround.hasHit ? rayResultGround.hitPointWorld.y : playerBottomY;

                const obstacleTopY = rayResultStep.hitPointWorld.y;
                // Usa o maior valor entre o fundo do jogador e o chão real como referência
                const stepHeight = obstacleTopY - Math.max(playerBottomY, groundUnderFeetY);

                if (stepHeight > 0.02 && stepHeight <= stepClimbHeight) {
                    // Sobe verticalmente com uma velocidade constante e suave (6.0)
                    // enquanto houver um obstáculo baixo à frente e o jogador estiver tentando se mover.
                    if (playerBody.velocity.y < 6.0) {
                        playerBody.velocity.y = 6.0;
                    }
                }
            }

            // Lógica de crescimento da muda de árvore
            for (let i = placedConstructionBodies.length - 1; i >= 0; i--) {
                const blockBody = placedConstructionBodies[i];
                const treeMesh = placedConstructionMeshes[i];

                const isPlantableSeed = [
                    'muda_arvore',
                    appleSeedItemName,
                    pineSeedItemName,
                    coconutItemName,
                    coconutSeedItemName
                ].includes(blockBody.userData.type);

                if (isPlantableSeed && !blockBody.userData.isFullyGrown) {
                    const treeType = blockBody.userData.treeType || 'normal';
                    const currentGrowthStageName = blockBody.userData.growthStage;
                    const currentBaseStageData = treeStages[currentGrowthStageName];
                    const currentRandomizedData = blockBody.userData.randomizedDimensions;
                    const multipliers = blockBody.userData.multipliers;

                    let nextGrowthStageName = null;
                    if (currentGrowthStageName === 'semente' && world.time - blockBody.userData.growthStartTime >= currentBaseStageData.growthTime) {
                        nextGrowthStageName = 'muda';
                    } else if (currentGrowthStageName === 'muda' && world.time - blockBody.userData.growthStartTime >= currentBaseStageData.growthTime) {
                        nextGrowthStageName = 'media';
                    } else if (currentGrowthStageName === 'media' && world.time - blockBody.userData.growthStartTime >= currentBaseStageData.growthTime) {
                        nextGrowthStageName = 'arvore_adulta';
                    }

                    if (nextGrowthStageName) {
                        const nextBaseStageData = treeStages[nextGrowthStageName];
                        const nextTreeResult = getTreeDimensions(nextBaseStageData, treeType, multipliers);
                        const nextRandomizedData = nextTreeResult.data;
                        blockBody.userData.multipliers = nextTreeResult.multipliers;

                        const oldOverallPhysicsHeight = currentRandomizedData.overallPhysicsHeight;

                        const newOverallPhysicsHeight = nextRandomizedData.overallPhysicsHeight;
                        blockBody.position.y += (newOverallPhysicsHeight - oldOverallPhysicsHeight) / 2;
                        blockBody.userData.growthStage = nextGrowthStageName;

                        // Remove e descarta o objeto antigo da cena
                        const oldVisualObject = treeMesh;
                        if (oldVisualObject) {
                            if (oldVisualObject.isGroup) {
                                oldVisualObject.children.forEach(child => {
                                    if (child.geometry) child.geometry.dispose();
                                    if (child.material) child.material.dispose();
                                });
                            } else { // é uma Malha
                                if (oldVisualObject.geometry) oldVisualObject.geometry.dispose();
                                if (oldVisualObject.material) oldVisualObject.material.dispose();
                            }
                            scene.remove(oldVisualObject);
                        }

                        // Cria o novo objeto visual e física usando o helper
                        const newTreeMesh = setupTreeVisualsAndPhysics(blockBody, nextRandomizedData);
                        newTreeMesh.userData.physicsBody = blockBody;
                        scene.add(newTreeMesh);

                        // Atualiza a referência no array para o novo objeto
                        placedConstructionMeshes[i] = newTreeMesh;

                        // Update userData
                        blockBody.userData.isDestructible = true;
                        blockBody.userData.dimensions = {
                            width: nextRandomizedData.physics.trunk.width, // Store trunk width as a representative
                            height: newOverallPhysicsHeight, // Store the new overall height
                            depth: nextRandomizedData.physics.trunk.depth // Store trunk depth as a representative
                        };
                        blockBody.userData.growthStartTime = world.time;
                        blockBody.userData.randomizedDimensions = nextRandomizedData; // Update randomized dimensions

                        if (nextGrowthStageName === 'arvore_adulta') {
                            blockBody.userData.isFullyGrown = true;
                            if (treeType === 'apple') appleTrees.push(blockBody);
                            else if (treeType === 'coconut') window.coconutTrees.push(blockBody);
                        }
                        raycastTargetsNeedUpdate = true;
                        blockBody.wakeUp(); // Ensure the body is active after shape changes
                    }
                }
            }


            // --- Lógica de mudança de cor da mira ---
            let crosshairColor = 'white'; // Cor padrão

            // Determine the active tool based on the left slot (primary action)
            const primaryToolForCrosshair = beltItems[selectedSlotIndex]; // Usa o slot selecionado
            // Declaração única das variáveis
            isPrimaryToolPlacing = false;
            isPrimaryToolDestroying = false;
            isPrimaryToolGrabbing = false;

            const crosshairActionType = getActionType(primaryToolForCrosshair);
            if (crosshairActionType === 'grab') {
                isPrimaryToolGrabbing = true;
            } else if (crosshairActionType === 'destroy') {
                isPrimaryToolDestroying = true;
