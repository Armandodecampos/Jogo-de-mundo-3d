        // NOVO: Funções para o sistema de pássaros
        function createBirdMesh() {
            if (!birdMat) {
                birdBodyGeom = new THREE.ConeGeometry(0.1, 0.5, 4);
                birdBodyGeom.rotateX(Math.PI / 2);
                birdWingGeom = new THREE.BoxGeometry(0.6, 0.02, 0.2);
                birdWingGeom.translate(0.3, 0, 0);
                birdTailGeom = new THREE.PlaneGeometry(0.4, 0.3);
                birdMat = new THREE.MeshStandardMaterial({ color: 0x222222, flatShading: true, fog: false });
            }

            const bird = new THREE.Group();

            // Corpo
            const body = new THREE.Mesh(birdBodyGeom, birdMat);
            bird.add(body);

            // Pivot da Asa Esquerda
            const leftWingPivot = new THREE.Group();
            leftWingPivot.position.set(-0.1, 0, 0.1);
            bird.add(leftWingPivot);

            const leftWing = new THREE.Mesh(birdWingGeom, birdMat);
            leftWing.rotation.y = Math.PI; // Inverte para a esquerda
            leftWingPivot.add(leftWing);

            // Pivot da Asa Direita
            const rightWingPivot = new THREE.Group();
            rightWingPivot.position.set(0.1, 0, 0.1);
            bird.add(rightWingPivot);

            const rightWing = new THREE.Mesh(birdWingGeom, birdMat);
            rightWingPivot.add(rightWing);

            // Cauda
            const tail = new THREE.Mesh(birdTailGeom, birdMat);
            tail.rotation.x = Math.PI / 2;
            tail.position.z = -0.4;
            bird.add(tail);

            // Armazenamos os pivots para animar a rotação (bater de asas)
            bird.userData = { leftWing: leftWingPivot, rightWing: rightWingPivot };

            return bird;
        }

        // Pool de geometrias para nuvens para evitar leaks
        const cloudGeometries = [];
        function getCloudGeometry() {
            if (cloudGeometries.length === 0) {
                for (let i = 0; i < 5; i++) {
                    // Esferas com mais segmentos para parecerem "perfeitas"
                    cloudGeometries.push(new THREE.SphereGeometry(1 + i * 0.5, 24, 24));
                }
            }
            return cloudGeometries[Math.floor(Math.random() * cloudGeometries.length)];
        }

        function updateClouds(delta, despawnDist) {
            // Se houver menos nuvens que o alvo, tenta spawnar novas (apenas se não estiver chovendo)
            if (clouds.length < targetCloudCount && Math.random() < 0.02 && targetRainIntensity === 0) {
                spawnCloud();
            }


            for (let i = clouds.length - 1; i >= 0; i--) {
                const cloud = clouds[i];
                const movement = cloud.direction.clone().multiplyScalar(cloud.speed * delta);
                cloud.mesh.position.add(movement);

                // Fade-in gradual das nuvens esparsas
                if (cloud.material && cloud.material.opacity < 0.8) {
                    cloud.material.opacity = Math.min(0.8, cloud.material.opacity + delta * 0.5);
                }

                // Despawn se estiver muito longe
                const dist = cloud.mesh.position.distanceTo(camera.position);
                if (dist > despawnDist) {
                    scene.remove(cloud.mesh);
                    // Dispose material individual para evitar memory leak
                    if (cloud.material && cloud.material !== cloudMaterial) {
                        cloud.material.dispose();
                    }
                    clouds.splice(i, 1);
                }
            }
        }

        function createRainSystem() {
            const particleCount = 5000;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const velocities = new Float32Array(particleCount);

            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 60;
                positions[i * 3 + 1] = (Math.random() - 0.2) * 100;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 60;
                velocities[i] = 0.4 + Math.random() * 0.6;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.boundingSphere = new THREE.Sphere(new THREE.Vector3(), 100);

            const material = new THREE.PointsMaterial({
                color: 0xaaaaaa,
                size: 0.2,
                transparent: true,
                opacity: 0.5,
                blending: THREE.AdditiveBlending
            });

            rainParticles = new THREE.Points(geometry, material);
            rainParticles.userData = { velocities: velocities };
            rainParticles.frustumCulled = false;
            scene.add(rainParticles);
            rainParticles.visible = false;
        }

        function initRainAudio() {
            try {
                gameAudioContext = new (window.AudioContext || window.webkitAudioContext)();

                // Gerar ruído branco
                const bufferSize = 2 * gameAudioContext.sampleRate;
                const noiseBuffer = gameAudioContext.createBuffer(1, bufferSize, gameAudioContext.sampleRate);
                const output = noiseBuffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    output[i] = Math.random() * 2 - 1;
                }

                rainNoiseNode = gameAudioContext.createBufferSource();
                rainNoiseNode.buffer = noiseBuffer;
                rainNoiseNode.loop = true;

                // Filtro passa-baixa para suavizar o ruído e simular chuva
                rainFilterNode = gameAudioContext.createBiquadFilter();
                rainFilterNode.type = 'lowpass';
                rainFilterNode.frequency.value = 1000;
                rainFilterNode.Q.value = 1;

                // Controle de volume
                rainGainNode = gameAudioContext.createGain();
                rainGainNode.gain.value = 0;

                // Conectar os nós
                rainNoiseNode.connect(rainFilterNode);
                rainFilterNode.connect(rainGainNode);
                rainGainNode.connect(gameAudioContext.destination);

                rainNoiseNode.start();
            } catch (e) {
                console.error("Erro ao inicializar áudio da chuva:", e);
            }
        }

        function playOneShot(buffer, volume) {
            if (!gameAudioContext || !buffer) return;
            const source = gameAudioContext.createBufferSource();
            const gainNode = gameAudioContext.createGain();
            source.buffer = buffer;
            gainNode.gain.setValueAtTime(volume, gameAudioContext.currentTime);
            source.connect(gainNode);
            gainNode.connect(gameAudioContext.destination);
            source.start(0);
        }

        function playAmbientBirdSound() {
            if (gamePaused || birds.length === 0 || !gameAudioContext) return;

            const playerPos = camera.position;

            // Encontra o pássaro mais próximo
            let minBirdDist = Infinity;
            birds.forEach(bird => {
                const d = bird.mesh.position.distanceTo(playerPos);
                if (d < minBirdDist) minBirdDist = d;
            });

            // Se o pássaro mais próximo estiver muito longe, não toca som
            if (minBirdDist > 300) return;

            const dist = calculateWrappedDistance(playerPos, new THREE.Vector3(0, playerPos.y, 0));

            let pool = [];

            if (dist < capimRadius) {
                // Parte central da ilha (capim): apenas pássaros
                pool = birdSoundUrls;
            } else if (dist < beachRadius) {
                // Parte da praia: gaivotas e pássaros
                pool = birdSoundUrls.concat(seagullSoundUrls);
            } else {
                // No mar: apenas gaivotas
                pool = seagullSoundUrls;
            }

            if (pool.length === 0) return;

            const randomUrl = pool[Math.floor(Math.random() * pool.length)];
            const buffer = audioBuffers[randomUrl];

            if (buffer) {
                // Volume baseado na distância do pássaro mais próximo
                const volume = Math.max(0, 0.325 * (1 - minBirdDist / 300));
                if (volume > 0) {
                    playOneShot(buffer, volume);
                }
            }
        }

        function updateRain(delta) {
            if (!rainParticles) return;

            // Atualiza o volume e o filtro do áudio da chuva - agora usa localRainIntensity
            if (rainGainNode && rainFilterNode) {
                // Se o jogo estiver pausado, silencia a chuva
                const targetGain = gamePaused ? 0 : (localRainIntensity * 0.30);
                rainGainNode.gain.setTargetAtTime(targetGain, gameAudioContext.currentTime, 0.1);

                // Frequência do filtro aumenta com a intensidade (chuva mais forte é mais "aguda")
                const targetFreq = 500 + (localRainIntensity * 1500);
                rainFilterNode.frequency.setTargetAtTime(targetFreq, gameAudioContext.currentTime, 0.1);
            }

            if (localRainIntensity > 0.05) {
                rainParticles.visible = true;
                const totalParticles = 5000;
                const visibleCount = Math.floor(localRainIntensity * totalParticles);
                rainParticles.geometry.setDrawRange(0, visibleCount);
                rainParticles.material.opacity = 0.3 + (localRainIntensity * 0.4);

                const positions = rainParticles.geometry.attributes.position.array;
                const velocities = rainParticles.userData.velocities;

                const camPos = camera.position;
                let dx = (camPos.x - lastRainCameraPos.x) || 0;
                let dz = (camPos.z - lastRainCameraPos.z) || 0;

                // Account for toroidal world wrap
                if (Math.abs(dx) > worldSize / 2) dx -= Math.sign(dx) * worldSize;
                if (Math.abs(dz) > worldSize / 2) dz -= Math.sign(dz) * worldSize;

                lastRainCameraPos.copy(camPos);

                const halfArea = 40; // 80x80 total area
                const gridRes = 2.66; // Adjusted for 80m / 30 cells
                const gridSize = 30;
                const halfGrid = gridSize / 2;

                // Update all particles to ensure they are distributed even when intensity is low
                for (let i = 0; i < totalParticles; i++) {
                    // 1. Deslocamento relativo ao mundo (inverso ao movimento da câmera)
                    positions[i * 3] -= dx;
                    positions[i * 3 + 2] -= dz;

                    // 2. Queda
                    positions[i * 3 + 1] -= velocities[i] * 80 * delta;

                    // 3. Wrapping Horizontal (Safe modulo-like wrap)
                    while (positions[i * 3] < -halfArea) positions[i * 3] += halfArea * 2;
                    while (positions[i * 3] > halfArea) positions[i * 3] -= halfArea * 2;
                    while (positions[i * 3 + 2] < -halfArea) positions[i * 3 + 2] += halfArea * 2;
                    while (positions[i * 3 + 2] > halfArea) positions[i * 3 + 2] -= halfArea * 2;

                    // 4. Colisão com o Occlusion Heightmap
                    // Usar lastOcclusionPos para indexar o mapa de oclusão corretamente,
                    // compensando o movimento do jogador entre as atualizações do mapa.
                    let worldX = camPos.x + positions[i * 3];
                    let worldZ = camPos.z + positions[i * 3 + 2];

                    // Wrapping toroidal básico para as coordenadas de mundo da partícula
                    if (Math.abs(worldX - lastOcclusionPos.x) > worldSize / 2) worldX -= Math.sign(worldX - lastOcclusionPos.x) * worldSize;
                    if (Math.abs(worldZ - lastOcclusionPos.z) > worldSize / 2) worldZ -= Math.sign(worldZ - lastOcclusionPos.z) * worldSize;

                    const relX = worldX - lastOcclusionPos.x;
                    const relZ = worldZ - lastOcclusionPos.z;

                    // Use Math.min/max to clamp indices safely
                    const gx = Math.max(0, Math.min(gridSize - 1, Math.floor((relX + halfArea) / gridRes)));
                    const gz = Math.max(0, Math.min(gridSize - 1, Math.floor((relZ + halfArea) / gridRes)));

                    let occY = (rainOcclusionHeightmap[gz * gridSize + gx] - camPos.y) || -100;
                    if (isNaN(occY)) occY = -100;

                    // 5. Reset se colidir ou cair demais
                    if (positions[i * 3 + 1] < occY || positions[i * 3 + 1] < -50) {
                        // Se a oclusão for próxima ou acima do topo, esconde
                        if (occY > 70) {
                            positions[i * 3 + 1] = -100;
                        } else {
                            // Reset para uma altura aleatória acima para evitar a "camada de teto"
                            positions[i * 3 + 1] = 80 + Math.random() * 100;
                            // Reposiciona levemente para evitar padrões
                            positions[i * 3] = (Math.random() - 0.5) * 80;
                            positions[i * 3 + 2] = (Math.random() - 0.5) * 80;
                        }
                    }
                }

                rainParticles.geometry.attributes.position.needsUpdate = true;
                rainParticles.position.set(camPos.x, camPos.y, camPos.z);
            } else {
                rainParticles.visible = false;
                lastRainCameraPos.copy(camera.position);
            }
        }

        function updateOcclusionHeightmap() {
            const playerPos = playerBody.position;
            lastOcclusionPos.copy(playerPos);
            const gridRes = 2; // 2 metros por célula
            const gridSize = 30; // 30x30 células (80m x 80m)
            const halfGrid = gridSize / 2;
            const gridHalfSize = 40; // Mantém sincronizado com updateRain halfArea

            // 1. Altura base do terreno
            for (let j = 0; j < gridSize; j++) {
                for (let i = 0; i < gridSize; i++) {
                    const x = playerPos.x + (i - halfGrid) * 2.66;
                    const z = playerPos.z + (j - halfGrid) * 2.66;
                    // A chuva para no nível do mar se o terreno estiver abaixo dele
                    rainOcclusionHeightmap[j * gridSize + i] = Math.max(getSurfaceHeight(x, z), waterLevel);
                }
            }

            // 2. Adiciona construções de forma eficiente
            for (let b = 0; b < placedConstructionBodies.length; b++) {
                const body = placedConstructionBodies[b];
                if (!body.userData.dimensions) continue;

                const hw = body.userData.dimensions.width / 2;
                const hd = body.userData.dimensions.depth / 2;
                const hh = body.userData.dimensions.height / 2;
                const topY = body.position.y + hh;

                // Posição relativa ao jogador (considerando o mundo toroidal)
                let rx = body.position.x - playerPos.x;
                let rz = body.position.z - playerPos.z;
                if (Math.abs(rx) > worldSize / 2) rx -= Math.sign(rx) * worldSize;
                if (Math.abs(rz) > worldSize / 2) rz -= Math.sign(rz) * worldSize;

                // Verifica se a construção está dentro do grid (aproximadamente)
                if (Math.abs(rx) > gridHalfSize + hw || Math.abs(rz) > gridHalfSize + hd) continue;

                // Determina o intervalo do grid coberto pelo corpo
                const minI = Math.max(0, Math.floor((rx - hw) / 2.66 + halfGrid));
                const maxI = Math.min(gridSize - 1, Math.floor((rx + hw) / 2.66 + halfGrid));
                const minJ = Math.max(0, Math.floor((rz - hd) / 2.66 + halfGrid));
                const maxJ = Math.min(gridSize - 1, Math.floor((rz + hd) / 2.66 + halfGrid));

                for (let j = minJ; j <= maxJ; j++) {
                    for (let i = minI; i <= maxI; i++) {
                        const idx = j * gridSize + i;
                        if (topY > rainOcclusionHeightmap[idx]) {
                            rainOcclusionHeightmap[idx] = topY;
                        }
                    }
                }
            }
        }

        function updateWeather(delta) {
            const oldTargetRain = targetRainIntensity;
            // Tenta mudar o clima com duração variável
            if (world.time - lastWeatherChange > nextWeatherDuration) {
                lastWeatherChange = world.time;

                // Define a próxima duração baseada no novo estado
                nextWeatherDuration = targetRainIntensity > 0 ? (60 + Math.random() * 240) : (60 + Math.random() * 120);

                // Chance de mudar o clima
                if (targetRainIntensity === 0) {
                    if (Math.random() < 0.125) {
                        // Inicia chuva localizada
                        startRainCycle();
                    }
                } else {
                    // Se já estiver chovendo, só tem a chance de parar.
                    // Removido a mudança de intensidade no meio do ciclo para atender pedido do usuário.
                    if (Math.random() < 0.4) {
                        targetRainIntensity = 0;
                        rainCloud.active = false;
                    }
                }

                // Atualiza a quantidade base de nuvens de forma aleatória a cada mudança de ciclo
                randomBaseCloudCount = Math.floor(Math.random() * 30);
            }

            // Se não estiver chovendo, a quantidade de nuvens é a base aleatória.
            // Se estiver chovendo, as nuvens esparsas são removidas e não devem ser spawnadas.
            targetCloudCount = targetRainIntensity === 0 ? randomBaseCloudCount : 0;

            // Transição suave para a intensidade alvo
            if (rainIntensity < targetRainIntensity) {
                rainIntensity = Math.min(targetRainIntensity, rainIntensity + 0.002 * 60 * delta);
            } else if (rainIntensity > targetRainIntensity) {
                rainIntensity = Math.max(targetRainIntensity, rainIntensity - 0.002 * 60 * delta);
            }

            // REMOÇÃO INSTANTÂNEA: Se o alvo de chuva for positivo mas ainda houver nuvens esparsas, limpa-as
            if (targetRainIntensity > 0 && clouds.length > 0) {
                for (let i = clouds.length - 1; i >= 0; i--) {
                    scene.remove(clouds[i].mesh);
                    if (clouds[i].material && clouds[i].material !== cloudMaterial) {
                        clouds[i].material.dispose();
                    }
                }
                clouds.length = 0;
            }
        }

        function startRainCycle() {

            // Intensidade alvo agora varia aleatoriamente para cada ciclo de chuva
            rainCloud.targetIntensity = 0.3 + Math.random() * 0.7;

        }

        function spawnCloud(initial = false) {
            if (!cloudMaterial) {
                cloudMaterial = new THREE.MeshStandardMaterial({
                    color: 0xffffff,
                    transparent: true,
                    opacity: 0.8,
                    flatShading: true,
                    fog: false,
                    depthWrite: false
                });
            }
            // Cada nuvem agora tem seu próprio material clonado para fade-in individual
            const indivMaterial = cloudMaterial.clone();
            indivMaterial.opacity = 0; // Começa invisível

            const mesh = createCloudMesh(indivMaterial);
            const altitude = 70 + Math.random() * 40; // Nuvens mais altas
            const dist = initial ? Math.random() * worldSize : worldSize / 2 + 50;
            const angle = Math.random() * Math.PI * 2;

            mesh.position.set(
                camera.position.x + Math.cos(angle) * dist,
                altitude,
                camera.position.z + Math.sin(angle) * dist
            );

            const scale = 2 + Math.random() * 5;
            mesh.scale.set(scale, scale * 0.6, scale);

            scene.add(mesh);

            clouds.push({
                mesh: mesh,
                material: indivMaterial,
                speed: 1 + Math.random() * 3,
                direction: new THREE.Vector3(
                    (Math.random() - 0.5) * 2,
                    0,
                    (Math.random() - 0.5) * 2
                ).normalize()
            });
        }

        function createCloudMesh(indivMaterial) {
            if (!cloudMaterial) {
                cloudMaterial = new THREE.MeshStandardMaterial({
                    color: 0xffffff,
                    transparent: true,
                    opacity: 0.8,
                    flatShading: true,
                    fog: false,
                    depthWrite: false
                });
            }

            const mat = indivMaterial || cloudMaterial;

            const cloudGroup = new THREE.Group();
            const numSpheres = 3 + Math.floor(Math.random() * 5);

            for (let i = 0; i < numSpheres; i++) {
                const geometry = getCloudGeometry();
                const sphere = new THREE.Mesh(geometry, mat);

                sphere.position.set(
                    (Math.random() - 0.5) * 4,
                    (Math.random() - 0.5) * 1.5,
                    (Math.random() - 0.5) * 3
                );

                cloudGroup.add(sphere);
            }

            return cloudGroup;
        }

        function spawnBirdGroup() {
            const groupSize = 1 + Math.floor(Math.pow(Math.random(), 2) * 7);
            const altitude = 30 + Math.random() * 50;
            const spawnDist = Math.min(worldSize * 0.5, renderDistance * 0.9); // Surjam dentro da distância de visão
            const spawnAngle = Math.random() * Math.PI * 2;

            const basePos = new THREE.Vector3(
                camera.position.x + Math.cos(spawnAngle) * spawnDist,
                altitude,
                camera.position.z + Math.sin(spawnAngle) * spawnDist
            );

            // Direção para atravessar o horizonte: mira o lado oposto com um pequeno desvio
            const targetAngle = spawnAngle + Math.PI + (Math.random() - 0.5) * 1.0;
            const targetPos = new THREE.Vector3(
                camera.position.x + Math.cos(targetAngle) * spawnDist,
                altitude,
                camera.position.z + Math.sin(targetAngle) * spawnDist
            );

            const direction = new THREE.Vector3().subVectors(targetPos, basePos).normalize();
            direction.y = 0; // Voar sempre horizontalmente

            const speed = 12 + Math.random() * 8;
            const groupVelocity = direction.multiplyScalar(speed);

            for (let i = 0; i < groupSize; i++) {
                const birdMesh = createBirdMesh();
                const offset = new THREE.Vector3(
                    (Math.random() - 0.5) * 10,
                    (Math.random() - 0.5) * 5,
                    (Math.random() - 0.5) * 10
                );
                birdMesh.position.copy(basePos).add(offset);
                scene.add(birdMesh);

                birds.push({
                    mesh: birdMesh,
                    velocity: groupVelocity.clone().add(new THREE.Vector3(
                        (Math.random() - 0.5) * 2,
                        0, // Mantém horizontal
                        (Math.random() - 0.5) * 2
                    )),
                    flapOffset: Math.random() * Math.PI * 2,
                    flapSpeed: 10 + Math.random() * 5
                });
            }
        }

        // Função auxiliar para atualizar visuals e física de uma árvore baseado no estágio
        function setupTreeVisualsAndPhysics(blockBody, stageData) {
            while (blockBody.shapes.length > 0) {
                blockBody.removeShape(blockBody.shapes[0]);
            }
            let mesh;
            if (blockBody.userData.growthStage === 'semente') {
                const moundMaterial = new THREE.MeshStandardMaterial({ color: 0x5C4033 }); // Brown dirt color
                const moundGeometry = new THREE.ConeGeometry(stageData.visual.mound.radius, stageData.visual.mound.height, 8);
                const moundMesh = new THREE.Mesh(moundGeometry, moundMaterial);
                moundMesh.position.y = -stageData.overallPhysicsHeight / 2 + stageData.visual.mound.height / 2;
                moundMesh.castShadow = true;
                moundMesh.receiveShadow = true;
                mesh = moundMesh;
            } else {
                const treeGroup = new THREE.Group();
                treeGroup.userData.treeBody = blockBody;
                const trunkGeometry = new THREE.CylinderGeometry(stageData.visual.trunk.radius, stageData.visual.trunk.radius, stageData.visual.trunk.height, 8);
                const trunkMesh = new THREE.Mesh(trunkGeometry, treeTrunkMaterialMesh);
                trunkMesh.position.y = stageData.visual.trunk.yOffsetInGroup;
                trunkMesh.castShadow = true;
                trunkMesh.receiveShadow = true;
                treeGroup.add(trunkMesh);
                const leavesRadius = stageData.visual.leaves.radius;
                const treeType = blockBody.userData.treeType || 'normal';
                if (treeType === 'apple') {
                    // Cria uma copa em formato de "nuvem" com várias esferas arredondadas
                    const cloudGroup = new THREE.Group();
                    const numSpheres = 8;
                    for (let i = 0; i < numSpheres; i++) {
                        const sRadius = leavesRadius * (0.6 + Math.random() * 0.4);
                        const sphereGeom = new THREE.SphereGeometry(sRadius, 12, 12);
                        const sphereMesh = new THREE.Mesh(sphereGeom, treeLeavesMaterialMesh);

                        // Posicionamento para criar o formato de nuvem cheio de "bolas"
                        sphereMesh.position.set(
                            (Math.random() - 0.5) * leavesRadius * 1.5,
                            (Math.random() - 0.5) * leavesRadius * 1.0,
                            (Math.random() - 0.5) * leavesRadius * 1.5
                        );
                        sphereMesh.castShadow = true;
                        sphereMesh.receiveShadow = true;
                        cloudGroup.add(sphereMesh);
                    }
                    cloudGroup.position.y = stageData.visual.leaves.yOffsetInGroup;
                    treeGroup.add(cloudGroup);

                    if (blockBody.userData.growthStage === 'arvore_adulta') {
                        const appleGeometry = new THREE.SphereGeometry(leavesRadius * 0.15, 8, 8);
                        const appleMaterial = new THREE.MeshStandardMaterial({ color: 0xff0000 });
                        if (!blockBody.userData.apples) {
                            blockBody.userData.apples = [];
                            for (let i = 0; i < 8; i++) {
                                // phi: azimuthal angle [0, 2PI]
                                const phi = Math.random() * Math.PI * 2;
                                // theta: polar angle [PI/2, PI] for lower hemisphere
                                const theta = Math.PI / 2 + Math.random() * Math.PI / 2;
                                blockBody.userData.apples.push({ picked: false, lastPickedTime: 0, phi: phi, theta: theta });
                            }
                        }
                        for (let i = 0; i < 8; i++) {
                            const appleData = blockBody.userData.apples[i];
                            const apple = new THREE.Mesh(appleGeometry, appleMaterial);
                            const r = leavesRadius * 0.95;
                            apple.position.set(
                                r * Math.sin(appleData.theta) * Math.cos(appleData.phi),
                                stageData.visual.leaves.yOffsetInGroup + r * Math.cos(appleData.theta),
                                r * Math.sin(appleData.theta) * Math.sin(appleData.phi)
                            );
                            apple.castShadow = true;
                            apple.userData.isApple = true;
                            apple.userData.appleIndex = i;
                            apple.userData.treeBody = blockBody;
                            if (appleData.picked) apple.visible = false;
                            treeGroup.add(apple);
                        }
                    }
                } else if (treeType === 'coconut') {
                    // Visual de Coqueiro
                    const trunkRadius = stageData.visual.trunk.radius;
                    const trunkHeight = stageData.visual.trunk.height;
                    // O baseY garante que os segmentos do tronco e a copa comecem na base do corpo de física,
                    // que por sua vez está alinhado com o terreno. Isso evita que a árvore pareça flutuar.
                    const baseY = stageData.visual.trunk.yOffsetInGroup - (trunkHeight / 2);

                    // Tronco reto (conforme pedido do usuário)
                    treeGroup.remove(trunkMesh); // Remove o tronco padrão
                    const segments = 10;
                    for (let i = 0; i < segments; i++) {
                        const segGeom = new THREE.CylinderGeometry(trunkRadius, trunkRadius, trunkHeight / segments, 8);
                        const segMesh = new THREE.Mesh(segGeom, treeTrunkMaterialMesh);
                        segMesh.position.y = baseY + (i + 0.5) * (trunkHeight / segments);
                        segMesh.castShadow = true;
                        segMesh.receiveShadow = true;
                        treeGroup.add(segMesh);
                    }

                    // Folhas de palmeira
                    const palmGroup = new THREE.Group();
                    const numFronds = 8;
                    for (let i = 0; i < numFronds; i++) {
                        const frondPivot = new THREE.Group();
                        frondPivot.rotation.y = (i / numFronds) * Math.PI * 2;

                        const frondGeom = new THREE.BoxGeometry(leavesRadius * 1.5, 0.05, leavesRadius * 0.3);
                        const frondMesh = new THREE.Mesh(frondGeom, treeLeavesMaterialMesh);
                        frondMesh.position.x = leavesRadius * 0.75;
                        frondMesh.rotation.z = -0.3;
                        frondPivot.add(frondMesh);
                        palmGroup.add(frondPivot);
                    }
                    palmGroup.position.set(0, baseY + trunkHeight, 0);
                    treeGroup.add(palmGroup);

                    if (blockBody.userData.growthStage === 'arvore_adulta') {
                        const coconutGeom = new THREE.SphereGeometry(trunkRadius * 1.2, 8, 8);
                        const coconutMat = new THREE.MeshStandardMaterial({ color: 0x654321 });
                        if (!blockBody.userData.coconuts) {
                            blockBody.userData.coconuts = [];
                            for (let i = 0; i < 5; i++) {
                                const angle = (i / 5) * Math.PI * 2;
                                blockBody.userData.coconuts.push({ angle, picked: false, lastPickedTime: 0 });
                            }
                        }
                        for (let i = 0; i < 5; i++) {
                            const cocoData = blockBody.userData.coconuts[i];
                            const cocoMesh = new THREE.Mesh(coconutGeom, coconutMat);
                            cocoMesh.position.set(
                                Math.cos(cocoData.angle) * trunkRadius * 1.5,
                                baseY + trunkHeight - trunkRadius,
                                Math.sin(cocoData.angle) * trunkRadius * 1.5
                            );
                            cocoMesh.castShadow = true;
                            cocoMesh.userData.isCoconut = true;
                            cocoMesh.userData.treeBody = blockBody;
                            cocoMesh.userData.coconutIndex = i;
                            if (cocoData.picked) cocoMesh.visible = false;
                            treeGroup.add(cocoMesh);
                        }
                        if (!window.coconutTrees.includes(blockBody)) window.coconutTrees.push(blockBody);
                    }
                } else {
                    const numCones = 3;
                    for (let i = 0; i < numCones; i++) {
                        const coneRadius = leavesRadius * (1 - i * 0.3);
                        const coneHeight = leavesRadius * 1.8;
                        const coneGeometry = new THREE.ConeGeometry(coneRadius, coneHeight, 8);
                        const coneMesh = new THREE.Mesh(coneGeometry, treeLeavesMaterialMesh);
                        coneMesh.position.y = stageData.visual.leaves.yOffsetInGroup + (i * coneHeight * 0.4);
                        coneMesh.castShadow = true;
                        coneMesh.receiveShadow = true;
                        treeGroup.add(coneMesh);
                    }
                }
                mesh = treeGroup;
            }
            const trunkPhysics = stageData.physics.trunk;
            const trunkShape = new CANNON.Box(new CANNON.Vec3(trunkPhysics.width / 2, trunkPhysics.height / 2, trunkPhysics.depth / 2));
            blockBody.addShape(trunkShape, new CANNON.Vec3(0, trunkPhysics.yOffset, 0));
            const leavesPhysics = stageData.physics.leaves;
            if (leavesPhysics.width > 0) {
                const leavesShape = new CANNON.Box(new CANNON.Vec3(leavesPhysics.width / 2, leavesPhysics.height / 2, leavesPhysics.depth / 2));
                blockBody.addShape(leavesShape, new CANNON.Vec3(0, leavesPhysics.yOffset, 0));
            }
            return mesh;
        }

        function ensureTorchAssets() {
            if (!torchStickMat) {
                torchStickMat = new THREE.MeshStandardMaterial({ color: 0x4d3319 });
                torchBundleMat = new THREE.MeshStandardMaterial({ color: 0xd2b48c });
                torchStrapMat = new THREE.MeshStandardMaterial({ color: 0x261a0d });
                torchOrangeFireMat = new THREE.MeshBasicMaterial({
                    color: 0xff4500,
                    transparent: true,
                    opacity: 0.5,
                    blending: THREE.AdditiveBlending,
                    side: THREE.DoubleSide
                });
                torchYellowFireMat = new THREE.MeshBasicMaterial({
                    color: 0xffaa00,
                    transparent: true,
                    opacity: 0.7,
                    blending: THREE.AdditiveBlending,
                    side: THREE.DoubleSide
                });
                torchCoreFireMat = new THREE.MeshBasicMaterial({
                    color: 0xffff88,
                    transparent: true,
                    opacity: 0.9,
                    blending: THREE.AdditiveBlending,
                    side: THREE.DoubleSide
                });

                // Create a more realistic flame geometry (taller and more pointed)
                const points = [];
                for (let i = 0; i <= 12; i++) {
                    const t = i / 12;
                    // Realistic flame profile: bulbous at 0.2, tapering sharply to 1.0
                    const radius = Math.sin(Math.pow(t, 0.4) * Math.PI) * 0.5 * (1 - t);
                    points.push(new THREE.Vector2(radius, t));
                }
                torchFireGeom = new THREE.LatheGeometry(points, 16);
            }
        }

        function createTorchModel(isHeld = false) {
            // Initialize materials if not already created
            ensureTorchAssets();

            const torchGroup = new THREE.Group();
            const stickHeight = isHeld ? 0.5 : 0.8;
            const stickRadius = isHeld ? 0.02 : 0.025;

            // 1. Stick (tapered and slightly rough)
            const stickGeom = new THREE.CylinderGeometry(stickRadius * 0.8, stickRadius, stickHeight, 8);
            const stick = new THREE.Mesh(stickGeom, torchStickMat);
            // Position stick so its base is at 0 if we want, but for consistency with existing code:
            // Placed torch had stick.position.y = 0.4 (half of 0.8).
            stick.position.y = stickHeight / 2;
            torchGroup.add(stick);

            // 2. Cloth Bundle (Beige/Tan) - The "head" of the torch
            const bundleRadius = stickRadius * 3;
            const bundleHeight = stickHeight * 0.2;
            const bundleGeom = new THREE.CylinderGeometry(bundleRadius, bundleRadius * 0.8, bundleHeight, 8);
            const bundle = new THREE.Mesh(bundleGeom, torchBundleMat);
            bundle.position.y = stickHeight - bundleHeight / 4;
            torchGroup.add(bundle);

            // 3. Straps (Dark Brown) - Wrapping the bundle
            const radiusTop = bundleRadius;
            const radiusBottom = bundleRadius * 0.8;
            for (let i = 0; i < 3; i++) {
                // Calculate exact radius at this height for a flush fit on the tapered bundle
                const relYPos = (i + 0.5) / 3; // 0 to 1 range
                const strapRadius = radiusBottom + (radiusTop - radiusBottom) * relYPos;

                const strap = new THREE.Mesh(new THREE.TorusGeometry(strapRadius, 0.002, 8, 16), torchStrapMat);
                strap.position.y = bundle.position.y - bundleHeight / 2 + (i + 0.5) * (bundleHeight / 3);
                strap.rotation.x = Math.PI / 2 + (Math.random() - 0.5) * 0.1; // Less random tilt for "tightness"
                torchGroup.add(strap);
            }

            // 4. Fire Group
            const fireGroup = new THREE.Group();

            // Layered flames for realism
            const layers = [
                { mat: torchOrangeFireMat, s: { w: 5.5, h: 4.5 }, speed: 1.0, offset: 0 },
                { mat: torchYellowFireMat, s: { w: 3.5, h: 3.5 }, speed: 1.2, offset: 0.2 },
                { mat: torchCoreFireMat, s: { w: 1.5, h: 2.0 }, speed: 1.5, offset: 0.4 }
            ];

            layers.forEach(layer => {
                const fire = new THREE.Mesh(torchFireGeom, layer.mat);
                const sW = bundleRadius * layer.s.w;
                const sH = bundleHeight * layer.s.h;
                fire.scale.set(sW, sH, sW);
                fire.userData.baseScale = { x: sW, y: sH, z: sW };
                fire.userData.animSpeed = layer.speed;
                fire.userData.animOffset = layer.offset;
                fire.position.y = bundleHeight * 0.1;
                fireGroup.add(fire);
            });

            fireGroup.position.y = stickHeight + bundleHeight / 4;
            torchGroup.add(fireGroup);

            // 5. Light
            const light = new THREE.PointLight(0xffaa00, isHeld ? 1.2 : 1.5, isHeld ? 5 : 6);
            light.position.set(0, bundleHeight * 0.5, 0);
            fireGroup.add(light);

            return { group: torchGroup, fireGroup, light, stick };
        }

        // Função para criar um novo bloco físico e visual (cob ou piso)
        function createPlaceableBlock(position, quaternion, type, initialStage = null) {
            let blockShape, initialMass;
            let width, height, depth;
            let mesh; // This will hold either a THREE.Mesh or a THREE.Group
            let randomizedTreeDimensions = null; // To store randomized dimensions for trees
            let durability = 0;

            const blockBody = new CANNON.Body({
                mass: 0, // Blocos colocados são estáticos (massa 0)
                type: CANNON.Body.STATIC, // Blocos colocados são estáticos
                material: constructionMaterial, // Usar o novo material de construção
                linearDamping: 0.99,
                angularDamping: 0.99,
                allowSleep: true,
                sleepSpeedLimit: 0.01,
                sleepTimeLimit: 1.0
            });
            blockBody.position.copy(position);
            if (quaternion) {
                blockBody.quaternion.copy(quaternion);
            }
            blockBody.userData = {};

            if (type === 'cob') {
                width = cobWidth;
                height = cobHeight;
                depth = cobDepth;
                blockShape = new CANNON.Box(new CANNON.Vec3(width / 2, height / 2, depth / 2));
                blockBody.addShape(blockShape); // Add the single shape
                mesh = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), cobMaterialMesh);
                initialMass = initialCobMass;
                durability = cobDurability;
            } else if (type === 'piso') {
                width = floorWidth;
                height = floorHeight;
                depth = floorDepth;
                blockShape = new CANNON.Box(new CANNON.Vec3(width / 2, height / 2, depth / 2));
                blockBody.addShape(blockShape); // Add the single shape
                mesh = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), floorMaterialMesh);
                initialMass = initialFloorMass;
                durability = floorDurability;
            } else if (type === 'muda_arvore' || type === appleSeedItemName || type === pineSeedItemName || type === coconutItemName || type === coconutSeedItemName) {
                let treeType = 'normal';
                if (type === appleSeedItemName) treeType = 'apple';
                else if (type === coconutItemName || type === coconutSeedItemName) treeType = 'coconut';

                const stageToUse = initialStage || ((type === appleSeedItemName || type === pineSeedItemName || type === coconutItemName || type === coconutSeedItemName) ? 'semente' : 'muda');
                blockBody.userData.growthStage = stageToUse; // Define antes de configurar visuals
                blockBody.userData.treeType = treeType;

                const treeResult = getTreeDimensions(treeStages[stageToUse], treeType);
                randomizedTreeDimensions = treeResult.data;
                blockBody.userData.multipliers = treeResult.multipliers;
                const stageData = randomizedTreeDimensions;

                if (stageToUse === 'semente') {
                    // Posiciona o montinho sobre o chão
                    blockBody.position.y = position.y + stageData.visual.mound.height / 2;
                } else {
                    // Garante que a árvore não fique enterrada (base no chão)
                    blockBody.position.y = position.y + stageData.overallPhysicsHeight / 2;
                }

                mesh = setupTreeVisualsAndPhysics(blockBody, stageData);

                initialMass = initialTreeSaplingMass;
                durability = stageData.durability || treeSaplingDurability;
                width = stageData.visual.trunk ? stageData.visual.trunk.radius * 2 : 0.2;
                height = stageData.overallPhysicsHeight;
                depth = stageData.visual.trunk ? stageData.visual.trunk.radius * 2 : 0.2;
                blockBody.userData.dimensions = { width, height, depth };
            } else if (type === 'tronco_arvore') { // NOVO: Bloco de tronco de árvore
                width = trunkRadius * 2; // Diâmetro para largura
                height = trunkHeight;
                depth = trunkRadius * 2; // Diâmetro para profundidade
                blockShape = new CANNON.Cylinder(trunkRadius, trunkRadius, trunkHeight, trunkSegments);
                blockBody.addShape(blockShape);
                mesh = new THREE.Mesh(new THREE.CylinderGeometry(trunkRadius, trunkRadius, trunkHeight, trunkSegments), treeTrunkMaterialMesh);
                initialMass = initialTrunkMass;
                durability = treeTrunkDurability;
            } else if (type === 'tábuas') { // NOVO: Bloco de tábuas de madeira
                width = woodenPlankWidth;
                height = woodenPlankHeight;
                depth = woodenPlankDepth;
                blockShape = new CANNON.Box(new CANNON.Vec3(width / 2, height / 2, depth / 2));
                blockBody.addShape(blockShape);
                mesh = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), woodenPlankMaterialMesh);
                initialMass = initialWoodenPlankMass;
                durability = woodenPlankDurability;
            } else if (type === stoneBlockItemName) {
                width = stoneBlockWidth;
                height = stoneBlockHeight;
                depth = stoneBlockDepth;
                blockShape = new CANNON.Box(new CANNON.Vec3(width / 2, height / 2, depth / 2));
                blockBody.addShape(blockShape);
                mesh = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), stoneBlockMaterialMesh);
                initialMass = initialStoneBlockMass;
                durability = stoneBlockDurability;
            } else if (type === woodenBlockItemName) {
                width = woodenBlockWidth;
                height = woodenBlockHeight;
                depth = woodenBlockDepth;
                blockShape = new CANNON.Box(new CANNON.Vec3(width / 2, height / 2, depth / 2));
                blockBody.addShape(blockShape);
                mesh = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), woodenBlockMaterialMesh);
                initialMass = initialWoodenBlockMass;
                durability = woodenBlockDurability;
            } else if (type === stoneFloorItemName) {
                width = stoneFloorWidth;
                height = stoneFloorHeight;
                depth = stoneFloorDepth;
                blockShape = new CANNON.Box(new CANNON.Vec3(width / 2, height / 2, depth / 2));
                blockBody.addShape(blockShape);
                mesh = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), stoneFloorMaterialMesh);
                initialMass = initialStoneFloorMass;
                durability = stoneFloorDurability;
            } else if (type === campfireItemName) {
                ensureTorchAssets();
                width = 0.8; height = 0.5; depth = 0.8;
                blockShape = new CANNON.Box(new CANNON.Vec3(width / 2, height / 2, depth / 2));
                blockBody.addShape(blockShape);

                const campfireGroup = new THREE.Group();
                const logMat = new THREE.MeshStandardMaterial({ color: 0x3d2b1f });
                for (let i = 0; i < 6; i++) {
                    const log = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.8, 8), logMat);
                    log.rotation.z = Math.PI / 2;
                    log.rotation.y = (i / 6) * Math.PI * 2;
                    log.position.y = -0.12;
                    campfireGroup.add(log);
                }

                const fireGroup = new THREE.Group();
                // Layered flames for realism - Campfire
                const campfireLayers = [
                    { mat: torchOrangeFireMat, s: { w: 0.6, h: 0.9 }, speed: 0.8, offset: 0 },
                    { mat: torchYellowFireMat, s: { w: 0.4, h: 0.7 }, speed: 1.1, offset: 0.3 },
                    { mat: torchCoreFireMat, s: { w: 0.15, h: 0.4 }, speed: 1.4, offset: 0.6 }
                ];

                campfireLayers.forEach(layer => {
                    const fire = new THREE.Mesh(torchFireGeom, layer.mat);
                    fire.scale.set(layer.s.w, layer.s.h, layer.s.w);
                    fire.userData.baseScale = { x: layer.s.w, y: layer.s.h, z: layer.s.w };
                    fire.userData.animSpeed = layer.speed;
                    fire.userData.animOffset = layer.offset;
                    fire.position.y = -0.05;
                    fireGroup.add(fire);
                });

                campfireGroup.add(fireGroup);

                const light = new THREE.PointLight(0xffaa00, 2.5, 8);
                light.position.set(0, 0.3, 0);
                campfireGroup.add(light);

                mesh = campfireGroup;
                initialMass = 20;
                durability = 1.0;

                blockBody.userData.fireGroup = fireGroup;
                blockBody.userData.fireLight = light;
                blockBody.userData.fireOffset = Math.random() * 1000;
                activeCampfires.push(blockBody);
            } else if (type === torchItemName) {
                width = 0.2; height = 0.8; depth = 0.2;
                blockShape = new CANNON.Box(new CANNON.Vec3(width / 2, height / 2, depth / 2));
                // Origin at base: offset the shape up by half height
                blockBody.addShape(blockShape, new CANNON.Vec3(0, 0.4, 0));

                const torchModel = createTorchModel(false);
                mesh = torchModel.group;

        // Function to clear all smoke particles
        function clearSmokeEffects() {

        // Function to create a smoke effect at a given position
        function createSmokeEffect(position, colorOverride = null, scale = 1.0) {
            if (!position) return;

            const smokeCount = Math.max(1, Math.floor(6 * scale));
            const smokeGeometry = new THREE.SphereGeometry(0.15 * scale, 8, 8);
            const smokeMaterial = new THREE.MeshBasicMaterial({
                color: colorOverride !== null ? colorOverride : 0xA0522D,
                transparent: true,
                opacity: 0.3,
                depthWrite: false
            });

            for (let i = 0; i < smokeCount; i++) {
                const particle = new THREE.Mesh(smokeGeometry, smokeMaterial.clone());
                particle.position.copy(position);

                particle.userData.velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.5 * scale,
                    Math.random() * 0.1 * scale + 0.1,
                    (Math.random() - 0.5) * 0.5 * scale
                );
                particle.userData.lifetime = 4.5 * scale;
                particlesGroup.add(particle);
                smokeParticles.push(particle);
            }
        }



        let currentHfMatrix = null;
        let waterMatrix = new Uint8Array(hfGridSize * hfGridSize);

        function updateWaterConnectivity() {
            if (!currentHfMatrix) return;
            waterMatrix.fill(0);
            const queue = [];

            // Inicia a partir das bordas do mapa (oceano aberto)
            for (let i = 0; i < hfGridSize; i++) {
                // Borda de Cannon j=0 (z = -worldSize/2) e j=255 (z = worldSize/2)
                if (currentHfMatrix[i][0] < waterLevel) {
                    if (waterMatrix[i * hfGridSize + 0] === 0) {
                        waterMatrix[i * hfGridSize + 0] = 1;
                        queue.push(i, 0);
                    }
                }
                if (currentHfMatrix[i][hfGridSize - 1] < waterLevel) {
                    if (waterMatrix[i * hfGridSize + (hfGridSize - 1)] === 0) {
                        waterMatrix[i * hfGridSize + (hfGridSize - 1)] = 1;
                        queue.push(i, hfGridSize - 1);
                    }
                }
            }
            for (let j = 0; j < hfGridSize; j++) {
                // Borda de Cannon i=0 (x = -worldSize/2) e i=255 (x = worldSize/2)
                if (currentHfMatrix[0][j] < waterLevel) {
                    if (waterMatrix[0 * hfGridSize + j] === 0) {
                        waterMatrix[0 * hfGridSize + j] = 1;
                        queue.push(0, j);
                    }
                }
                if (currentHfMatrix[hfGridSize - 1][j] < waterLevel) {
                    if (waterMatrix[(hfGridSize - 1) * hfGridSize + j] === 0) {
                        waterMatrix[(hfGridSize - 1) * hfGridSize + j] = 1;
                        queue.push(hfGridSize - 1, j);
                    }
                }
            }


            let head = 0;
            while (head < queue.length) {
                const i = queue[head++];
                const j = queue[head++];

                // Vizinhos com wrapping toroidal
                const ni = [(i - 1 + hfGridSize) % hfGridSize, (i + 1) % hfGridSize, i, i];
                const nj = [j, j, (j - 1 + hfGridSize) % hfGridSize, (j + 1) % hfGridSize];

                for (let k = 0; k < 4; k++) {
                    const r = ni[k];
                    const c = nj[k];
                    const idx = r * hfGridSize + c;
                    if (waterMatrix[idx] === 0 && currentHfMatrix[r][c] < waterLevel) {
                        waterMatrix[idx] = 1;
                        queue.push(r, c);
                    }
                }
            }
        }

        function hasWaterAt(x, z) {
            if (!waterMatrix) return true;
            const step = worldSize / (hfGridSize - 1);

            // Suporte para mundo toroidal (repete o padrão de água conforme os tiles do terreno)
            let tx = ((x + worldSize / 2) % worldSize + worldSize) % worldSize;
            let tz = ((worldSize / 2 - z) % worldSize + worldSize) % worldSize;

            const mx = Math.round(tx / step) % hfGridSize;
            const mz_cannon = Math.round(tz / step) % hfGridSize;

            return waterMatrix[mx * hfGridSize + mz_cannon] === 1;
        }

        function updateWaterVisuals() {
            if (!window.waterGeometry) return;
            const indices = [];
            const waterRes = 64; // Segmentos visuais (reduzido para performance)
            const step = (hfGridSize - 1) / waterRes;

            for (let j = 0; j < waterRes; j++) {
                const zIndex = Math.floor(j * step);
                const zIndexNext = Math.floor((j + 1) * step);
                const cannonJ = (hfGridSize - 1) - zIndex;
                const cannonJnext = (hfGridSize - 1) - zIndexNext;

                for (let i = 0; i < waterRes; i++) {
                    const xIndex = Math.floor(i * step);
                    const xIndexNext = Math.floor((i + 1) * step);

                    const w1 = waterMatrix[xIndex * hfGridSize + cannonJ];
                    const w2 = waterMatrix[xIndexNext * hfGridSize + cannonJ];
                    const w3 = waterMatrix[xIndex * hfGridSize + cannonJnext];
                    const w4 = waterMatrix[xIndexNext * hfGridSize + cannonJnext];

                    // Usa OU para incluir quads na borda, permitindo recorte suave com o terreno
                    if (w1 || w2 || w3 || w4) {
                        const a = j * (waterRes + 1) + i;
                        const b = j * (waterRes + 1) + (i + 1);
                        const c = (j + 1) * (waterRes + 1) + i;
                        const d = (j + 1) * (waterRes + 1) + (i + 1);

                        indices.push(a, b, c);
                        indices.push(b, d, c);
                    }
                }
            }
            window.waterGeometry.setIndex(indices);
            if (window.waterGeometry.index) window.waterGeometry.index.needsUpdate = true;
        }
        window.hasWaterAt = hasWaterAt;
        window.updateWaterConnectivity = updateWaterConnectivity;
        window.updateWaterVisuals = updateWaterVisuals;
        window.currentHfMatrix = currentHfMatrix;
        window.updateIslandGeometry = updateIslandGeometry;
        window.stoneLayerLevel = stoneLayerLevel;
        window.hfGridSize = hfGridSize;
        window.mounds = mounds;

        function updateIslandGeometry(affectedMound = null) {
            // Inicializa a matriz se necessário
            if (!currentHfMatrix || currentHfMatrix.length !== hfGridSize) {
                currentHfMatrix = new Array(hfGridSize);
                for (let i = 0; i < hfGridSize; i++) currentHfMatrix[i] = new Array(hfGridSize).fill(0);
                window.currentHfMatrix = currentHfMatrix;
            }

            // Recalcula a matriz a partir da base + todos os mounds ativos
            for (let i = 0; i < hfGridSize; i++) {
                for (let j = 0; j < hfGridSize; j++) {
                    currentHfMatrix[i][j] = baseMatrix[i][j];
                }
            }

            for (const mound of mounds) {
                if (mound.flattened) continue;

                if (mound.isPrecise) {
                    // Cavagem precisa (horizontal): afeta os 4 vértices ao redor para criar um caminho plano de 3x3m
                    const xBase = Math.floor(mound.x);
                    const zBase = Math.floor(mound.z);
                    const targetHeight = (mound.targetFloorHeight !== undefined ? mound.targetFloorHeight : mound.originalHeight) + mound.height;

                    for (let di = 0; di <= 1; di++) {
                        for (let dj = 0; dj <= 1; dj++) {
                            const i = (xBase + di + hfGridSize) % hfGridSize;
                            const j = (zBase + dj + hfGridSize) % hfGridSize;
                            currentHfMatrix[i][j] = Math.min(currentHfMatrix[i][j], targetHeight);
                            if (currentHfMatrix[i][j] < bedrockLevel) currentHfMatrix[i][j] = bedrockLevel;
                        }
                    }
                    continue;
                }

                const rInt = Math.ceil(mound.radius);
                const radiusSq = mound.radius * mound.radius;
                const centerX = Math.round(mound.x);
                const centerZ = Math.round(mound.z);

                for (let di = -rInt; di <= rInt; di++) {
                    for (let dj = -rInt; dj <= rInt; dj++) {
                        const i = (centerX + di + hfGridSize) % hfGridSize;
                        const j = (centerZ + dj + hfGridSize) % hfGridSize;

                        // Coordenada do vértice real para cálculo de distância precisa
                        const vertexX = centerX + di;
                        const vertexZ = centerZ + dj;
                        const dx = vertexX - mound.x;
                        const dz = vertexZ - mound.z;
                        const distSq = dx * dx + dz * dz;

                        if (distSq < radiusSq) {
                            currentHfMatrix[i][j] += Math.sqrt(radiusSq - distSq) * (mound.height / mound.radius);
                        }
                        // Clamp at bedrock
                        if (currentHfMatrix[i][j] < bedrockLevel) currentHfMatrix[i][j] = bedrockLevel;
                    }
                }
            }

            // Atualiza a física de todos os 9 tiles do terreno (Throttled)
            if (performance.now() - lastPhysicsTerrainUpdate > 150) {
                const newHfShape = new CANNON.Heightfield(currentHfMatrix, {
                    elementSize: worldSize / (hfGridSize - 1)
                });

                islandMeshes.forEach(tile => {
                    if (tile.body.shapes.length > 0) {
                        tile.body.removeShape(tile.body.shapes[0]);
                    }
                    tile.body.addShape(newHfShape);
                    tile.body.updateAABB();
                });
                lastPhysicsTerrainUpdate = performance.now();
            }

            // Atualiza a malha visual (geometria compartilhada)
            if (islandMeshes.length > 0) {
                const geom = islandMeshes[0].mesh.geometry;
                const vertices = geom.attributes.position.array;
                const colors = geom.attributes.color.array;

                if (affectedMound) {
                    // Otimização: Atualiza apenas a região afetada pelo mound modificado (com suporte toroidal)
                    const rInt = Math.ceil(affectedMound.radius);
                    const now = Date.now();

                    for (let di = -rInt; di <= rInt; di++) {
                        for (let dj_cannon = -rInt; dj_cannon <= rInt; dj_cannon++) {
                            const cannonI = (Math.round(affectedMound.x) + di + hfGridSize) % hfGridSize;
                            const cannonJ = (Math.round(affectedMound.z) + dj_cannon + hfGridSize) % hfGridSize;

                            const j = (hfGridSize - 1) - cannonJ;
                            const i = cannonI;
                            const height = currentHfMatrix[i][cannonJ];
                            const vIdx = (j * hfGridSize + i);
                            const index = vIdx * 3;
                            vertices[index + 1] = height;

                            // Feedback visual (textura pura)
                            const dx = i - affectedMound.x;
                            const dz = cannonJ - affectedMound.z;
                            const distSq = dx * dx + dz * dz;

                            if (affectedMound.closingStartTime === undefined && affectedMound.growthStage >= moundGrowthStages.length) {
                                if (distSq < (affectedMound.radius + 0.3) * (affectedMound.radius + 0.3)) {
                                    if (affectedMound.itemType === dirtItemName) {
                                        colors[vIdx * 3] = 0.0;
                                        colors[vIdx * 3 + 1] = 1.0; // Garante que não seja tratado como buraco
                                    } else if (affectedMound.itemType === sandItemName) {
                                        colors[vIdx * 3] = 1.0; // Garante que não seja tratado como buraco
                                        colors[vIdx * 3 + 1] = 0.0;
                                    } else {
                                        // Cavagem (ou item sem tipo): ambos os canais para sinalizar buraco
                                        colors[vIdx * 3] = 0.0;
                                        colors[vIdx * 3 + 1] = 0.0;
                                    }
                                }
                                const existingIdx = modifiedVertices.findIndex(mv => mv.index === vIdx);
                                if (existingIdx !== -1) {
                                    modifiedVertices[existingIdx].time = now;
                                } else {
                                    modifiedVertices.push({ index: vIdx, time: now });
                                }
                            }
                            geom.attributes.color.needsUpdate = true;
                        }
                    }
                } else {
                    // Sincronização completa
                    const now = Date.now();
                    // Otimização: Cria um set dos índices modificados para evitar resetar cores em fade
                    const modifiedIndices = new Set(modifiedVertices.map(mv => mv.index));

                    // Primeiro sincroniza altura e reseta cores para todos os vértices (O(V))
                    for (let j = 0; j < hfGridSize; j++) {
                        const cannonJ = (hfGridSize - 1) - j;
                        for (let i = 0; i < hfGridSize; i++) {
                            const height = currentHfMatrix[i][cannonJ];
                            const vIdx = (j * hfGridSize + i);
                            vertices[vIdx * 3 + 1] = height;
                            // Reseta cores para o padrão (1.0) apenas se não estiver em processo de fade
                            if (!modifiedIndices.has(vIdx)) {
                                colors[vIdx * 3] = 1.0;
                                colors[vIdx * 3 + 1] = 1.0;
                                colors[vIdx * 3 + 2] = 1.0;
                            }
                        }
                    }

                    // Depois aplica cores apenas nos locais dos mounds ativos (O(M * R^2))
                    for (const mound of mounds) {
                        if (mound.flattened || mound.closingStartTime !== undefined || mound.growthStage < moundGrowthStages.length) continue;
                        const rInt = Math.ceil(mound.radius + 1.0);
                        for (let di = -rInt; di <= rInt; di++) {
                            for (let dj_cannon = -rInt; dj_cannon <= rInt; dj_cannon++) {
                                const cannonI = (Math.round(mound.x) + di + hfGridSize) % hfGridSize;
                                const cannonJ = (Math.round(mound.z) + dj_cannon + hfGridSize) % hfGridSize;
                                const j = (hfGridSize - 1) - cannonJ;
                                const i = cannonI;
                                const vIdx = (j * hfGridSize + i);

                                const dx = i - mound.x;
                                const dz = cannonJ - mound.z;
                                const distSq = dx * dx + dz * dz;

                                if (distSq < (mound.radius + 0.3) * (mound.radius + 0.3)) {
                                    if (mound.itemType === dirtItemName) {
                                        colors[vIdx * 3] = 0.0;
                                        colors[vIdx * 3 + 1] = 1.0;
                                    } else if (mound.itemType === sandItemName) {
                                        colors[vIdx * 3] = 1.0;
                                        colors[vIdx * 3 + 1] = 0.0;
                                    } else {
                                        colors[vIdx * 3] = 0.0;
                                        colors[vIdx * 3 + 1] = 0.0;
                                    }
                                    const existingIdx = modifiedVertices.findIndex(mv => mv.index === vIdx);
                                    if (existingIdx !== -1) {
                                        modifiedVertices[existingIdx].time = now;
                                    } else {
                                        modifiedVertices.push({ index: vIdx, time: now });
                                    }
                                    geom.attributes.color.needsUpdate = true;
                                }
                            }
                        }
                    }
                }
                geom.attributes.position.needsUpdate = true;
                geom.computeVertexNormals();
            }

            // Atualiza a conectividade e o visual da água quando o terreno muda
            updateWaterConnectivity();
            updateWaterVisuals();
        }

                const px = ((x + worldSize / 2) % worldSize + worldSize) % worldSize - worldSize / 2;
                const pz = ((z + worldSize / 2) % worldSize + worldSize) % worldSize - worldSize / 2;
                const distance = Math.sqrt(px * px + pz * pz);
                let height;

                if (distance <= capimRadius) {

                } else if (distance <= beachRadius) {
                    const t = (distance - capimRadius) / (beachRadius - capimRadius);

                    height = islandSurfaceHeight * (1 - t) + (waterLevel - 0.5) * t;

                    mountainHeight = hVal;

                // Random Dirt Mountains (Formato suave de sino/cosseno)
                dirtMountains.forEach(m => {

                    const dz = pz - m.z;
                    const d = Math.sqrt(dx * dx + dz * dz);
                    if (d < m.r) {
                        const hVal = m.h * 0.5 * (1 + Math.cos(Math.PI * d / m.r));
                        mountainHeight = Math.max(mountainHeight, hVal);
                    }
                });

                return height + mountainHeight;
            }
            window.getSurfaceHeight = getSurfaceHeight;

            // Função para pegar a altura real incluindo todos os montes de terra e areia ativos
            window.getActualHeight = function(x, z) {
                if (!window.currentHfMatrix) return window.getSurfaceHeight(x, z);
                const step = worldSize / (hfGridSize - 1);
                // Calcula as coordenadas fracionárias na grade do heightfield
                const mx = (x + worldSize / 2) / step;
                const mz = (worldSize / 2 - z) / step;

                // Índices inteiros dos quatro vizinhos (com wrapping toroidal)
                const i0 = Math.floor(mx);
                const j0 = Math.floor(mz);
                const i1 = i0 + 1;
                const j1 = j0 + 1;

                // Frações para interpolação
                const fi = mx - i0;
                const fj = mz - j0;

                const getHeight = (idxI, idxJ) => {
                    const i = (idxI % hfGridSize + hfGridSize) % hfGridSize;
                    const j = (idxJ % hfGridSize + hfGridSize) % hfGridSize;
                    return window.currentHfMatrix[i][j];

                // Interpolação bilinear
                const h00 = getHeight(i0, j0);
                const h10 = getHeight(i1, j0);
                const h01 = getHeight(i0, j1);
                const h11 = getHeight(i1, j1);

                const h_top = h00 * (1 - fi) + h10 * fi;
                const h_bottom = h01 * (1 - fi) + h11 * fi;

                return h_top * (1 - fj) + h_bottom * fj;
            }

            const hfMatrix = [];

            textureLoader.load(groundTextureURL, (groundTexture) => {

                                    islandMeshMaterial.map = groundTexture;

                                        islandMeshMaterial.userData.shader = shader;

                                        shader.vertexShader = `

                                            uniform float uIslandSurfaceHeight;
                                            uniform float uSeabedLevel;
                                            uniform float uWorldSize;
                                            uniform float uUseTextures;
                                            varying vec3 vWorldPosition;
                                            ${shader.fragmentShader}
                                        `.replace(
                                            `#include <map_fragment>`,
                                            `
                                                vec3 seabedColor;
                                                vec3 sandColor;
                                                vec3 capimColor;
                                                vec3 stoneColor;
                                                vec3 inferiorColor;

                                                if (uUseTextures > 0.5) {
                                                    // Use periodic position for consistent tiling across toroidal boundary
                                                    vec2 periodicUV = (mod(vWorldPosition.xz + uWorldSize * 0.5, uWorldSize) - uWorldSize * 0.5) / 16.0;
                                                    // Use 0.4 factor so tiling divisor is 40.0 (1200/40 = 30), ensuring no seam at toroidal boundary
                                                    seabedColor = texture2D(uSeabedTexture, periodicUV * 0.4).rgb;
                                                    sandColor = texture2D(uSandTexture, periodicUV).rgb;
                                                    capimColor = texture2D(uCapimTexture, periodicUV).rgb;
                                                    stoneColor = texture2D(uStoneTexture, periodicUV).rgb;
                                                    inferiorColor = texture2D(uInferiorTexture, periodicUV).rgb;
                                                } else {
                                                    seabedColor = vec3(0.1, 0.2, 0.3); // Solid seabed
                                                    sandColor = vec3(0.8, 0.7, 0.4);  // Solid sand
                                                    capimColor = vec3(0.3, 0.5, 0.2); // Solid capim terra
                                                    stoneColor = vec3(0.5, 0.5, 0.5); // Solid stone
                                                    inferiorColor = vec3(0.4, 0.3, 0.2); // Solid dirt
                                                }

                                                // Usa distância periódica para que ilhas espelhadas sejam renderizadas corretamente
                                                vec2 periodicPos = mod(vWorldPosition.xz + uWorldSize * 0.5, uWorldSize) - uWorldSize * 0.5;
                                                float dist = length(periodicPos);

                                                // Calcula altura base da ilha para determinar camada de pedra dinâmica
                                                float baseHeight;
                                                if (dist <= uCapimRadius) {
                                                    baseHeight = uIslandSurfaceHeight;
                                                } else if (dist <= uBeachRadius) {
                                                    float t = (dist - uCapimRadius) / (uBeachRadius - uCapimRadius);
                                                    baseHeight = uIslandSurfaceHeight * (1.0 - t) + (uWaterLevel - 0.5) * t;
                                                } else {
                                                    float t = min(1.0, (dist - uBeachRadius) / 240.0);
                                                    baseHeight = (uWaterLevel - 0.5) * (1.0 - t) + uSeabedLevel * t;
                                                }
                                                float currentStoneLevel = baseHeight - 5.0;

                                                // Mistura entre areia e capim baseada no raio (praia larga)
                                                float sandToCapimBlend = 1.0 - smoothstep(uCapimRadius, uBeachRadius, dist);

                                                // Mistura fundo do mar baseada na altura
                                                float seabedToSandBlend = smoothstep(uWaterLevel - 2.0, uWaterLevel - 0.5, vWorldPosition.y);

                                                // Mistura pedra para montanhas altas
                                                float stoneBlend = smoothstep(20.0, 35.0, vWorldPosition.y);
                                                // Camada de pedra profunda dinâmica
                                                float deepStoneBlend = 1.0 - smoothstep(currentStoneLevel, currentStoneLevel + 1.0, vWorldPosition.y);
                                                stoneBlend = max(stoneBlend, deepStoneBlend);

                                                vec3 seabedSandMix = mix(seabedColor, sandColor, seabedToSandBlend);
                                                // Tintamos a textura de terra da capim para verde
                                                vec3 capimTinted = capimColor * vec3(0.7, 1.0, 0.4);
                                                vec3 capimStoneMix = mix(capimTinted, stoneColor, stoneBlend);
                                                vec3 terrainMix = mix(seabedSandMix, capimStoneMix, sandToCapimBlend);

                                                // NOVO: Aplica a textura inferior provisória se vColor.r < 1.0 ou vColor.g < 1.0 (sinalizado por modificação)
                                                #ifdef USE_COLOR

                                                    float sandMod = clamp(1.0 - vColor.g, 0.0, 1.0);

                                                    // Se ambos os canais forem modificados, é um "buraco" (escavação pura)
                                                    // Se apenas um for dominante, é um monte de terra ou areia pura
                                                    float holeFactor = min(dirtMod, sandMod);
                                                    float pureDirtFactor = max(0.0, dirtMod - holeFactor);
                                                    float pureSandFactor = max(0.0, sandMod - holeFactor);

                                                    // Textura de "buraco" (areia escura ou terra inferior)
                                                    vec3 holeColor = mix(sandColor * 0.8, inferiorColor, sandToCapimBlend);
                                                    vec3 currentInferior = (vWorldPosition.y < currentStoneLevel) ? stoneColor : holeColor;

                                                    // Aplica modificações sequencialmente
                                                    terrainMix = mix(terrainMix, inferiorColor, pureDirtFactor);
                                                    terrainMix = mix(terrainMix, sandColor, pureSandFactor);

                                                float bedrockBlend = 1.0 - smoothstep(uBedrockLevel, uBedrockLevel + 0.05, vWorldPosition.y);
                                                vec3 bedrockColor = vec3(0.05, 0.05, 0.08); // Quase preto
                                                terrainMix = mix(terrainMix, bedrockColor, bedrockBlend);

                                            `

                                }, undefined, (error) => console.error('Falha ao carregar a textura de terra inferior:', error));
                            }, undefined, (error) => console.error('Falha ao carregar a textura de capim:', error));

            // Cria a Água (resolução reduzida para performance visual, mantendo alta resolução na matriz de conectividade)

            waterMaterial.onBeforeCompile = (shader) => {

                                // Vetor do centro da árvore para o jogador (com wrapping)
                                const diffX = playerPos.x - treePos.x;
                                const diffZ = playerPos.z - treePos.z;

                                let wrappedDiffX = diffX;
                                let wrappedDiffZ = diffZ;
                                if (Math.abs(diffX) > worldSize / 2) wrappedDiffX += (diffX > 0 ? -worldSize : worldSize);
                                if (Math.abs(diffZ) > worldSize / 2) wrappedDiffZ += (diffZ > 0 ? -worldSize : worldSize);
