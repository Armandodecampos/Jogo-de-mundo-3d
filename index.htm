


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Small World</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Import Map for ES Modules -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js",
            "three/examples/jsm/loaders/GLTFLoader.js": "https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/loaders/GLTFLoader.js",
            "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.min.js"
        }
    }
    </script>
    <!-- Incluir Font Awesome para o ícone de engrenagem e mão (machado e martelo serão imagens) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body { /* Remove default body margins and set font */
            margin: 0;
            overflow: hidden;
            font-family: "Inter", sans-serif;
             -webkit-user-select: none; /* Safari */
    -moz-user-select: none; /* Firefox */
    -ms-user-select: none; /* Internet Explorer/Edge */
    user-select: none; /* Padrão */
        }
        canvas { /* Ensure canvas takes full available space and is a block element */
            display: block;
            cursor: none; /* Oculta o cursor apenas no canvas do jogo por padrão */
        }
        #notification {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            color: #ff4444;
            font-size: 1.2em;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            z-index: 2000;
            display: none;
            text-align: center;
            pointer-events: none;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 8px;
        }

        #crosshair { /* Style for the crosshair in the center of the screen */
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px; /* Crosshair width */
            height: 20px; /* Crosshair height */
            transform: translate(-50%, -50%); /* Perfectly center the crosshair */
            pointer-events: none; /* Allow clicks to pass through the crosshair */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999; /* Ensure it's above the canvas, but below the messageBox */
        }
        #crosshair::before, #crosshair::after { /* Create crosshair lines */
            content: '';
            position: absolute;
            background-color: var(--crosshair-color, white); /* Default crosshair color, uses CSS variable */
            transition: background-color 0.1s ease-in-out; /* Smooth color transition */
        }
        #crosshair::before { /* Horizontal line */
            width: 100%;
            height: 2px;
        }
        #crosshair::after { /* Vertical line */
            width: 2px;
            height: 100%;
        }

        #interactionHint {
            position: absolute;
            top: calc(50% + 40px);
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 1.2em;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            pointer-events: none;
            z-index: 1000;
            display: none;
            text-align: center;
            white-space: pre-wrap;
        }

        /* Start Screen Styles */
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1001;
            color: white;
            text-align: center;
        }
        #startScreen h1 {
            font-size: 3em;
            margin-bottom: 20px;
            /* Prevent text selection for the title */
            -webkit-touch-callout: none; /* iOS Safari */
            -webkit-user-select: none;   /* Safari */
            -khtml-user-select: none;    /* Konqueror HTML */
            -moz-user-select: none;      /* Old versions of Firefox */
            -ms-user-select: none;       /* Internet Explorer/Edge */
            user-select: none;           /* Non-prefixed version, currently supported by Chrome, Edge, Opera and Firefox */
        }
        #startButton {
            background-color: #4CAF50;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1.5em;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        #startButton:hover {
            background-color: #45a049;
        }

        /* Options Screen Styles */
        #optionsScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9); /* Darker overlay */
            display: flex; /* Mantém flex para centralização, mas controla visibilidade com classe */
            visibility: hidden; /* Hidden by default */
            opacity: 0; /* Also hidden by default for smooth transition */
            transition: opacity 0.3s ease-in-out, visibility 0.3s ease-in-out; /* Smooth fade in/out */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1002; /* Above start screen */
            color: white;
            text-align: center;
        }
        #optionsScreen.active { /* Class to activate the menu */
            visibility: visible;
            opacity: 1;
        }
        #settingsScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s ease-in-out, visibility 0.3s ease-in-out;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1003;
            color: white;
            text-align: center;
        }
        #settingsScreen.active {
            visibility: visible;
            opacity: 1;
        }
        #optionsScreen h2 {
            font-size: 2em;
            margin-bottom: 20px;
        }
        .option-item {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
            width: 100%;
            margin-bottom: 10px;
        }
        .option-item label {
            color: white;
            font-weight: bold;
            font-size: 0.9em;
        }
        .option-item input[type="range"] {
            width: 100%;
            cursor: pointer;
        }
        #optionsScreen button {
            background-color: #4CAF50;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1.2em;
            cursor: pointer;
            margin: 10px;
            transition: background-color 0.3s ease;
        }
        #optionsScreen button:hover {
            background-color: #45a049;
        }
        #exitGameButton { /* Specific style for exit button */
            background-color: #dc3545; /* Red for exit */
        }
        #exitGameButton:hover {
            background-color: #c82333;
        }

        /* Inventory Belt Styles */
        #inventoryBelt {
            position: absolute;
            left: 50%; /* Centraliza horizontalmente */
            bottom: 20px; /* Distância da parte inferior */
            transform: translateX(-50%); /* Ajusta para centralizar com base na própria largura */
            display: flex;
            flex-direction: row; /* Alinha os itens horizontalmente */
            align-items: center; /* Centraliza itens verticalmente dentro da linha */
            gap: 8px; /* Espaço entre slots e botão */
            background-color: transparent; /* Fundo transparente */
            padding: 10px;
            border-radius: 10px;
            z-index: 998;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s ease-in-out, visibility 0.3s ease-in-out;
            white-space: pre-wrap;
        }
        .slot {
            width: 60px;
            height: 60px;
            border: 2px solid #555;
            border-radius: 50%;
            background-color: #333;
            display: flex;
            flex-direction: column; /* Para empilhar ícone e quantidade */
            justify-content: center;
            align-items: center;
            color: #bbb;
            font-size: 0.8em;
            transition: border-color 0.1s ease-in-out, background-color 0.1s ease-in-out;
            position: relative; /* Para posicionar a quantidade */
            cursor: grab; /* Cursor para indicar que é arrastável */
        }
        .slot.selected { /* Estilo para o slot selecionado */
            border-color: #4CAF50; /* Borda verde */
            box-shadow: 0 0 0 3px #4CAF50; /* Sombra verde */
        }

        .slot-quantity {
            position: absolute;
            bottom: 2px;
            right: 4px;
            font-size: 0.7em;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.7);
        }
        .slot-icon {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Garante que a imagem se ajuste ao slot */
            padding: 5px; /* Adiciona um pequeno preenchimento */
            border-radius: 50%;
        }
        .slot-key-bind { /* Estilo para as letras de atalho (1 a 9) */
            position: absolute;
            top: 1px;
            left: 3px;
            font-size: 0.6em;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.7);
            font-weight: bold;
        }

        /* Backpack Button */
        #backpackButton {
            background-color: #8B4513; /* Brown color */
            color: white;
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            font-size: 1.0em;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        #backpackButton:hover {
            background-color: #6B350F;
        }

        /* Backpack Modal */
        #backpackModal {
            position: absolute;
            top: 50%; /* Center vertically */
            left: 50%;
            transform: translate(-50%, -50%); /* Center horizontally and vertically */
            background-color: rgba(50, 50, 50, 0.9);
            border: 2px solid #777;
            border-radius: 10px;
            padding: 70px 20px 20px 20px;
            z-index: 1000;
            display: none; /* Hidden by default */
            flex-direction: column;
            align-items: center;
            width: 80%; /* Adjust as needed */
            max-width: 600px; /* Max width for larger screens */
            max-height: 60%; /* Max height for larger screens */
            overflow: hidden; /* Prevent the whole modal from scrolling */
        }
        #backpackModal.active {
            display: flex;
        }
        #backpackModal h2 {
            color: white;
            font-size: 2em;
            margin-bottom: 20px;
        }
        #backpackSlotsContainer {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 100%;
            overflow-y: auto;
            flex-grow: 1;
        }
        #backpackModal .slot,
        #chestSlotsContainer .slot,
        #chestBackpackSlotsContainer .slot {
            width: 100%;
            height: auto;
            min-height: 50px;
            border: 2px solid #555;
            border-radius: 8px;
            background-color: rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: row;
            justify-content: flex-start;
            align-items: center;
            color: #bbb;
            font-size: 0.9em;
            position: relative;
            cursor: grab;
            padding: 5px 10px;
        }
        .slot-name {
            margin-left: 15px;
            flex-grow: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            text-align: left;
            color: white;
            font-weight: 500;
            min-width: 0;
        }
        .slot-weight {
            margin-left: auto;
            margin-right: 10px;
            color: #888;
            font-size: 0.85em;
            font-weight: normal;
            white-space: nowrap;
        }
        #backpackModal .slot-icon,
        #chestSlotsContainer .slot-icon,
        #chestBackpackSlotsContainer .slot-icon {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            object-fit: contain;
            padding: 0;
        }
        .slot.item-selected {
            border-color: #FFD700; /* Gold border when selected to be moved */
            box-shadow: 0 0 8px #FFD700;
        }

        .slot.item-selected .slot-icon {
            border: 2px solid #FFD700; /* Gold border directly on the item icon */
        }

        .close-button {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: #dc3545;
            color: white;
            padding: 0;
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            font-weight: bold;
            margin: 0;
            z-index: 1001;
        }
        .close-button:hover {
            background-color: #c82333;
        }

        #trashSlot {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 40px;
            height: 40px;
            min-height: 40px;
            border: 2px solid #e74c3c;
            border-radius: 8px;
            background-color: rgba(231, 76, 60, 0.2);
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: 0.9em;
            cursor: pointer;
            padding: 0;
            margin: 0;
            transition: background-color 0.2s;
            z-index: 1001;
        }
        #trashSlot:hover {
            background-color: rgba(231, 76, 60, 0.4);
        }
        #trashSlot i {
            font-size: 20px;
            margin: 0;
        }

        /* Tooltip Style */
        #tooltip {
            position: absolute;
            background-color: rgba(30, 30, 30, 0.9);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.9em;
            pointer-events: none; /* Tooltip should not interfere with mouse events */
            z-index: 10001; /* Ensure it's on top */
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.2s, visibility 0.2s;
            white-space: pre-wrap;
        }

        #tooltip.visible {
            visibility: visible;
            opacity: 1;
        }

        #progressContainer {
            position: absolute;
            top: calc(50% + 25px); /* Posição abaixo da mira */
            left: 50%;
            transform: translateX(-50%); /* Apenas centraliza horizontalmente */
            width: 150px; /* Largura menor */
            height: 15px; /* Altura menor */
            background-color: rgba(0, 0, 0, 0.5);
            border: 1px solid white;
            border-radius: 8px;
            overflow: hidden;
            z-index: 1000;
            display: none; /* Inicia oculto */
        }
        #progressBar {
            width: 0%;
            height: 100%;
            background-color: #4CAF50;
            transition: width 0.1s linear;
        }

        /* Analog Clock Styles */
        #clockContainer {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 80px;
            height: 80px;
            background-color: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            z-index: 1000;
            display: none; /* Inicia oculto, aparece no startGame */
        }
        #clockFace {
            position: relative;
            width: 100%;
            height: 100%;
        }
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            background-color: white;
            border-radius: 2px;
        }
        #hourHand {
            width: 4px;
            height: 20px;
            margin-left: -2px;
            z-index: 3;
        }
        #minuteHand {
            width: 2px;
            height: 30px;
            margin-left: -1px;
            z-index: 2;
        }
        #clockCenter {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 6px;
            background-color: white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 4;
        }

        /* FPS Counter Style */
        #fpsCounter {
            position: absolute;
            top: 10px;
            left: 110px;
            color: lime;
            font-family: monospace;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
            z-index: 1000;
            pointer-events: none;
            display: none; /* Hidden by default */
        }
        .clock-mark {
            position: absolute;
            width: 2px;
            height: 6px;
            background-color: rgba(255, 255, 255, 0.8);
            left: 50%;
            top: 2px;
            margin-left: -1px;
            transform-origin: 50% 38px;
        }

        /* Custom Confirmation Modal Styles */
        #confirmDestructionModal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: none; /* Hidden by default */
            justify-content: center;
            align-items: center;
            z-index: 5000;
        }
        #confirmDestructionContainer {
            background-color: #2c3e50;
            border: 3px solid #e74c3c;
            border-radius: 12px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            color: white;
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.3);
        }
        #confirmDestructionContainer h3 {
            margin-top: 0;
            color: #e74c3c;
            font-size: 1.5em;
            margin-bottom: 15px;
        }
        #confirmDestructionContainer p {
            font-size: 1.1em;
            margin-bottom: 25px;
            line-height: 1.4;
        }
        .confirm-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .confirm-actions button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
        }
        .confirm-actions button:active {
            transform: scale(0.95);
        }
        #confirmDestructionButton {
            background-color: #e74c3c;
            color: white;
        }
        #confirmDestructionButton:hover {
            background-color: #c0392b;
        }
        #cancelDestructionButton {
            background-color: #7f8c8d;
            color: white;
        }
        #cancelDestructionButton:hover {
            background-color: #95a5a6;
        }

        /* Health and Breath Bars */
        #statBars {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
            pointer-events: none;
            display: none; /* Hidden until game starts */
        }
        .bar-container {
            width: 200px;
            height: 20px;
            background-color: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        .bar-fill {
            height: 100%;
            width: 100%;
            transition: width 0.3s ease-out;
        }
        #healthBarFill { background-color: #ff4444; }
        #breathBarFill { background-color: #4444ff; }
        .bar-text {
            position: absolute;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 12px;
            font-weight: bold;
            line-height: 16px;
            text-shadow: 1px 1px 2px black;
        }

        /* Fainted Overlay */
        #faintedOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 2em;
            flex-direction: column;
        }

        #inspectorDisplay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #00ff00;
            padding: 10px 20px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 1.1em;
            z-index: 2000;
            display: none;
            pointer-events: none;
            border: 1px solid #00ff00;
            text-align: center;
            white-space: pre-wrap;
        }

    </style>
</head>
<body>
    <div id="tooltip"></div>
    <div id="startScreen">
        <h1>Small World</h1>
        <div class="flex flex-col gap-4">
            <button id="startButton">Jogar</button>
            <button id="startSettingsButton" class="bg-gray-600 hover:bg-gray-700 text-white font-bold py-3 px-6 rounded-lg transition-colors">Configurações</button>
        </div>
    </div>

    <!-- Novo botão de menu no canto superior esquerdo -->
    <div id="hudButtons" class="fixed top-4 left-4 flex gap-2 z-[1000] hidden">
        <button id="menuIconButton" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg shadow-lg flex items-center space-x-2">
            <i class="fas fa-cog"></i> <!-- Ícone de engrenagem -->
            <span>Esc</span>
        </button>
        <button id="hudWeatherToggle" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg shadow-lg flex items-center space-x-2">
            <i class="fas fa-sun" id="hudWeatherIcon"></i>
            <span id="hudWeatherText">Sol</span>
        </button>
        <button id="hudInspectorToggle" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg shadow-lg flex items-center space-x-2">
            <i class="fas fa-search"></i>
            <span id="hudInspectorText">Inspetor: OFF</span>
        </button>
    </div>

    <div id="inspectorDisplay"></div>

    <div id="optionsScreen">
        <h2>Menu</h2>
        <button id="resumeButton">Voltar ao Jogo</button>
        <button id="pauseSettingsButton">Configurações</button>
        <button id="exitGameButton">Sair do Jogo</button>
    </div>

    <div id="settingsScreen">
        <h2 class="text-3xl font-bold mb-8">Configurações</h2>
        <div class="flex flex-col gap-6 w-full max-w-md px-8">
            <div class="option-item">
                <label for="renderDistanceSlider" class="flex justify-between w-full">
                    <span>Distância de Visão</span>
                    <span id="renderDistanceValue">250</span>
                </label>
                <input type="range" id="renderDistanceSlider" min="40" max="400" value="250" class="w-full">
            </div>
            <div class="option-item">
                <label for="capimDensitySlider" class="flex justify-between w-full">
                    <span>Densidade de Capim</span>
                    <span id="capimDensityValue">1000</span>
                </label>
                <input type="range" id="capimDensitySlider" min="1" max="10000" value="1000" class="w-full">
            </div>
            <div class="option-item">
                <label for="stoneDensitySlider" class="flex justify-between w-full">
                    <span>Densidade de Pedras</span>
                    <span id="stoneDensityValue">100</span>
                </label>
                <input type="range" id="stoneDensitySlider" min="1" max="1000" value="100" class="w-full">
            </div>
            <div class="option-item">
                <label for="textureToggle" class="flex justify-between w-full">
                    <span>Qualidade Visual</span>
                    <span id="textureStatus">Com Textura</span>
                </label>
                <select id="textureToggle" class="w-full bg-gray-700 text-white p-2 rounded">
                    <option value="true">Com Textura</option>
                    <option value="false">Sem Textura (Sólido)</option>
                </select>
            </div>
            <div class="option-item">
                <label for="shadowToggle" class="flex justify-between w-full">
                    <span>Sombras</span>
                    <span id="shadowStatus">Ativado</span>
                </label>
                <select id="shadowToggle" class="w-full bg-gray-700 text-white p-2 rounded">
                    <option value="true">Ativado</option>
                    <option value="false">Desativado</option>
                </select>
            </div>
            <div class="option-item">

        // Function to randomize tree dimensions based on a base stage data
        // Function to get tree dimensions based on a base stage data and optional multipliers for consistency
        function getTreeDimensions(baseStageData, treeType = 'normal', multipliers = null) {
            // Adiciona uma cláusula de guarda para o estágio 'semente', que não precisa de randomização
            if (!baseStageData.visual.trunk) {
                return { data: JSON.parse(JSON.stringify(baseStageData)), multipliers: null };
            }

            const m = multipliers || {
                trunkHeight: 0.8 + Math.random() * 0.4,
                trunkRadius: 0.8 + Math.random() * 0.4,
                leavesRadius: 0.8 + Math.random() * 0.4
            };

            const randomized = JSON.parse(JSON.stringify(baseStageData)); // Deep copy

            let finalTrunkHeight = m.trunkHeight;
            let finalTrunkRadius = m.trunkRadius;
            let finalLeavesRadius = m.leavesRadius;

            // Aplica escala da macieira: tronco menor, copa maior relativa ao tronco
            if (treeType === 'apple') {
                finalTrunkHeight *= 0.4;
                finalTrunkRadius *= 0.7;
                finalLeavesRadius *= 1.2;
            } else if (treeType === 'coconut') {
                finalTrunkHeight *= 1.5;
                finalTrunkRadius *= 0.5;
                finalLeavesRadius *= 1.1;
            }

            // Apply factors
            randomized.physics.trunk.height *= finalTrunkHeight;
            randomized.physics.trunk.width *= finalTrunkRadius;
            randomized.physics.trunk.depth *= finalTrunkRadius;
            randomized.visual.trunk.height *= finalTrunkHeight;
            randomized.visual.trunk.radius *= finalTrunkRadius;

            // Apply factors to leaves
            randomized.physics.leaves.width *= finalLeavesRadius;
            randomized.physics.leaves.height *= finalLeavesRadius;
            randomized.physics.leaves.depth *= finalLeavesRadius;
            randomized.visual.leaves.radius *= finalLeavesRadius;

            // Recalculate yOffsets and overallPhysicsHeight based on randomized dimensions
            const trunkHeightVisual = randomized.visual.trunk.height;
            const leavesRadiusVisual = randomized.visual.leaves.radius;

            let groupHeightVisual;
            if (treeType === 'apple') {
                groupHeightVisual = trunkHeightVisual + (2.5 * leavesRadiusVisual);
            } else {
                groupHeightVisual = trunkHeightVisual + (3.24 * leavesRadiusVisual);
            }
            randomized.overallPhysicsHeight = groupHeightVisual;

            // Posiciona o tronco para que a base alinhe com o fundo do grupo (-groupHeightVisual/2)
            randomized.visual.trunk.yOffsetInGroup = (trunkHeightVisual / 2) - (groupHeightVisual / 2);

            // Posiciona as folhas
            const leavesHeight = (treeType === 'apple') ? (leavesRadiusVisual * 2) : (leavesRadiusVisual * 1.8);
            const trunkTopY = randomized.visual.trunk.yOffsetInGroup + (trunkHeightVisual / 2);
            randomized.visual.leaves.yOffsetInGroup = trunkTopY + (leavesHeight / 2);

            // Ajusta offsets de física
            randomized.physics.trunk.yOffset = randomized.visual.trunk.yOffsetInGroup;
            const treeTopY = groupHeightVisual / 2;
            const leavesPhysicsHeight = treeTopY - trunkTopY;
            randomized.physics.leaves.height = leavesPhysicsHeight;
            randomized.physics.leaves.yOffset = trunkTopY + (leavesPhysicsHeight / 2);

            return { data: randomized, multipliers: m };
        }

            if (holeMaterial) holeMaterial.map = useTextures ? (texturesRegistry.hole || null) : null;
            if (stoneHoleMaterial) stoneHoleMaterial.map = useTextures ? (texturesRegistry.stone || null) : null;

            // Notify materials of changes
            [cubeMaterialMesh, cobMaterialMesh, floorMaterialMesh, woodenPlankMaterialMesh,
             stoneBlockMaterialMesh, woodenBlockMaterialMesh, stoneFloorMaterialMesh,
             raftMaterialMesh, sailMaterialMesh, treeTrunkMaterialMesh, treeLeavesMaterialMesh,
             treeSaplingMaterialMesh, holeMaterial, stoneHoleMaterial].forEach(m => {
                if (m) m.needsUpdate = true;
            });

            // Update terrain uniform
            islandMeshes.forEach(tile => {
                if (tile.mesh.material.userData.shader) {
                    tile.mesh.material.userData.shader.uniforms.uUseTextures.value = useTextures ? 1.0 : 0.0;

        // NOVO: Função para ajustar as bordas da câmera de sombra dinamicamente
        function updateShadowCameras(distance) {
            const margin = 1.2; // 20% de margem
            const size = distance * margin;

            if (directionalLight) {
                directionalLight.shadow.camera.left = -size;
                directionalLight.shadow.camera.right = size;
                directionalLight.shadow.camera.top = size;
                directionalLight.shadow.camera.bottom = -size;
                directionalLight.shadow.camera.updateProjectionMatrix();
            }

            if (moonLight) {
                moonLight.shadow.camera.left = -size;
                moonLight.shadow.camera.right = size;
                moonLight.shadow.camera.top = size;
                moonLight.shadow.camera.bottom = -size;
                moonLight.shadow.camera.updateProjectionMatrix();
            }
        }

        // NOVO: Função para criar o efeito de poeira de partículas
        function createDustCloud(position, colorOverride = null) {
            // Se já existir uma nuvem de poeira, remove-a primeiro
            if (dustParticles) {
                particlesGroup.remove(dustParticles);
                dustParticles.geometry.dispose();
                dustParticles.material.dispose();
                dustParticles = null;
            }

            const particleCount = 500; // Reduzido de 2000 para performance
            const particles = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const radius = 1.5;

            for (let i = 0; i < particleCount * 3; i++) {
                // Creates particles in a spherical volume
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const r = Math.random() * radius;
                positions[i] = r * Math.sin(phi) * Math.cos(theta);
                positions[i + 1] = r * Math.sin(phi) * Math.sin(theta) + (radius * 0.5); // Slightly offset upwards
                positions[i + 2] = r * Math.cos(phi);
            }

            particles.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            const particleMaterial = new THREE.PointsMaterial({
                color: colorOverride !== null ? colorOverride : 0x966F33, // Cor herdada ou padrão terra
                size: 0.08,
                transparent: true,
                opacity: 0.1, // Mais transparente
                blending: THREE.NormalBlending,
                depthWrite: false
            });

            dustParticles = new THREE.Points(particles, particleMaterial);
            dustParticles.position.copy(position);
            dustParticles.userData.startTime = world.time; // Store start time
            particlesGroup.add(dustParticles); // Add particles to the scene at the specified position
        }

        // Função para renderizar um slot de inventário (cinto ou mochila)
        function renderSlot(item, index, containerType) {
            const isList = containerType === 'backpack' || containerType === 'chest' || containerType === 'chestBackpack';
            const slotDiv = document.createElement('div');
            slotDiv.classList.add('slot');
            slotDiv.id = `${containerType}-slot-${index}`;
            slotDiv.dataset.slotIndex = index;
            slotDiv.dataset.containerType = containerType;

            // Adiciona a classe 'selected' se este for o slot atualmente selecionado
            if (containerType === 'belt' && index === selectedSlotIndex) {
                slotDiv.classList.add('selected');
            }

            // Adiciona a letra de atalho para os slots do cinto (SEMPRE para slots do cinto)
            if (containerType === 'belt') {
                const keyBindSpan = document.createElement('span');
                keyBindSpan.classList.add('slot-key-bind');
                keyBindSpan.textContent = (index + 1).toString();
                slotDiv.appendChild(keyBindSpan);
            }

            if (item) {
                const img = document.createElement('img');
                const quantitySpan = document.createElement('span');

                // Define o ícone com base no nome do item
                img.src = getItemIconURL(item.name);
                img.classList.add('slot-icon');
                slotDiv.appendChild(img);

                if (isList) {
                    const nameSpan = document.createElement('span');
                    nameSpan.classList.add('slot-name');
                    const fullName = itemDisplayNames[item.name] || item.name;
                    nameSpan.textContent = fullName.split('\n')[0]; // Pega apenas a primeira linha
                    slotDiv.appendChild(nameSpan);

                    const weightSpan = document.createElement('span');
                    weightSpan.classList.add('slot-weight');
                    const weightPerItem = itemWeights[item.name] || 0;
                    const totalWeight = weightPerItem * item.quantity;
                    weightSpan.textContent = `${totalWeight.toFixed(1)}kg`;
                    slotDiv.appendChild(weightSpan);
                }

                if (item.quantity > 1) { // Só mostra a quantidade se for maior que 1
                    quantitySpan.classList.add('slot-quantity');
                    quantitySpan.textContent = item.quantity;
                    slotDiv.appendChild(quantitySpan);
                }
            } else if (isList) {
                const nameSpan = document.createElement('span');
                nameSpan.classList.add('slot-name');
                nameSpan.textContent = 'Vazio';
                nameSpan.style.opacity = '0.5';
                slotDiv.appendChild(nameSpan);
            }

            // Adiciona a classe 'item-selected' se o item estiver selecionado
            if (selectedItem && selectedItem.sourceLocation === containerType && selectedItem.sourceIndex === index) {
                slotDiv.classList.add('item-selected');
            }

            // Adiciona o novo listener de clique
            slotDiv.addEventListener('click', (e) => onSlotClick(e, item, index, containerType));

            // Mantém a funcionalidade de tooltip e highlight no hover
            slotDiv.addEventListener('mouseenter', (e) => {
                if (item) {
                    const fullName = itemDisplayNames[item.name] || item.name;
                    const weightPerItem = itemWeights[item.name] || 0;
                    const totalWeight = weightPerItem * item.quantity;
                    tooltipElement.textContent = `${fullName}\n(Peso: ${totalWeight.toFixed(1)}kg)`;
                    tooltipElement.classList.add('visible');
                    const rect = e.currentTarget.getBoundingClientRect();
                    tooltipElement.style.left = `${rect.left + rect.width / 2 - tooltipElement.offsetWidth / 2}px`;
                    tooltipElement.style.top = `${rect.top - tooltipElement.offsetHeight - 5}px`;
                }
                e.currentTarget.style.borderColor = '#FFF';
            });
            slotDiv.addEventListener('mouseleave', (e) => {
                tooltipElement.classList.remove('visible');
                // A cor da borda será controlada pela classe 'selected' e 'item-selected',
                // então só resetamos se nenhuma delas estiver presente.
                if (!e.currentTarget.classList.contains('selected') && !e.currentTarget.classList.contains('item-selected')) {
                    e.currentTarget.style.borderColor = '#555';
                }
            });

            return slotDiv;
        }

        // Helper function to maintain backpack size (always one free slot at the end)
        function maintainBackpack() {
            const nonNullItems = backpackItems.filter(item => item !== null);
            backpackItems.length = 0;
            backpackItems.push(...nonNullItems, null);
        }

        // Helper function to add item to inventory (belt or backpack)
        function addItemToInventory(inventoryArray, itemToAdd) {
            // Try to stack first
            for (let i = 0; i < inventoryArray.length; i++) {
                // Skip the hand slot (beltItems[0]) when trying to stack or find empty slot
                if (inventoryArray === beltItems && i === 0) continue;

                if (inventoryArray[i] && inventoryArray[i].name === itemToAdd.name) {
                    inventoryArray[i].quantity += itemToAdd.quantity;
                    return; // Item stacked
                }
            }
            // If not stacked, find an empty slot
            for (let i = 0; i < inventoryArray.length; i++) {
                // Skip the hand slot (beltItems[0]) when trying to stack or find empty slot
                if (inventoryArray === beltItems && i === 0) continue;

                if (inventoryArray[i] === null) {
                    inventoryArray[i] = { ...itemToAdd }; // Add new item
                    if (inventoryArray === backpackItems) maintainBackpack();
                    return;
                }
            }

            console.warn("Inventory is full, could not add item:", itemToAdd.name);
        }

        const getInventoryByLocation = (location) => {
            if (location === 'belt') return beltItems;
            if (location === 'backpack' || location === 'chestBackpack') return backpackItems;
            if (location === 'chest') return openedChest?.userData.inventory;

        function returnSelectedItemToSource() {
            if (!selectedItem) return;
            const inv = getInventoryByLocation(selectedItem.sourceLocation);
            if (inv) {
                const idx = selectedItem.sourceIndex;
                if (inv[idx] === null) {
                    inv[idx] = selectedItem.item;
                } else {
                    // Try to stack or find another slot if original is somehow taken
                    addItemToInventory(inv, selectedItem.item);
                }
            }
            selectedItem = null;
        }

        // Nova função para lidar com cliques nos slots
        function onSlotClick(e, item, index, containerType) {
            e.stopPropagation();

            // Case 1: Deselect if clicking the same slot -> Return to source
            if (selectedItem && selectedItem.sourceLocation === containerType && selectedItem.sourceIndex === index) {
                returnSelectedItemToSource();
            }
            // Case 2: Move item if clicking an empty slot
            else if (selectedItem && !item) {
                const targetInventory = getInventoryByLocation(containerType);
                if (targetInventory) {
                    targetInventory[index] = selectedItem.item;
                    if (targetInventory === backpackItems) maintainBackpack();
                    selectedItem = null;
                }
            }
            // Case 3: Stack items if same type
            else if (selectedItem && item && selectedItem.item.name === item.name) {
                item.quantity += selectedItem.item.quantity;
                selectedItem = null;
            }
            // Case 4: Pick up or swap item
            else if (item) {
                // If already holding something, return it first
                if (selectedItem) {
                    returnSelectedItemToSource();
                }

                if (item.quantity > 1) {
                    showSplitModal(item, index, containerType);
                } else {
                    const inv = getInventoryByLocation(containerType);
                    selectedItem = { item: { ...item }, sourceLocation: containerType, sourceIndex: index };
                    if (inv) inv[index] = null;
                }
            }

            updateUI();
        }

            updateBeltDisplay();

                updateChestDisplay();

            if (typeof updateFloatingItem === 'function') {

            }
        }

        function createMound(intersect, isPositive = false, itemType = null) {
            // Garante que os materiais necessários estejam carregados
            if (!holeMaterial) {
                return null;
            }

            const hitPoint = intersect.point;
            const holeGroup = new THREE.Group();
            holeGroup.position.copy(hitPoint);
            let finalQuaternion = new THREE.Quaternion();

            // Calcula os índices do heightfield para o ponto de impacto (coordenadas locais do heightfield)
            const step = worldSize / (hfGridSize - 1);
            const mx = (hitPoint.x + worldSize / 2) / step;
            const mz = (worldSize / 2 - hitPoint.z) / step;

            // Calcula a posição exata do vértice para alinhar o visual e a física
            const vx = (mx / (hfGridSize - 1) - 0.5) * worldSize;
            const vz = (0.5 - mz / (hfGridSize - 1)) * worldSize;
            const naturalY = window.getSurfaceHeight(vx, vz);

            // NOVO: Detecta se é uma cavagem horizontal (parede)
            const isHorizontal = !isPositive && intersect.face && Math.abs(intersect.face.normal.y) < 0.5;

            // Alinha o grupo do buraco com o ponto de impacto real ou linha de base
            holeGroup.position.set(vx, isHorizontal ? hitPoint.y : naturalY, vz);

            const newMound = {
                x: mx,
                z: mz,
                radius: (isHorizontal ? 4.0 : 7.0) * (hfGridSize / worldSize), // Aumentado para garantir visibilidade na grade 200x200
                isPrecise: isHorizontal,
                originalHeight: naturalY,
                targetFloorHeight: naturalY,
                height: 0, // Inicia sem alteração na altura
                maxHeightChange: isPositive ? 1.0 : (isHorizontal ? (hitPoint.y - naturalY) : -1.0),
                isHole: !isPositive && (hitPoint.y < naturalY + 0.1), // NOVO: Só cura se for um buraco real abaixo do nível natural
                flattened: false,
                position: new THREE.Vector3(vx, isHorizontal ? hitPoint.y : naturalY, vz),
                mesh: holeGroup,
                itemType: itemType, // NOVO: Armazena o tipo de item (terra ou areia)
                createdAt: world.time,
                quaternion: finalQuaternion,
                growthStage: 0, // Inicia no primeiro estágio
                lastDugAt: world.time // NOVO: Rastreia a última vez que foi cavado
            };

            // Adiciona o novo monte às listas e o retorna
            scene.add(holeGroup);
            visualMounds.push(newMound);
            mounds.push(newMound);


            // updateIslandGeometry(newMound); // REMOVIDO: Não atualiza imediatamente ao cavar
            return newMound;
        }

        // NOVO: Função para criar uma nova caixa dinâmica
        function createBox(position, quaternion) {

        // NOVO: Função para criar uma nova jangada
        function createRaftVisual(woodMaterial, sailMaterial, isGhost) {
            const group = new THREE.Group();
            const ropeMaterial = new THREE.MeshStandardMaterial({ color: 0x3d2b1f }); // Dark brown for ropes

            // Configurações da base de troncos (Logs)
            const logRadius = 0.15;
            const logHeight = 2.4;
            const numLogs = 8;
            const spacing = 0.3;
            const startX = -((numLogs - 1) * spacing) / 2;

            // Inicializa geometrias globais se necessário (para evitar memory leak)
            if (!raftLogGeometry) {
                raftLogGeometry = new THREE.CylinderGeometry(logRadius, logRadius, logHeight, 8);
                raftSupportGeometry = new THREE.CylinderGeometry(logRadius * 0.8, logRadius * 0.8, 2.4, 8);
                raftMastGeometry = new THREE.CylinderGeometry(0.08 * 0.7, 0.08, 4.5, 8);
                raftYardarmGeometry = new THREE.CylinderGeometry(0.06, 0.06, 2.0, 8);
                raftRopeGeometry = new THREE.TorusGeometry(logRadius * 1.1, 0.02, 8, 16);

                // Vela (Sail) - Trapezoidal e Curvada
                const sailWidthTop = 1.8;
                const sailWidthBottom = 2.2;
                const sailHeight = 2.0;
                const segments = 10;
                raftSailGeometry = new THREE.PlaneGeometry(1, 1, segments, segments);
                const posAttr = raftSailGeometry.attributes.position;
                for (let i = 0; i < posAttr.count; i++) {
                    let x = posAttr.getX(i); // -0.5 to 0.5
                    let y = posAttr.getY(i); // -0.5 to 0.5
                    const lerpY = (y + 0.5); // 0 at bottom, 1 at top
                    const currentWidth = sailWidthBottom + (sailWidthTop - sailWidthBottom) * lerpY;
                    posAttr.setX(i, x * currentWidth);
                    posAttr.setY(i, y * sailHeight);
                    const curve = Math.sin((y + 0.5) * Math.PI) * 0.3;
                    posAttr.setZ(i, curve);
                }
                raftSailGeometry.computeVertexNormals();
            }

            // Troncos horizontais (Base)
            for (let i = 0; i < numLogs; i++) {
                const log = new THREE.Mesh(raftLogGeometry, woodMaterial);
                log.rotation.x = Math.PI / 2; // Deitado ao longo do eixo Z
                log.position.x = startX + i * spacing;
                log.castShadow = !isGhost;
                log.receiveShadow = !isGhost;
                group.add(log);
            }

            // Troncos de suporte transversais
            const supportPositionsZ = [0.8, -0.8];
            for (let i = 0; i < supportPositionsZ.length; i++) {
                const support = new THREE.Mesh(raftSupportGeometry, woodMaterial);
                support.rotation.z = Math.PI / 2; // Horizontal ao longo do eixo X
                support.position.y = logRadius;
                support.position.z = supportPositionsZ[i];
                support.castShadow = !isGhost;
                support.receiveShadow = !isGhost;
                group.add(support);

                // Adiciona "cordas" nas interseções
                for (let j = 0; j < numLogs; j++) {
                    const rope = new THREE.Mesh(raftRopeGeometry, ropeMaterial);
                    rope.position.set(startX + j * spacing, logRadius, supportPositionsZ[i]);
                    rope.rotation.x = Math.PI / 2;
                    group.add(rope);
                }
            }

            // Mastro
            const mast = new THREE.Mesh(raftMastGeometry, woodMaterial);
            mast.position.set(0, 2.25, 0.8); // mastHeight / 2, moved forward
            mast.castShadow = !isGhost;
            mast.receiveShadow = !isGhost;
            group.add(mast);

            // Yardarm (Travessa da vela)
            const yardarm = new THREE.Mesh(raftYardarmGeometry, woodMaterial);
            yardarm.rotation.z = Math.PI / 2;
            yardarm.position.set(0, 4.5 * 0.85, 0.8); // mastHeight * 0.85, moved forward
            yardarm.castShadow = !isGhost;
            yardarm.receiveShadow = !isGhost;
            group.add(yardarm);

            const sail = new THREE.Mesh(raftSailGeometry, sailMaterial);
            sail.position.set(0, 4.5 * 0.7, 0.9); // mastHeight * 0.7, moved forward (0.1 offset from mast)
            sail.castShadow = !isGhost;
            sail.receiveShadow = !isGhost;
            group.add(sail);

            return group;
        }

        function spawnMeteor(forcedX = null, forcedZ = null) {
            let targetX, targetZ;
            if (forcedX !== null && forcedZ !== null) {
                targetX = forcedX;
                targetZ = forcedZ;
            } else {
                const angle = Math.random() * Math.PI * 2;
                const dist = 5 + Math.random() * (worldSize / 2 - 5);
                targetX = Math.cos(angle) * dist;
                targetZ = Math.sin(angle) * dist;
            }
            const targetY = window.getSurfaceHeight(targetX, targetZ);

            const startX = targetX - 150 + Math.random() * 300;
            const startZ = targetZ - 150 + Math.random() * 300;
            const startY = 400; // Começa bem mais do alto

            const meteorGeometry = new THREE.DodecahedronGeometry(0.8, 0); // Ligeiramente maior
            const meteorMaterial = new THREE.MeshBasicMaterial({ color: 0xffaa00 });
            const meteorMesh = new THREE.Mesh(meteorGeometry, meteorMaterial);
            meteorMesh.position.set(startX, startY, startZ);
            scene.add(meteorMesh);

            const target = new THREE.Vector3(targetX, targetY, targetZ);
            const direction = new THREE.Vector3().subVectors(target, meteorMesh.position).normalize();
            const speed = 60; // Mais rápido por vir de mais alto

            // Audio: Som de queda realista (whistle + rumbling wind)
            let fallGain = null;
            let fallOsc = null;
            let fallNoiseSource = null;
            if (gameAudioContext) {
                fallGain = gameAudioContext.createGain();
                fallGain.gain.value = 0;
                fallGain.connect(gameAudioContext.destination);

                // Whistle component
                fallOsc = gameAudioContext.createOscillator();
                fallOsc.type = 'sawtooth';
                fallOsc.frequency.setValueAtTime(600, gameAudioContext.currentTime);
                fallOsc.frequency.exponentialRampToValueAtTime(150, gameAudioContext.currentTime + (startY / speed));

                // Rumble component (Noise with LowPass)
                const noiseBuffer = gameAudioContext.createBuffer(1, gameAudioContext.sampleRate * 2.0, gameAudioContext.sampleRate);
                const output = noiseBuffer.getChannelData(0);
                for (let i = 0; i < noiseBuffer.length; i++) output[i] = Math.random() * 2 - 1;

                fallNoiseSource = gameAudioContext.createBufferSource();
                fallNoiseSource.buffer = noiseBuffer;
                fallNoiseSource.loop = true;

                const filter = gameAudioContext.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(1200, gameAudioContext.currentTime);
                filter.frequency.exponentialRampToValueAtTime(300, gameAudioContext.currentTime + (startY / speed));

                const whistleGain = gameAudioContext.createGain();
                whistleGain.gain.value = 0.4;
                const rumbleGain = gameAudioContext.createGain();
                rumbleGain.gain.value = 0.6;

                fallOsc.connect(whistleGain);
                whistleGain.connect(fallGain);
                fallNoiseSource.connect(filter);
                filter.connect(rumbleGain);
                rumbleGain.connect(fallGain);

                fallOsc.start();
                fallNoiseSource.start();
                fallGain.gain.linearRampToValueAtTime(0.3, gameAudioContext.currentTime + 0.5);
            }

            activeMeteors.push({
                mesh: meteorMesh,
                target: target,
                direction: direction,
                speed: speed,
                fallGain: fallGain,
                fallOsc: fallOsc,
                fallNoiseSource: fallNoiseSource
            });
        }

        function updateMeteors(delta) {
            for (let i = activeMeteors.length - 1; i >= 0; i--) {
                const meteor = activeMeteors[i];
                const movement = meteor.direction.clone().multiplyScalar(meteor.speed * delta);
                meteor.mesh.position.add(movement);

                // Atualiza volume do som de queda baseado na distância do jogador
                if (meteor.fallGain) {
                    const distToPlayer = calculateWrappedDistance(meteor.mesh.position, playerBody.position);
                    // Aumenta o alcance para 500m para ser ouvido desde o céu
                    const vol = Math.max(0, 0.5 * (1.0 - distToPlayer / 500.0));
                    meteor.fallGain.gain.setTargetAtTime(vol, gameAudioContext.currentTime, 0.1);
                }

                // Efeito de cauda de fogo mais estreita
                for (let j = 0; j < 4; j++) {
                    const fireColors = [0xff4400, 0xff2200, 0xffaa00, 0xffcc00];
                    const color = fireColors[Math.floor(Math.random() * fireColors.length)];
                    const offset = new THREE.Vector3(
                        (Math.random() - 0.5) * 1.25,
                        (Math.random() - 0.5) * 1.25,
                        (Math.random() - 0.5) * 1.25
                    );
                    createSmokeEffect(meteor.mesh.position.clone().add(offset), color, 2.0);
                }

                // Impacto
                const distToTarget = meteor.mesh.position.distanceTo(meteor.target);
                if (distToTarget < 1.0 || meteor.mesh.position.y <= meteor.target.y) {
                    onMeteorImpact(meteor);
                    activeMeteors.splice(i, 1);
                }
            }
        }

        function onMeteorImpact(meteor) {
            const pos = meteor.target;

            // Parar e limpar áudio de queda
            if (meteor.fallOsc) {
                meteor.fallOsc.stop();
                meteor.fallOsc.disconnect();
            }
            if (meteor.fallNoiseSource) {
                meteor.fallNoiseSource.stop();
                meteor.fallNoiseSource.disconnect();
            }
            if (meteor.fallGain) {
                meteor.fallGain.disconnect();
            }

            // Audio: Som de impacto (explosão sintetizada)
            if (gameAudioContext) {
                const distToPlayer = calculateWrappedDistance(pos, playerBody.position);
                // Alcance de impacto aumentado para 300m
                const impactVol = Math.max(0, 1.5 * (1.0 - distToPlayer / 300.0));

                if (impactVol > 0.01) {
                    const noiseBuffer = gameAudioContext.createBuffer(1, gameAudioContext.sampleRate * 0.5, gameAudioContext.sampleRate);
                    const output = noiseBuffer.getChannelData(0);
                    for (let i = 0; i < noiseBuffer.length; i++) output[i] = Math.random() * 2 - 1;

                    const noiseSource = gameAudioContext.createBufferSource();
                    noiseSource.buffer = noiseBuffer;

                    const filter = gameAudioContext.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(1000, gameAudioContext.currentTime);
                    filter.frequency.exponentialRampToValueAtTime(10, gameAudioContext.currentTime + 0.5);

                    const gain = gameAudioContext.createGain();
                    gain.gain.setValueAtTime(impactVol, gameAudioContext.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, gameAudioContext.currentTime + 0.5);

                    noiseSource.connect(filter);
                    filter.connect(gain);
                    gain.connect(gameAudioContext.destination);
                    noiseSource.start();
                }
            }

            // Simular um impacto para createMound
            const fakeIntersect = {
                point: pos,
                face: { normal: new THREE.Vector3(0, 1, 0) },
                object: islandMeshes[0].mesh // Dummy reference
            };

            const mound = createMound(fakeIntersect, false);
            if (mound) {
                // Forçar o buraco a completar imediatamente
                mound.growthStage = moundGrowthStages.length;
                mound.height = mound.maxHeightChange;
                if (mound.mesh) {
                    const finalScale = mound.isPrecise ? 0.8 : 1.0;
                    mound.mesh.scale.set(finalScale, finalScale, finalScale);
                }
                terrainNeedsUpdate = true;
                terrainAffectedMounds.push(mound);
            }

            // Criar pedra no local do impacto
            createStone(new THREE.Vector3(pos.x, pos.y + 0.5, pos.z), new THREE.Quaternion());

            // Efeitos de explosão mais robustos
            for (let i = 0; i < 40; i++) {
                const explosionColors = [0xff4400, 0xff8800, 0x555555, 0x333333];
                const color = explosionColors[Math.floor(Math.random() * explosionColors.length)];
                createSmokeEffect(pos.clone().add(new THREE.Vector3(
                    (Math.random() - 0.5) * 6,
                    Math.random() * 5,
                    (Math.random() - 0.5) * 6
                )), color, 1.5);
            }
            createDustCloud(pos, 0x000000);

            // Remover malha do meteoro
            scene.remove(meteor.mesh);
            if (meteor.mesh.geometry) meteor.mesh.geometry.dispose();
            if (meteor.mesh.material) meteor.mesh.material.dispose();
        }

        function createCapim(position) {
            if (capimFreeIndices.length === 0) return;
            const poolIndex = capimFreeIndices.pop();
            const numBlades = 3 + Math.floor(Math.random() * 3);

            const cluster = {
                position: position.clone(),
                poolIndex: poolIndex,
                count: numBlades
            };

            const matrix = new THREE.Matrix4();
            const rotation = new THREE.Quaternion();
            const euler = new THREE.Euler();
            const scale = new THREE.Vector3();
            const bladePos = new THREE.Vector3();

            for (let k = 0; k < bladesPerCluster; k++) {
                const instanceIdx = poolIndex * bladesPerCluster + k;
                if (k < numBlades) {
                    const angle = Math.random() * Math.PI * 2;
                    const dist = Math.random() * 0.05; // Base bem junta
                    const bx = position.x + Math.cos(angle) * dist;
                    const bz = position.z + Math.sin(angle) * dist;
                    const by = window.getActualHeight(bx, bz);
                    bladePos.set(bx, by, bz);
                    const h = 0.8 + Math.random() * 1.0;
                    const w = 0.6 + Math.random() * 0.5; // Mais finas
                    scale.set(w, h, w);

                    // Inclinação para fora: Juntas na base, distanciadas no topo
                    // Inclinação de uma letra "V" (aprox 20-25 graus)
                    const maxTilt = Math.PI / 8; // 22.5 graus
                    const tilt = Math.random() * maxTilt;
                    const randomSpin = Math.random() * Math.PI * 2;
                    // -angle para compensar que Math.cos/sin é CW e Three.js é CCW em Y
                    // +PI/2 para o tilt no eixo X (que aponta para Z) virar para a direção radial
                    // Colocamos o randomSpin no Y (yaw) para girar a lâmina em seu próprio eixo vertical
                    euler.set(tilt, -angle + Math.PI / 2 + randomSpin, 0, 'YXZ');

                    rotation.setFromEuler(euler);
                    matrix.compose(bladePos, rotation, scale);
                    capimInstancedMeshes[0].setMatrixAt(instanceIdx, matrix);
                } else {
                    matrix.makeScale(0, 0, 0);
                    capimInstancedMeshes[0].setMatrixAt(instanceIdx, matrix);
                }
            }
            capimInstancedMeshes[0].instanceMatrix.needsUpdate = true;

            capimClusters.push(cluster);
        }

        const zeroMatrix = new THREE.Matrix4().makeScale(0, 0, 0);
        function removeCapimNear(position, radius) {
            let removedCount = 0;
            let anyRemoved = false;

            for (let i = capimClusters.length - 1; i >= 0; i--) {
                const cluster = capimClusters[i];
                const dist = calculateWrappedDistance(position, cluster.position);

                if (dist < radius) {
                    // Esconde as instâncias no InstancedMesh
                    for (let k = 0; k < bladesPerCluster; k++) {
                        const instanceIdx = cluster.poolIndex * bladesPerCluster + k;
                        capimInstancedMeshes[0].setMatrixAt(instanceIdx, zeroMatrix);
                    }
                    anyRemoved = true;

                    // Retorna o índice para o pool
                    capimFreeIndices.push(cluster.poolIndex);

                    // Remove da lista
                    capimClusters.splice(i, 1);
                    removedCount++;
                }
            }
            if (anyRemoved) {
                capimInstancedMeshes[0].instanceMatrix.needsUpdate = true;
            }
            return removedCount;
        }

        function isAreaOccupiedByConstruction(x, z, radius = 2.0, allowDirtMounds = false) {
            const pos = new THREE.Vector3(x, 0, z);

            // Check placed constructions (blocks, floors, chests)
            for (const body of placedConstructionBodies) {
                // Ignore trees/nature for the "construction" check
                if (body.userData && body.userData.growthStage) continue;

                const dist = calculateWrappedDistance(new THREE.Vector3(x, body.position.y, z), body.position);
                if (dist < radius) return true;
            }

            // Check collectible boxes (user can place them)
            for (const box of collectibleBoxes) {
                const dist = calculateWrappedDistance(new THREE.Vector3(x, box.body.position.y, z), box.body.position);
                if (dist < radius) return true;
            }

            // Check player position
            if (playerBody) {
                const dist = calculateWrappedDistance(new THREE.Vector3(x, playerBody.position.y, z), playerBody.position);
                if (dist < radius + playerRadius) return true;
            }

            // NOVO: Verifica se a área possui montes ou buracos
            for (const mound of mounds) {
                if (mound.flattened) continue;
                // Se permitirmos montes de terra (para crescimento de capim), ignoramos montes positivos de terra
                if (allowDirtMounds && mound.itemType === dirtItemName && mound.maxHeightChange > 0) continue;

                const dist = calculateWrappedDistance(new THREE.Vector3(x, mound.position.y, z), mound.position);
                const worldStep = worldSize / hfGridSize;
                const moundWorldRadius = (mound.radius + 0.5) * worldStep;
                if (dist < moundWorldRadius) return true;
            }

            return false;
        }

        function isPositionOccupied(x, z, radius = 2.0) {
            for (const body of placedConstructionBodies) {
                // Verificação de distância simples com envolvimento do mundo
                const distSq = calculateWrappedDistance(new THREE.Vector3(x, body.position.y, z), body.position);
                if (distSq < radius) return true;
            }
            return false;
        }

        function respawnCapim(limit = 20) {
            let totalAttempts = 0;
            let spawnedCount = 0;
            const maxAttempts = Math.max(limit * 10, 20);
            while (capimClusters.length < targetCapimCount && spawnedCount < limit && totalAttempts < maxAttempts) {
                totalAttempts++;

                let x, z, y;
                // 30% de chance de tentar crescer capim em um monte de terra existente
                const dirtMounds = mounds.filter(m => !m.flattened && m.itemType === dirtItemName && m.maxHeightChange > 0);
                if (Math.random() < 0.3 && dirtMounds.length > 0) {
                    const mound = dirtMounds[Math.floor(Math.random() * dirtMounds.length)];
                    // Pequena variação aleatória ao redor do centro do monte
                    const angle = Math.random() * Math.PI * 2;
                    const r = Math.random() * (mound.radius * (worldSize / hfGridSize)) * 0.8;
                    x = mound.position.x + Math.cos(angle) * r;
                    z = mound.position.z + Math.sin(angle) * r;
                    y = window.getActualHeight(x, z);
                } else {
                    const angle = Math.random() * Math.PI * 2;
                    const dist = Math.random() * capimRadius;
                    x = Math.cos(angle) * dist;
                    z = Math.sin(angle) * dist;
                    y = window.getActualHeight(x, z);
                }

                if (y > waterLevel + 0.5 && y < 25) {
                    // Permitimos crescer em montes de terra (allowDirtMounds = true)
                    if (!isAreaOccupiedByConstruction(x, z, 2.0, true) && !isPositionOccupied(x, z, 4.0)) {
                        createCapim(new THREE.Vector3(x, y, z));
                        spawnedCount++;
                    }
                }
            }
            return spawnedCount;
        }

        function respawnStone() {
            let totalAttempts = 0;
            let currentStoneCount = collectibleBoxes.filter(box => box.body.userData && box.body.userData.type === stoneItemName).length;

            while (currentStoneCount < targetStoneCount && totalAttempts < 20) {
                totalAttempts++;
                const angle = Math.random() * Math.PI * 2;
                const dist = 5 + Math.random() * (capimRadius * 2 - 5); // Stones can be on beach too
                const x = Math.cos(angle) * dist;
                const z = Math.sin(angle) * dist;
                const y = window.getSurfaceHeight(x, z);

                if (y > waterLevel + 0.2 && y < 25) {
                    if (!isAreaOccupiedByConstruction(x, z, 1.0) && !isPositionOccupied(x, z, 0.5)) {
                        createStone(new THREE.Vector3(x, y, z), new THREE.Quaternion());
                        currentStoneCount++;
                    }
                }
            }
        }

        function populateStones() {
