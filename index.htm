            } else if (crosshairActionType === 'place') {
                isPrimaryToolPlacing = true;
                currentBlockType = primaryToolForCrosshair.name; // Define o tipo de bloco para o ghost mesh
            }

            // NOVO: Define se o bloco fantasma é válido para determinar a cor da mira
            const isPlacementValid = ghostBlockMesh.visible && ghostBlockMesh.material.color.getHex() === 0x00ff00;

            // Adjust crosshair color based on validity for placing/destroying/grabbing
            if (document.pointerLockElement === renderer.domElement && !pickedObjectBody && !gamePaused) {
                const intersects = mainIntersects;
                if (isPrimaryToolPlacing) {
                    crosshairColor = isPlacementValid ? 'lime' : 'red';
                } else if (isPrimaryToolDestroying) {
                    if (!isDestroying) {
                        const intersects = mainIntersects;
                        let canDestroy = false;
                        let isTerraHit = false;
                        for (let i = 0; i < intersects.length; i++) {
                            if (intersects[i].distance > destroyDistance) continue;
                            let obj = intersects[i].object;

                            // Check for mountain/ground
                            const isIslandMesh = islandMeshes.some(m => m.mesh === obj);

                            if (isIslandMesh) {
                                canDestroy = true;
                                isTerraHit = true;
                                break;
                            }

                            // Check for patches
                            if (obj.userData && obj.userData.isDestructible && obj.userData.type === 'patch') {
                                canDestroy = true;
                                break;
                            }
                            // Check for blocks with physics bodies
                            let intersectedBody = null;
                            let currentObject = obj;
                            while (currentObject) {
                                if (currentObject.userData && currentObject.userData.physicsBody) {
                                    intersectedBody = currentObject.userData.physicsBody;
                                    if (intersectedBody && intersectedBody.userData && intersectedBody.userData.isDestructible) {
                                        canDestroy = true;
                                    }
                                    break;
                                }
                                currentObject = currentObject.parent;
                            }
                            if (canDestroy) break;
                        }
                        crosshairColor = canDestroy ? (isTerraHit ? 'lime' : 'red') : 'white';
                    } else {
                        // Se estiver destruindo terra, usa lime (verde), se não usa red (vermelho)
                        const isTerraCurrently = currentBlockType === dirtItemName || currentBlockType === sandItemName;
                        crosshairColor = isTerraCurrently ? 'lime' : 'red';
                    }
                } else if (isPrimaryToolGrabbing) {
                    const intersects = mainIntersects;
                    let objectInRange = false;
                    let canDestroyWithHand = false;
                    let isTerraHitWithHand = false;
                    const aimablePickableBodies = collectibleBoxes.map(b => b.body);

                    for (let i = 0; i < intersects.length; i++) {
                        if (intersects[i].distance > destroyDistance) continue;

                        const obj = intersects[i].object;
                        let body = null;
                        let current = obj;
                        while (current) {
                            if (current.userData && current.userData.physicsBody) {
                                body = current.userData.physicsBody;
                                break;
                            }
                            current = current.parent;
                        }

                        // Check for collectible
                        if (body && aimablePickableBodies.includes(body) && intersects[i].distance <= pickUpDistance) {
                            objectInRange = true;
                            break;
                        }

                        // Check for mining/digging with hand
                        const isIslandMesh = islandMeshes.some(m => m.mesh === obj);

                        if (isIslandMesh) {
                            // Verifica se há capim perto para a cor do crosshair
                            let nearCapimAtHand = false;
                            for (const cluster of capimClusters) {
                                if (calculateWrappedDistance(cluster.position, intersects[i].point) < 1.2) {
                                    nearCapimAtHand = true;
                                    break;
                                }
                            }
                            canDestroyWithHand = true;
                            isTerraHitWithHand = true; // Sempre lime ao mirar no chão ou capim com a mão
                            break;
                        }

                        // NOVO: Permite destruir árvores e blocos com a mão
                        let intersectedBodyWithHand = null;
                        let currentObjHand = obj;
                        while (currentObjHand) {
                            if (currentObjHand.userData && currentObjHand.userData.physicsBody) {
                                intersectedBodyWithHand = currentObjHand.userData.physicsBody;
                                if (intersectedBodyWithHand && intersectedBodyWithHand.userData && intersectedBodyWithHand.userData.isDestructible) {
                                    canDestroyWithHand = true;
                                }
                                break;
                            }
                            currentObjHand = currentObjHand.parent;
                        }
                        if (canDestroyWithHand) break;
                    }
                    if (objectInRange) crosshairColor = 'gold';
                    else if (canDestroyWithHand) crosshairColor = isTerraHitWithHand ? 'lime' : 'red';
                    else crosshairColor = 'white';
                } else {
                    crosshairColor = 'white';
                }
            }
            crosshairElement.style.setProperty('--crosshair-color', crosshairColor);

            // NOVO: Atualiza o temporizador e fade da textura de modificação do terreno
            if (modifiedVertices.length > 0) {
                const now = Date.now();
                const geom = islandGeometry;
                const colors = geom.attributes.color.array;
                const fadeDuration = 30000; // 30 segundos para o fade completo
                let colorsChanged = false;

                for (let i = modifiedVertices.length - 1; i >= 0; i--) {
                    const vIdx = modifiedVertices[i].index;

                    // NOVO: Se estivermos modificando o terreno ativamente, reseta o tempo dos vértices afetados
                    // Isso evita que a textura comece a desaparecer entre os estágios da cavagem/construção
                    if (isDestroying && !destructionComplete && destroyTargetDigInfo) {
                        const m = destroyTargetDigInfo.mound;
                        const vi = vIdx % hfGridSize;
                        const vj = Math.floor(vIdx / hfGridSize);
                        const v_cannon_j = (hfGridSize - 1) - vj;

                        if (vi >= Math.floor(m.x - m.radius) && vi <= Math.ceil(m.x + m.radius) &&
                            v_cannon_j >= Math.floor(m.z - m.radius) && v_cannon_j <= Math.ceil(m.z + m.radius)) {
                            modifiedVertices[i].time = now;
                        }
                    }

                    const elapsed = now - modifiedVertices[i].time;
                    const progress = Math.min(1.0, elapsed / fadeDuration);

                    // Fade R channel (dirt) e G channel (sand)
                    // Somente aumenta o valor em direção a 1.0 para evitar que o fade force o outro canal a 0.0
                    if (colors[vIdx * 3] < progress) {
                        colors[vIdx * 3] = progress;
                        colorsChanged = true;
                    }
                    if (colors[vIdx * 3 + 1] < progress) {
                        colors[vIdx * 3 + 1] = progress;
                        colorsChanged = true;
                    }

                    if (progress >= 1.0) {
                        colors[vIdx * 3] = 1.0;
                        colors[vIdx * 3 + 1] = 1.0;
                        modifiedVertices.splice(i, 1);
                        colorsChanged = true;
                    }
                }
                if (colorsChanged) {
                    geom.attributes.color.needsUpdate = true;
                }
            }

            // Update smoke particles
            for (let i = smokeParticles.length - 1; i >= 0; i--) {
                const particle = smokeParticles[i];
                particle.userData.lifetime -= delta;
                if (particle.userData.lifetime <= 0) {
                    particlesGroup.remove(particle);
                    smokeParticles.splice(i, 1);
                } else {
                    particle.position.add(particle.userData.velocity.clone().multiplyScalar(delta));
                    particle.material.opacity = (particle.userData.lifetime / 4.5) * 0.3; // Fade out proporcional à opacidade inicial (0.3)
                    particle.scale.addScalar(0.01); // Grow faster
                }
            }


            // NOVO: Atualiza o efeito de poeira da tela inteira
            if (dustParticles) {
                const elapsedTime = world.time - dustParticles.userData.startTime;
                const duration = 1.5; // Increased duration
                if (elapsedTime >= duration) {
                    particlesGroup.remove(dustParticles);
                    dustParticles.geometry.dispose();
                    dustParticles.material.dispose();
                    dustParticles = null;
                } else {
                    // Fade out the opacity
                    dustParticles.material.opacity = 0.1 * (1 - (elapsedTime / duration));
                }
            }

            // Lógica de Folego e Vida
            if (playerBody && !isFainted) {
                const playerPos = playerBody.position;
                // isUnderwater logic: camera below water level and there is water at camera position
                const isUnderwater = camera.position.y < waterLevel && (typeof hasWaterAt === 'function' ? hasWaterAt(camera.position.x, camera.position.z) : true);

                // NOVO: Verifica proximidade com nuvens
                let isNearCloud = false;
                for (let i = 0; i < clouds.length; i++) {
                    const cloud = clouds[i];
                    if (calculateWrappedDistance(playerPos, cloud.mesh.position) < 15) {
                        isNearCloud = true;
                        break;
                    }
                }

                const isHighAltitude = playerPos.y > 200;
                const isInstantDeathAltitude = playerPos.y > 500;

                if (isInstantDeathAltitude) {
                    playerHealth = 0;
                } else if (isUnderwater || isHighAltitude || isNearCloud) {
                    playerBreath -= delta * 15; // Diminui folego (aprox 6.6s total)
                } else {
                    playerBreath += delta * 30; // Recupera folego mais rápido (aprox 3.3s total)
                }
                playerBreath = Math.max(0, Math.min(playerMaxBreath, playerBreath));

                if (playerBreath <= 0) {
                    playerHealth -= delta * 10; // Perde vida sem folego (10s total)
                }
                playerHealth = Math.max(0, Math.min(playerMaxHealth, playerHealth));

                if (playerHealth <= 0) {
                    faintPlayer();
                }

                // Atualiza UI das barras
                if (healthBarFill) healthBarFill.style.width = `${(playerHealth / playerMaxHealth) * 100}%`;
                if (breathBarFill) breathBarFill.style.width = `${(playerBreath / playerMaxBreath) * 100}%`;
            }

            // Atualiza o tempo para as ondas da água
            if (waterMaterialShader) {
                waterMaterialShader.uniforms.uTime.value = performance.now() / 1000;
            }

            // Renderiza a cena
            renderer.render(scene, camera);
            // Log para depuração: Mostra os corpos de construção colocados
            // console.log("Corpos de construção colocados (animate):", placedConstructionBodies.map(b => ({ id: b.id, type: b.userData.type, position: b.position })));
        }

        // Função para iniciar o jogo
        function startGame() {
            document.getElementById('startScreen').style.display = 'none'; // Oculta a tela inicial
            document.getElementById('clockContainer').style.display = 'block'; // Mostra o relógio
            document.getElementById('statBars').style.display = 'flex'; // Mostra as barras
            init(); // Inicializa os componentes do jogo
            updateShadowCameras(renderDistance); // Inicializa as bordas da sombra
            applyShadowSettings(); // Aplica as configurações de sombra após init
            applyHintSettings(); // Aplica as configurações de dicas após init
            applyFPSSettings(); // Aplica as configurações de FPS após init
            populateCapim(); // NOVO: Popula a ilha com capim
            populateTrees(); // NOVO: Popula a ilha com árvores
            populateStones(); // NOVO: Popula a ilha com pedras

            // Solicita o bloqueio do ponteiro imediatamente ao iniciar
            if (renderer && renderer.domElement) {
                renderer.domElement.requestPointerLock().catch(() => {
                    console.warn("Pointer lock request failed on startGame. User might need to click canvas.");
                });
            }

            // O raycastTargets será atualizado no próximo quadro pelo animate()

            // Pega elementos do modal de confirmação de destruição
            confirmDestructionModal = document.getElementById('confirmDestructionModal');
            confirmDestructionText = document.getElementById('confirmDestructionText');
            confirmDestructionButton = document.getElementById('confirmDestructionButton');
            cancelDestructionButton = document.getElementById('cancelDestructionButton');

            confirmDestructionButton.addEventListener('click', () => {
                if (window.selectedItem) {
                    window.selectedItem = null;
                    updateUI();
                }
                confirmDestructionModal.style.display = 'none';
            });

            cancelDestructionButton.addEventListener('click', () => {
                confirmDestructionModal.style.display = 'none';
            });

            // NOVO: Pega elementos do contêiner e adiciona listeners aqui, após o DOM estar pronto
            chestModal = document.getElementById('chestModal');
            closeChestButton = document.getElementById('closeChestButton');
            chestSlotsContainer = document.getElementById('chestSlotsContainer');
            chestBackpackSlotsContainer = document.getElementById('chestBackpackSlotsContainer');
            closeChestButton.addEventListener('click', closeChest);

            chestModal.addEventListener('click', (e) => {
                if (e.target === chestModal && selectedItem) {
                    returnSelectedItemToSource();
                    updateUI();
                }
            });

            createRainSystem();
            initRainAudio();

            // Inicializa e toca os sons ambientais da ilha e da praia via Web Audio API
            islandGainNode = gameAudioContext.createGain();
            islandGainNode.gain.value = 0;
            islandGainNode.connect(gameAudioContext.destination);

            beachGainNode = gameAudioContext.createGain();
            beachGainNode.gain.value = 0;
            beachGainNode.connect(gameAudioContext.destination);

            async function startAmbientSounds() {
                const islandBuf = await loadAudioBuffer(islandAmbientUrl);
                const beachBuf = await loadAudioBuffer(beachAmbientUrl);

                if (islandBuf) {
                    islandSourceNode = gameAudioContext.createBufferSource();
                    islandSourceNode.buffer = islandBuf;
                    islandSourceNode.loop = true;
                    islandSourceNode.connect(islandGainNode);
                    islandSourceNode.start(0);
                }

                if (beachBuf) {
                    beachSourceNode = gameAudioContext.createBufferSource();
                    beachSourceNode.buffer = beachBuf;
                    beachSourceNode.loop = true;
                    beachSourceNode.connect(beachGainNode);
                    beachSourceNode.start(0);
                }

                // Pre-load bird sounds
                birdSoundUrls.forEach(url => loadAudioBuffer(url));
                seagullSoundUrls.forEach(url => loadAudioBuffer(url));
            }

            startAmbientSounds();
            for (let i = 0; i < targetCloudCount; i++) {
                spawnCloud(true);
            }

            animate(); // Inicia o loop de animação
            // Remove a solicitação de bloqueio do ponteiro daqui. O usuário precisará clicar no canvas para ativá-lo.
            const hudButtons = document.getElementById('hudButtons');
            if (hudButtons) {
                hudButtons.style.display = 'flex';
            }
            if (inventoryBeltElement) {
                inventoryBeltElement.style.visibility = 'visible'; // Mostra o cinto de inventário ao iniciar o jogo
                inventoryBeltElement.style.opacity = '1';
            }

            isWorldReady = true; window.isWorldReady = true;
            window.activeCampfires = activeCampfires;
            Object.defineProperty(window, 'playerHealth', { get: () => playerHealth, set: (v) => { playerHealth = v; } });
            Object.defineProperty(window, 'playerBreath', { get: () => playerBreath, set: (v) => { playerBreath = v; } });
            Object.defineProperty(window, 'isFainted', { get: () => isFainted, set: (v) => { isFainted = v; } });
            Object.defineProperty(window, 'openedChest', { get: () => openedChest, set: (v) => { openedChest = v; } });
            window.heldTorchGroup = heldTorchGroup;
            Object.defineProperty(window, 'isJumpBoosting', { get: () => isJumpBoosting, set: (v) => { isJumpBoosting = v; } });
            window.faintPlayer = faintPlayer;
            window.respawnPlayer = respawnPlayer;
            Object.defineProperty(window, 'renderDistance', {
                get: () => renderDistance,
                set: (v) => { renderDistance = v; }
            });
            window.initRainAudio = initRainAudio;
            window.birdSoundUrls = birdSoundUrls;
            window.seagullSoundUrls = seagullSoundUrls;
            window.playAmbientBirdSound = playAmbientBirdSound;
            window.world = world;
            Object.defineProperty(window, 'nextBirdSoundTime', {
                get: () => nextBirdSoundTime,
                set: (v) => { nextBirdSoundTime = v; }
            });
            Object.defineProperty(window, 'gamePaused', { get: () => gamePaused, set: (v) => { gamePaused = v; } });
            Object.defineProperty(window, 'rainGainNode', { get: () => rainGainNode });
            Object.defineProperty(window, 'islandGainNode', { get: () => islandGainNode });
            Object.defineProperty(window, 'beachGainNode', { get: () => beachGainNode });
            Object.defineProperty(window, 'rainIntensity', { get: () => rainIntensity, set: (v) => { rainIntensity = v; } });
            Object.defineProperty(window, 'localRainIntensity', { get: () => localRainIntensity, set: (v) => { localRainIntensity = v; } });
            Object.defineProperty(window, 'targetRainIntensity', { get: () => targetRainIntensity, set: (v) => { targetRainIntensity = v; } });
            window.rainCloud = rainCloud;
            Object.defineProperty(window, 'isClimbing', { get: () => isClimbing, set: (v) => { isClimbing = v; } });
            Object.defineProperty(window, 'isFlying', { get: () => isFlying, set: (v) => { isFlying = v; } });
            window.useInteractionHints = useInteractionHints;
            window.collectibleBoxes = collectibleBoxes;
            Object.defineProperty(window, 'isDestroying', { get: () => isDestroying });
            Object.defineProperty(window, 'destroyProgress', { get: () => destroyProgress });
            Object.defineProperty(window, 'targetDestroyTime', { get: () => targetDestroyTime });
            window.capimClusters = capimClusters;
            Object.defineProperty(window, 'targetCapimCount', { get: () => targetCapimCount, set: (v) => { targetCapimCount = v; } });
            Object.defineProperty(window, 'lastCapimGrowthTime', { get: () => lastCapimGrowthTime, set: (v) => { lastCapimGrowthTime = v; } });
            window.capimFreeIndices = capimFreeIndices;
            window.capimInstancedMeshes = capimInstancedMeshes;
            window.raycastTargets = raycastTargets;
            window.updateRaycastTargets = updateRaycastTargets;
            window.respawnCapim = respawnCapim;
            window.createMound = createMound;
            window.removeCapimNear = removeCapimNear;
            window.createCapim = createCapim;
            window.isAreaOccupiedByConstruction = isAreaOccupiedByConstruction;
            window.mounds = mounds;
            window.islandMeshes = islandMeshes;
            window.visualMounds = visualMounds;
            window.waterMatrix = waterMatrix;
            window.THREE = THREE;
            window.addItemToInventory = addItemToInventory;
            window.collectObject = collectObject;
            window.openChest = openChest;
            window.closeChest = closeChest;
            window.openBackpack = openBackpack;
            window.closeBackpack = closeBackpack;
            window.grabObject = grabObject;
            window.dropObject = dropObject;
            window.createPlaceableBlock = createPlaceableBlock;
            window.respawnTree = respawnTree;
            window.startDestruction = startDestruction;
            window.stopDestruction = stopDestruction;
            window.keysPressed = keysPressed;
            window.beltItems = beltItems;
            window.updateUI = updateUI;
            window.coconutTrees = coconutTrees;
            Object.defineProperty(window, 'selectedSlotIndex', {
                get: () => selectedSlotIndex,
                set: (v) => { selectedSlotIndex = v; }
            });
            window.updateBeltDisplay = updateBeltDisplay;
            Object.defineProperty(window, 'selectedItem', {
                get: () => selectedItem,
                set: (v) => { selectedItem = v; }
            });
            Object.defineProperty(window, 'isAttemptingToDestroy', {
                get: () => isAttemptingToDestroy,
                set: (v) => { isAttemptingToDestroy = v; }
            });
            window.dirtMountains = dirtMountains;
            window.useTextures = useTextures;
            window.createBox = createBox;
            window.closingMounds = closingMounds;
            window.calculateWrappedDistance = calculateWrappedDistance;
            window.animate = animate;
            window.createRaft = createRaft;
            window.raftBodies = raftBodies;
            Object.defineProperty(window, 'isDrivingRaft', {
                get: () => isDrivingRaft,
                set: (v) => { isDrivingRaft = v; }
            });
            Object.defineProperty(window, 'currentRaftBody', {
                get: () => currentRaftBody,
                set: (v) => { currentRaftBody = v; }
            });
            Object.defineProperty(window, 'currentMound', { get: () => currentMound });
            Object.defineProperty(window, 'stoneLayerLevel', {
                get: () => stoneLayerLevel,
                set: (v) => { stoneLayerLevel = v; }
            });
            window.cobMaterialMesh = cobMaterialMesh;
            window.cubeMaterialMesh = cubeMaterialMesh;
            window.renderer = renderer;
            window.camera = camera;
            window.scene = scene;
            window.skyFog = skyFog;
            window.waterMeshes = waterMeshes;
            window.worldSize = worldSize;
            window.raycaster = raycaster;
            window.starField = starField;
            window.rainParticles = rainParticles;
            window.sunMesh = sunMesh;
            window.moonMesh = moonMesh;
            window.spawnMeteor = spawnMeteor;
            window.spawnCloud = spawnCloud;
            window.activeMeteors = activeMeteors;
            Object.defineProperty(window, 'lowPerformance', { get: () => lowPerformance, set: (v) => { lowPerformance = v; } });
            Object.defineProperty(window, 'nextMeteorCheckTime', { get: () => nextMeteorCheckTime, set: (v) => { nextMeteorCheckTime = v; } });
            Object.defineProperty(window, 'currentDayForMeteor', { get: () => currentDayForMeteor, set: (v) => { currentDayForMeteor = v; } });

            // Weather exposure
            window.clouds = clouds;
            window.birds = birds;
            Object.defineProperty(window, 'targetCloudCount', {
                get: () => targetCloudCount,
                set: (v) => { targetCloudCount = v; }
            });
            window.updateWeather = updateWeather;
            window.startRainCycle = startRainCycle;
            window.rebuildRainCloud = rebuildRainCloud;
            window.updateRain = updateRain;
            window.updateOcclusionHeightmap = updateOcclusionHeightmap;
            window.rainOcclusionHeightmap = rainOcclusionHeightmap;
            Object.defineProperty(window, 'lastWeatherChange', { get: () => lastWeatherChange, set: (v) => { lastWeatherChange = v; } });
            Object.defineProperty(window, 'nextWeatherDuration', { get: () => nextWeatherDuration, set: (v) => { nextWeatherDuration = v; } });
            window.spawnBirdGroup = spawnBirdGroup;
            window.applyFPSSettings = applyFPSSettings;
            Object.defineProperty(window, 'showFPS', { get: () => showFPS, set: (v) => { showFPS = v; } });
            window.showSettingsScreen = showSettingsScreen;
            window.showOptionsScreen = showOptionsScreen;
            window.showNotification = showNotification;
            window.toggleInspectorLogic = toggleInspectorLogic;
            window.applyInspectorSettings = applyInspectorSettings;
            Object.defineProperty(window, 'useInspector', { get: () => useInspector, set: (v) => { useInspector = v; applyInspectorSettings(); } });
        }

        // Listener de evento para o botão "Jogar"
        document.getElementById('startButton').addEventListener('click', startGame);

        // Não há necessidade de window.onload aqui, pois startGame será chamado pelo clique do botão
    </script>
</body>
</html>
